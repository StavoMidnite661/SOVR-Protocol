      - agent.concurrency.limit_reached
    ordering: event_timestamp_asc
    conflict_resolution: NONE
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 60
      invalidation_keys:
        - "agent:activity"
        - "agent:{agent_id}:activity"
    versioning:
      strategy: IMMUTABLE_APPEND
      compatible_from: "1.0.0"
    invalidation:
      trigger_events: []
      strategy: NONE
    output_schema:
      type: object
      fields:
        agent_id: { type: string, format: uuid }
        execution_id: { type: string, format: uuid, required: false }
        action: { type: string }
        status: { type: string }
        model_version: { type: string, required: false }
        intent_id: { type: string, format: uuid }
        command_id: { type: string, format: uuid }
        policy_decision_id: { type: string, format: uuid }
        resources_changed: { type: array, items: { type: string }, required: false }
        executed_at: { type: timestamp }
        duration_ms: { type: integer, required: false }

  governance_dashboard:
    projection_id: PRJ-010
    name: governance_dashboard
    source_domain: governance
    description: Governance metrics, escalations, and amendments
    source_events:
      - policy.escalation.created
      - policy.escalation.resolved
      - agent.execution.escalated
      - payment.reconciliation.discrepancy
      - hybrid.reorg.detected
      - hybrid.reorg.resolved
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 60
      invalidation_keys:
        - "governance:dashboard"
        - "governance:escalations"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - policy.escalation.created
        - policy.escalation.resolved
        - agent.execution.escalated
        - payment.reconciliation.discrepancy
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        active_escalations: { type: integer }
        pending_resolutions: { type: integer }
        resolved_today: { type: integer }
        active_reorgs: { type: integer }
        active_discrepancies: { type: integer }
        agent_escalations_today: { type: integer }
        average_resolution_time_ms: { type: integer, required: false }

  payment_status:
    projection_id: PRJ-011
    name: payment_status
    source_domain: payment
    description: Payment execution status across all rails
    source_events:
      - payment.request.created
      - payment.request.cancelled
      - payment.execution.planned
      - payment.execution.started
      - payment.execution.completed
      - payment.execution.failed
      - payment.rail.prepared
      - payment.rail.executed
      - payment.rail.confirmed
      - payment.rail.failed
      - payment.reconciliation.started
      - payment.reconciliation.completed
      - payment.reconciliation.discrepancy
      - payment.receipt.issued
      - payment.compensation.started
      - payment.compensation.completed
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 10
      invalidation_keys:
        - "payment:status"
        - "payment:{payment_request_id}:state"
        - "payment:rail:{rail_type}:status"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - payment.execution.completed
        - payment.execution.failed
        - payment.rail.confirmed
        - payment.rail.failed
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        payment_request_id: { type: string, format: uuid }
        state: { type: string }
        rail_type: { type: string, required: false }
        amount: { type: decimal, precision: 18 }
        created_at: { type: timestamp }
        current_phase: { type: string, required: false }
        rail_reference_id: { type: string, required: false }

  settlement_summary:
    projection_id: PRJ-012
    name: settlement_summary
    source_domain: payment
    description: Settlement confirmations and failures across rails
    source_events:
      - payment.rail.confirmed
      - payment.rail.failed
      - payment.reconciliation.completed
      - payment.reconciliation.discrepancy
