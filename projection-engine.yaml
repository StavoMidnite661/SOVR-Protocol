    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 120
      invalidation_keys:
        - "settlement:summary"
        - "settlement:rail:{rail_type}"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - payment.rail.confirmed
        - payment.rail.failed
        - payment.reconciliation.discrepancy
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        rail_type: { type: string }
        total_settled: { type: integer }
        total_failed: { type: integer }
        total_volume_settled: { type: decimal, precision: 18 }
        total_fees: { type: decimal, precision: 18 }
        pending_reconciliation: { type: integer }
        active_discrepancies: { type: integer }
        average_settlement_time_ms: { type: integer, required: false }

  identity_directory:
    projection_id: PRJ-013
    name: identity_directory
    source_domain: identity
    description: Active identities, trust levels, and credentials
    source_events:
      - identity.actor.registered
      - identity.actor.verified
      - identity.actor.suspended
      - identity.actor.revoked
      - identity.credential.issued
      - identity.credential.expired
      - identity.credential.revoked
      - identity.delegation.created
      - identity.delegation.revoked
      - identity.delegation.expired
      - identity.session.created
      - identity.session.terminated
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 300
      invalidation_keys:
        - "identity:directory"
        - "identity:{identity_id}:state"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - identity.actor.verified
        - identity.actor.suspended
        - identity.actor.revoked
        - identity.credential.revoked
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        identity_id: { type: string, format: uuid }
        actor_type: { type: string }
        state: { type: string }
        trust_level: { type: string }
        active_credentials: { type: integer }
        active_delegations: { type: integer }
        active_sessions: { type: integer }
        verified_at: { type: timestamp, required: false }

  compliance_report:
    projection_id: PRJ-014
    name: compliance_report
    source_domain: ALL
    description: Regulatory compliance metrics and violations
    source_events: ALL_EVENTS
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 600
      invalidation_keys:
        - "compliance:report"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - policy.evaluation.denied
        - agent.execution.escalated
        - payment.reconciliation.discrepancy
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        total_policy_denials: { type: integer }
        total_escalations: { type: integer }
        total_agent_violations: { type: integer }
        total_reconciliation_discrepancies: { type: integer }
        compliance_rate_pct: { type: decimal, precision: 2 }
        most_common_denial_reasons: { type: array, items: { type: string } }

  liquidity_position:
    projection_id: PRJ-015
    name: liquidity_position
    source_domain: treasury
    description: Current liquidity state and warnings
    source_events:
      - treasury.liquidity.check
      - treasury.liquidity.allocate
      - treasury.liquidity.warning
      - treasury.transfer.settled
      - treasury.transfer.failed
      - treasury.settlement.confirmed
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 30
      invalidation_keys:
        - "liquidity:position"
        - "liquidity:{currency}:position"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - treasury.liquidity.allocated
        - treasury.liquidity.warning
        - treasury.transfer.settled
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        total_liquidity: { type: decimal, precision: 18 }
        available_liquidity: { type: decimal, precision: 18 }
        reserved_liquidity: { type: decimal, precision: 18 }
        pending_outflows: { type: decimal, precision: 18 }
        pending_inflows: { type: decimal, precision: 18 }
        warnings_active: { type: integer }
        coverage_ratio: { type: decimal, precision: 4 }
        by_currency: { type: object }

# ============================================================
# SECTION 3 — REPLAY PROTOCOL
# ============================================================


  escrow_account_view:
    projection_id: PRJ-016
    name: escrow_account_view
    source_domain: escrow
    description: Current state of all escrow accounts
    source_events:
      - escrow.account.created
      - escrow.account.funded
      - escrow.account.released
      - escrow.account.cancelled
    handler_type: UPSERT
    idempotency_key: aggregate_id
    replay_strategy: FULL_REBUILD
    recovery_strategy: REBUILD_FROM_GENESIS
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 60
      invalidation_keys: [escrow:{escrow_id}]
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: 1.0.0
    invalidation:
      trigger_events:
        - escrow.account.created
        - escrow.account.funded
        - escrow.account.released
        - escrow.account.cancelled
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        escrow_id: { type: string }
        parties: { type: array }
        amount: { type: decimal }
        asset_type: { type: string }
        state: { type: string }

replay_protocol:

  full_replay:
    description: Replay all events from genesis to rebuild a projection
    trigger: manual_or_scheduled
    process:
      - step: 1
        action: DROP_PROJECTION_TABLE
        constraint: "Atomic — original data preserved until rebuild completes"
      - step: 2
        action: FETCH_ALL_EVENTS_ORDERED
        order_by: [aggregate_id, timestamp, event_id]
      - step: 3
        action: APPLY_EVENTS_SEQUENTIALLY
        guarantee: DETERMINISTIC
      - step: 4
        action: VERIFY_PROJECTION_HASH
        comparison: against_stored_hash
      - step: 5
        action: SWAP_PROJECTION_TABLE
        atomic: true
    consistency_guarantee: EVENTUALLY_CONSISTENT_WITHIN_100MS
    timeout_per_1k_events_ms: 5000

  incremental_replay:
    description: Replay events from last checkpoint
    trigger: on_invalidation_event
    process:
      - step: 1
        action: READ_LAST_CHECKPOINT
        fields: [last_event_id, last_timestamp, projection_hash]
      - step: 2
        action: FETCH_EVENTS_SINCE_CHECKPOINT
        filter: event_id > last_event_id
      - step: 3
        action: APPLY_EVENTS_INCREMENTALLY
      - step: 4
        action: UPDATE_CHECKPOINT
    checkpoint_interval: 1000_EVENTS
    consistency_guarantee: EVENTUALLY_CONSISTENT_WITHIN_10MS

  snapshot_replay:
    description: Replay from last snapshot + events since snapshot
    trigger: on_rebuild_request
    process:
      - step: 1
        action: LOAD_LATEST_SNAPSHOT
      - step: 2
        action: FETCH_EVENTS_SINCE_SNAPSHOT
      - step: 3
        action: APPLY_EVENTS
      - step: 4
        action: TAKE_NEW_SNAPSHOT
    snapshot_interval_ms: 3600000
    snapshot_storage: dedicated_snapshot_table

# ============================================================
# SECTION 4 — CACHING ARCHITECTURE
# ============================================================

caching:
  invalidation_strategy: EVENT_DRIVEN
  cache_key_namespace_pattern: "sovr:{projection_name}:{key_component}"
  ttl_by_projection_type:
    REALTIME: 10
    OPERATIONAL: 60
    ANALYTICAL: 300
    COMPLIANCE: 600
    AUDIT: DISABLED
  cache_backend: REDIS
  cache_serialization: JSON
  cache_compression: true
  max_cache_size_mb: 512

# ============================================================
# SECTION 5 — CONSISTENCY GUARANTEES
# ============================================================

consistency:
  model: EVENTUAL
  max_lag_ms: 100
  ordering_guarantee: PER_AGGREGATE_STRICT_ORDERING
  cross_projection_consistency: EVENTUAL
  conflict_resolution_strategies:
    - strategy: LAST_WRITE_WINS
      description: Later event overwrites earlier value for same aggregate field
      applies_to: [account_summary, portfolio, vault_holdings, intent_queue, payment_status]
    - strategy: MAX_VALUE
      description: Use highest value when conflicting risk assessments exist
      applies_to: [risk_dashboard]
    - strategy: MIN_VALUE
      description: Use lowest value for conservative risk estimates
      applies_to: []
    - strategy: SUM
      description: Accumulate values across events
      applies_to: [treasury_dashboard, settlement_summary]
    - strategy: NONE
      description: No conflict resolution — append-only projections
      applies_to: [audit_timeline, policy_decisions, agent_activity]