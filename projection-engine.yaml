# ============================================================
# SOVR Financial OS — Projection Engine
# File: projection-engine.yaml
# Status: FROZEN
# Build Phase: G
# ============================================================
# Defines every read model in the system.
# Events describe reality. Projections interpret reality.
# If a projection disagrees with the event log,
# the event log is authoritative.
#
# Constitutional references:
#   INV-006: Events describe reality. Projections interpret reality.
# ============================================================

meta:
  schema_version: "1.0.0"
  file_id: "projection-engine"
  status: CONSTITUTIONAL_FREEZE
  build_phase: "G"
  constitutional_references: [INV-006]
  principle: "Events describe reality. Projections interpret reality. If projection disagrees with event log, event log is authoritative."

# ============================================================
# SECTION 2 — PROJECTION DEFINITIONS
# ============================================================

projections:

  account_summary:
    projection_id: PRJ-001
    name: account_summary
    source_domain: treasury
    description: Treasury balances and activity per identity
    source_events:
      - treasury.transfer.requested
      - treasury.transfer.authorized
      - treasury.transfer.settled
      - treasury.transfer.failed
      - treasury.transfer.expired
      - treasury.liquidity.warning
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 60
      invalidation_keys:
        - "account:{account_id}"
        - "identity:{identity_id}"
        - "treasury:balances"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - treasury.transfer.settled
        - treasury.transfer.compensation_required
        - treasury.liquidity.warning
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        account_id: { type: string, format: uuid }
        identity_id: { type: string, format: uuid }
        total_balance: { type: decimal, precision: 18 }
        available_balance: { type: decimal, precision: 18 }
        reserved_balance: { type: decimal, precision: 18 }
        pending_transfers_count: { type: integer }
        last_activity_at: { type: timestamp }
        currency_breakdown: { type: array, items: { type: object } }

  portfolio:
    projection_id: PRJ-002
    name: portfolio
    source_domain: vault
    description: All assets held by an identity across all vaults
    source_events:
      - vault.asset.registered
      - vault.asset.verified
      - vault.asset.impaired
      - vault.asset.write_down
      - vault.ownership.transferred
      - vault.valuation.updated
      - vault.reserve.created
      - vault.reserve.locked
      - vault.reserve.released
      - vault.reserve.expired
      - vault.collateral.added
      - vault.collateral.released
      - vault.collateral.revalued
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 120
      invalidation_keys:
        - "portfolio:{identity_id}"
        - "vault:{vault_id}:holdings"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - vault.ownership.transferred
        - vault.valuation.updated
        - vault.reserve.locked
        - vault.reserve.released
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        identity_id: { type: string, format: uuid }
        total_holdings_value: { type: decimal, precision: 18 }
        total_collateral_value: { type: decimal, precision: 18 }
        asset_count: { type: integer }
        assets: { type: array, items: { type: object } }
        risk_weighted_value: { type: decimal, precision: 18 }

  treasury_dashboard:
    projection_id: PRJ-003
    name: treasury_dashboard
    source_domain: treasury
    description: System-wide treasury state and liquidity metrics
    source_events:
      - treasury.transfer.requested
      - treasury.transfer.authorized
      - treasury.transfer.rejected
      - treasury.transfer.settled
      - treasury.transfer.failed
      - treasury.transfer.expired
      - treasury.transfer.compensation_required
      - treasury.liquidity.warning
      - treasury.liquidity.allocated
      - treasury.settlement.confirmed
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 30
      invalidation_keys:
        - "treasury:dashboard"
        - "treasury:liquidity"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - treasury.transfer.settled
        - treasury.transfer.failed
        - treasury.liquidity.warning
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        total_transfers_today: { type: integer }
        total_volume_today: { type: decimal, precision: 18 }
        pending_transfers: { type: integer }
        failed_transfers_today: { type: integer }
        liquidity_position: { type: object }
        active_settlements: { type: integer }
        pending_compensations: { type: integer }

  audit_timeline:
    projection_id: PRJ-004
    name: audit_timeline
    source_domain: ALL
    description: Complete chronological audit trail across all domains
    source_events: ALL_EVENTS
    ordering: event_timestamp_asc
    conflict_resolution: NONE  # Audit is append-only, no conflicts
    rebuild_strategy: FULL_REPLAY_FROM_GENESIS
    caching:
      enabled: false
    versioning:
      strategy: IMMUTABLE_APPEND
      compatible_from: "1.0.0"
    invalidation:
      trigger_events: []
      strategy: NONE
    output_schema:
      type: object
      fields:
        event_id: { type: string, format: uuid }
        event_name: { type: string }
        timestamp: { type: timestamp }
        actor_id: { type: string, format: uuid }
        actor_type: { type: string }
        source_domain: { type: string }
        aggregate: { type: string }
        aggregate_id: { type: string, format: uuid }
        command_id: { type: string, format: uuid }
        triggering_command: { type: string }
        policy_decision_id: { type: string, format: uuid }
        capability_id: { type: string }
        retention_class: { type: string }

  risk_dashboard:
    projection_id: PRJ-005
    name: risk_dashboard
    source_domain: vault
    description: Risk metrics across all domains
    source_events:
      - vault.asset.registered
      - vault.asset.impaired
      - vault.asset.write_down
      - vault.valuation.updated
      - vault.collateral.valued
      - vault.collateral.margin_call
      - vault.collateral.liquidation_initiated
      - vault.reserve.expired
      - treasury.liquidity.warning
    ordering: event_timestamp_asc
    conflict_resolution: MAX_VALUE  # Use highest risk assessment
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 60
      invalidation_keys:
        - "risk:dashboard"
        - "risk:asset:{asset_id}"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - vault.asset.impaired
        - vault.collateral.margin_call
        - vault.collateral.liquidation_initiated
        - treasury.liquidity.warning
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        total_risk_exposure: { type: decimal, precision: 18 }
        impaired_assets_count: { type: integer }
        impaired_assets_value: { type: decimal, precision: 18 }
        active_margin_calls: { type: integer }
        collateral_coverage_ratio: { type: decimal, precision: 4 }
        liquidity_warnings_active: { type: integer }
        concentration_risk: { type: object }

  vault_holdings:
    projection_id: PRJ-006
    name: vault_holdings
    source_domain: vault
    description: Current vault state, reserves, and collateral
    source_events:
      - vault.asset.registered
      - vault.asset.verified
      - vault.asset.rejected
      - vault.asset.impaired
      - vault.asset.write_down
      - vault.reserve.created
      - vault.reserve.locked
      - vault.reserve.released
      - vault.reserve.expired
      - vault.custody.attested
      - vault.custody.proof_expired
      - vault.valuation.updated
      - vault.collateral.added
      - vault.collateral.released
      - vault.collateral.revalued
      - vault.reconciliation.completed
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 120
      invalidation_keys:
        - "vault:holdings"
        - "vault:{vault_id}:state"
        - "asset:{asset_id}:state"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - vault.asset.impaired
        - vault.reserve.locked
        - vault.reserve.released
        - vault.valuation.updated
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        total_assets_value: { type: decimal, precision: 18 }
        total_reserves_locked: { type: decimal, precision: 18 }
        total_collateral_held: { type: decimal, precision: 18 }
        assets_by_type: { type: object }
        assets_by_state: { type: object }
        custody_proofs_active: { type: integer }
        custody_proofs_expired: { type: integer }
        last_reconciliation_at: { type: timestamp }

  intent_queue:
    projection_id: PRJ-007
    name: intent_queue
    source_domain: intent
    description: Active intents and their processing states
    source_events:
      - intent.enriching.started
      - intent.enriching.completed
      - intent.enriching.failed
      - intent.validation.completed
      - intent.multi_step.step_completed
      - intent.multi_step.completed
      - intent.multi_step.failed
    ordering: event_timestamp_asc
    conflict_resolution: LAST_WRITE_WINS
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 10
      invalidation_keys:
        - "intent:queue"
        - "intent:{intent_id}:state"
    versioning:
      strategy: EVENT_SOURCE_VERSION
      compatible_from: "1.0.0"
    invalidation:
      trigger_events:
        - intent.enriching.completed
        - intent.validation.completed
        - intent.multi_step.completed
        - intent.multi_step.failed
      strategy: INCREMENTAL_UPDATE
    output_schema:
      type: object
      fields:
        intent_id: { type: string, format: uuid }
        state: { type: string }
        intent_type: { type: string }
        actor_id: { type: string, format: uuid }
        created_at: { type: timestamp }
        current_step: { type: integer, required: false }
        total_steps: { type: integer, required: false }
        ambiguity_score: { type: decimal, precision: 4, required: false }
        enrichment_complete: { type: boolean, required: false }

  policy_decisions:
    projection_id: PRJ-008
    name: policy_decisions
    source_domain: policy
    description: Policy evaluation history and outcomes
    source_events:
      - policy.evaluation.completed
      - policy.evaluation.denied
      - policy.evaluation.escalated
      - policy.evaluation.deferred
      - policy.escalation.created
      - policy.escalation.resolved
      - policy.rule.activated
      - policy.rule.deactivated
    ordering: event_timestamp_asc
    conflict_resolution: NONE
    rebuild_strategy: FULL_REPLAY_FROM_BEGINNING
    caching:
      enabled: true
      ttl_seconds: 300
      invalidation_keys:
        - "policy:decisions"
        - "policy:actor:{actor_id}"
    versioning:
      strategy: IMMUTABLE_APPEND
      compatible_from: "1.0.0"
    invalidation:
      trigger_events: []
      strategy: NONE
    output_schema:
      type: object
      fields:
        policy_decision_id: { type: string, format: uuid }
        decision: { type: enum, values: [ALLOW, DENY, ESCALATE, DEFER] }
        command_evaluated: { type: string }
        actor_id: { type: string, format: uuid }
        rules_evaluated: { type: array, items: { type: string } }
        denied_reasons: { type: array, items: { type: string }, required: false }
        evaluated_at: { type: timestamp }

  agent_activity:
    projection_id: PRJ-009
    name: agent_activity
    source_domain: agent
    description: Agent execution history and audit envelopes
    source_events:
      - agent.registration.approved
      - agent.execution.started
      - agent.execution.completed
      - agent.execution.failed
      - agent.execution.escalated
