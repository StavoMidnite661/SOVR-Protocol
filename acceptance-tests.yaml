# SECTION 12 — CONSTITUTIONAL ARTICLE TESTS
# ============================================================

constitutional_article_tests:

  protected_articles:
    - test_id: CA-PA-T001
      name: ledger_integrity_enforced
      given: "Attempt to bypass double-entry accounting"
      when: "Runtime enforcement is triggered"
      then: "Bypass is prevented, INV-002 is enforced"

    - test_id: CA-PA-T002
      name: event_immutability_enforced
      given: "Attempt to modify a published event"
      when: "Runtime enforcement is triggered"
      then: "Modification is prevented, INV-001 is enforced"

    - test_id: CA-PA-T003
      name: double_entry_enforced
      given: "Attempt to post unbalanced journal entry"
      when: "Runtime enforcement is triggered"
      then: "Entry is rejected, INV-002 is enforced"

    - test_id: CA-PA-T004
      name: audit_trail_enforced
      given: "Attempt to execute financial action without audit"
      when: "Runtime enforcement is triggered"
      then: "Action is blocked, INV-005 is enforced"

    - test_id: CA-PA-T005
      name: value_preservation_enforced
      given: "Optimization that would compromise safety"
      when: "Constitutional validator evaluates"
      then: "Optimization is rejected, INV-007 is enforced"

    - test_id: CA-PA-T006
      name: agent_authority_prohibition_enforced
      given: "AI agent attempts to create financial authority"
      when: "Runtime enforcement is triggered"
      then: "Attempt is blocked, INV-004 is enforced"

    - test_id: CA-PA-T007
      name: event_does_not_mutate_enforced
      given: "Attempt to use event as mutation instruction"
      when: "Projection engine processes event"
      then: "Event only updates read model, never aggregate root, INV-006"

  governance_structure:
    - test_id: CA-GS-T001
      name: governance_authority_boundaries
      given: "Governance actor attempts action beyond constitutional authority"
      when: "Action is evaluated"
      then: "Action is rejected if it violates immutable articles"

    - test_id: CA-GS-T002
      name: operational_governance_within_bounds
      given: "Operational governor adjusts policy parameters"
      when: "Adjustment is evaluated"
      then: "Allowed if within constitutional bounds"

    - test_id: CA-GS-T003
      name: emergency_powers_time_limited
      given: "Emergency powers are activated"
      when: "24 hours elapse without renewal"
      then: "Emergency powers automatically expire"

  agent_governance:
    - test_id: CA-AG-T001
      name: agent_audit_envelope_complete
      given: "Agent completes any action"
      when: "Audit envelope is inspected"
      then: "All 10 required fields are present"

    - test_id: CA-AG-T002
      name: agent_escalation_at_boundary
      given: "Agent approaches 90% of any authority limit"
      when: "The limit is detected"
      then: "Mandatory escalation is triggered"

    - test_id: CA-AG-T003
      name: agent_cannot_approve_own_commands
      given: "Agent issues command C"
      when: "C reaches policy gate"
      then: "Agent is NOT in the approval chain for C"