# ============================================================
# INTEGRATION SURFACES — How Third-Party Apps, Frontends & External Systems Connect
# ============================================================
# SOVR is the central "Linux for Finance" kernel.
# The Protocol API Server (packages/runtime/src/server) is the SINGLE hub.
# All writes must go through the 7-stage pipeline + constitutional gates.
# External systems never touch the event store or domain logic directly.
# ============================================================

integration_surfaces:
  overview: |
    SOVR Protocol API Service is the authoritative backend that everything connects to.
    It acts as the single source of truth (Source of Canonical Events).
    Third-party applications, front-end UIs, banks, blockchains, regulators,
    and other financial infrastructure connect via well-defined surfaces.
    All access is governed by identity + capability + scope + policy + invariants.

  connection_model: |
    - Frontend / Operator Console (Explorer) → MUST wait for HEALTHY + verify build_hash
    - Third-party apps / services → Authenticate as external_system or service_account
    - All commands go through one universal route
    - Adapters are isolated (they may only emit events, never mutate state)
    - Event consumption is the primary async integration pattern

  surfaces:
    - name: "REST API — Universal Command Route"
      type: "synchronous_command"
      status: "fully_operational"
      endpoint: "POST /api/v1/:domain/:aggregate"
      description: "Single endpoint for all 101 commands across 9 domains."
      access: "Bearer JWT + capability_id + scope + X-Actor-Id header"
      supported_languages: "Any (curl, Python requests, Go, Java, Node, etc.)"
      commands_available: 101
      openapi: "/openapi.yaml (44+ paths)"
      example:
        curl: |
          curl -X POST http://localhost:3001/api/v1/vault/asset \
            -H "Authorization: Bearer $JWT" \
            -H "X-Actor-Id: my_bank_app" \
            -d '{"commandName":"vault.asset.register", "capability_id":"vault.asset.create", "scope":"vault.asset:*", "payload":{...}}'
      notes: "This is the primary integration surface for third-party apps."

    - name: "Official SOVRClient SDK"
      type: "client_library"
      status: "fully_operational"
      language: "TypeScript / JavaScript"
      package: "@sovr/runtime"
      location: "packages/runtime/src/sdk/client.ts"
      features:
        - "real fetch() HTTP calls (no mocks)"
        - "waitForHealthyBoot()"
        - "verifyBuildManifest() — unfakeable provenance check"
        - "createSession() — returns real HMAC JWT"
        - "executeCommand(domain, aggregate, command)"
        - "High-level helpers: registerAsset, requestTransfer, postLedgerEntry, grantCapability"
        - "queryProjection(), listEvents(), getAudit()"
      usage: |
        const client = new SOVRClient({ apiUrl: 'http://localhost:3001/api/v1', buildHash: '20c57cfb...' });
        await client.waitForHealthy();
        await client.createSession({ actor_id: 'ext_app', actor_type: 'external_system' });
        await client.executeCommand('treasury', 'transfer_order', { ... });

    - name: "Event Streaming & Pub/Sub (Source of CE)"
      type: "asynchronous"
      status: "operational_with_env_gates"
      surfaces:
        - name: "WebSocket"
          endpoint: "ws://.../api/v1/events/stream?domain=&aggregate=&actor_id="
          status: "real"
          implementation: "@fastify/websocket + LocalBus"
        - name: "Kafka"
          topics: "sovr.{domain}.{aggregate}.{event_name}"
          status: "real (kafkajs)"
          config: "SOVR_KAFKA_ENABLED=true + SOVR_KAFKA_BROKERS"
          file: "generated/config/kafka/topics.yaml (251 topics)"
        - name: "Redis Streams"
          streams: "sovr:stream:{domain}:{aggregate}"
          status: "real (ioredis XADD)"
          config: "SOVR_REDIS_ENABLED=true"
        - name: "REST Polling + Audit"
          endpoints:
            - "GET /api/v1/events"
            - "GET /api/v1/events/:event_id"
            - "GET /api/v1/audit/:correlation_id (returns isComplete)"
          status: "fully_operational"
      notes: "Every append in EventStore triggers all enabled publishers."

    - name: "Boundary Adapters (External Rails & Chains)"
      type: "isolated_execution"
      status: "partial_but_extensible"
      prohibition: "ADAPTERS_MAY_NOT_MUTATE_CONSTITUTIONAL_STATE"
      supported:
        - "Payment rails (12 declared): ACH (fully implemented + live), FEDNOW, WIRE, RTP, CARD, BLOCKCHAIN, STABLECOIN, SWIFT, SEPA, CASH_SETTLEMENT, INTERNAL_TRANSFER, FUTURE_ADAPTER"
        - "Hybrid chains: ethereum, base, polygon, future_chain (interfaces ready)"
      live_implementation:
        - "AchAdapter (prepare/execute/confirm/compensate)"
        - "HTTP endpoints: /api/v1/payment/rail/ACH/{prepare,execute,confirm,compensate}"
        - "AdapterRegistry for easy extension"
      how_to_extend: "Implement PaymentRailAdapter or ChainAdapter and register in AdapterRegistry"

    - name: "Projections / Read Models (Query Surface)"
      type: "read_only"
      status: "fully_operational"
      count: 15
      examples: ["vault_asset_view", "account_balance_view", "transfer_order_view", "payment_status_view", "identity_actor_view"]
      endpoint: "GET /api/v1/projections/:name"
      rule: "Projections are never authoritative — event log always wins (INV-006)"

    - name: "OpenAPI + Generated Contracts"
      type: "contract"
      status: "generated"
      file: "generated/openapi.yaml"
      paths: 44
      usage: "Third-party developers can generate clients in any language from the OpenAPI spec."

    - name: "Build Provenance & Health Gate"
      type: "security_gate"
      status: "enforced"
      endpoints: ["/health", "/api/v1/manifest", "/api/v1/boot-attestation"]
      requirement: "All frontends and serious clients MUST call waitForHealthy() and verifyBuildManifest() before issuing financial commands."

  supported_actor_types_for_integration:
    - external_system
    - service_account
    - organization
    - human (with proper capabilities)
  restricted_actors: ["ai_agent"]   # subject to INV-004

  security_requirements_for_third_parties:
    - "Must obtain Bearer JWT via /api/v1/identity/session"
    - "Must have explicit capability grants (governance.capability.grant)"
    - "Must supply correct scope pattern"
    - "All commands pass 7-stage pipeline (identity → capability → scope → policy → constitutional → execution → publication)"
    - "Must respect ADAPTERS_MAY_NOT_MUTATE_CONSTITUTIONAL_STATE"

  production_configuration:
    required:
      - "SOVR_JWT_SECRET (≥32 bytes, strong)"
      - "SOVR_DEV_AUTO_GRANT=false"
    recommended_for_full_integration:
      - "SOVR_KAFKA_ENABLED=true"
      - "SOVR_REDIS_ENABLED=true"
      - "Real payment rail adapters registered"
    health_gate: "External systems should poll /health until final_health === 'HEALTHY'"

  current_readiness_level:
    rest_universal: "PRODUCTION_READY"
    sdk: "PRODUCTION_READY"
    event_streaming: "READY (requires env enablement)"
    adapters: "ACH ready; others interface-complete"
    overall_third_party_integration: "HIGH — ready for external apps today via REST"

  example_third_party_flow:
    - "External bank registers as external_system"
    - "Obtains JWT"
    - "Governance grants scoped capabilities"
    - "Calls universal route or subscribes to events"
    - "Receives full audit envelopes on every state change"

  diagram: |
    ```mermaid
    flowchart TB
        subgraph External["🌐 External World / Third Parties"]
            TP[Third-Party Apps<br/>Banks • Fintech • ERP • Regulators]
            FE[Frontends & UIs<br/>React • Vue • Mobile • Dashboards]
            EXT[External Systems<br/>Oracles • Blockchains • Payment Providers]
        end

        subgraph Hub["🔥 SOVR Protocol API Server<br/>(Source of Canonical Events)"]
            direction TB
            GATE[Health + Build Hash Gate<br/>MUST be HEALTHY + verify build_hash]
            API[Universal REST Route<br/>POST /api/v1/:domain/:aggregate<br/>101 Commands]
            SDK[SOVRClient SDK<br/>(TypeScript - real HTTP)]
            PIPE[7-Stage Pipeline<br/>1. Identity<br/>2. Capability + Scope<br/>3. Policy<br/>4. Constitutional (INV-001..010)<br/>5. Execution<br/>6. Event Publication]
            ES[(Event Store<br/>Append-only • Immutable<br/>21-field envelopes<br/>INV-001 • INV-005 • INV-006)]
        end

        subgraph Consumers["📡 Event Consumers (Async)"]
            WS[WebSocket<br/>/api/v1/events/stream]
            KAFKA[Kafka Topics<br/>sovr.*.*.*]
            REDIS[Redis Streams<br/>sovr:stream:*]
            POLL[REST Polling +<br/>/api/v1/audit/:correlation_id]
        end

        subgraph Boundaries["🔌 Boundary Adapters<br/>(Isolated - No State Mutation)"]
            ACH[ACH Adapter<br/>(live + real)]
            PAY[Payment Rails<br/>12 declared]
            CHAIN[Blockchain / Hybrid<br/>Ethereum • Base • Polygon]
            NOTE["ADAPTERS_MAY_NOT_MUTATE<br/>CONSTITUTIONAL_STATE"]
        end

        %% Connections
        TP -->|REST + Bearer JWT + capability + scope| API
        FE -->|SDK + waitForHealthy() + verifyBuildManifest()| API
        EXT -->|REST or Events| API

        API --> GATE
        GATE --> PIPE
        PIPE --> ES

        ES -->|Every append publishes to| WS & KAFKA & REDIS & POLL

        ES -->|Emit events only| Boundaries
        Boundaries -->|External settlement| EXT

        classDef hub fill:#e0f7fa,stroke:#006064,stroke-width:3px
        classDef ext fill:#fff3e0,stroke:#e65100
        classDef consumer fill:#e8f5e9,stroke:#2e7d32
        classDef boundary fill:#fce4ec,stroke:#c2185b

        class Hub hub
        class External,TP,FE,EXT ext
        class Consumers,WS,KAFKA,REDIS,POLL consumer
        class Boundaries,ACH,PAY,CHAIN,NOTE boundary
    ```

  diagram_description: |
    Central hub model: Everything flows through the Protocol API Server.
    - Synchronous commands via REST/SDK (with full constitutional gates)
    - Asynchronous via events (Kafka/Redis/WebSocket)
    - External execution via isolated adapters only (never direct mutation)
    - All frontends and third parties must pass the HEALTHY + build_hash gate

  layered_architecture: |
    ```mermaid
    flowchart TB
        subgraph L0["L0 — Protocol Governance (Immutable)"]
            M[00_protocol-manifest]
            CON[01_constitution<br/>10 Invariants + Authority Model]
        end

        subgraph L1["L1 — Shared Language"]
            DM[02_domain-model<br/>47 entities]
            CMD[03_command-catalog<br/>101 commands]
            EVT[04_event-catalog<br/>251 events]
        end

        subgraph L2["L2 — Execution Control"]
            SM[05_state-machines<br/>21 machines]
            SAG[09_saga-orchestration<br/>6 sagas + compensation]
        end

        subgraph L3["L3 — Authority"]
            CAP[08_security-capabilities<br/>107 caps + scope language]
        end

        subgraph L4["L4 — Interpretation"]
            PROJ[projection-engine<br/>15 read models]
        end

        subgraph L5["L5 — Integration"]
            DC[12_domain-contracts]
        end

        subgraph L6["L6 — Boundary"]
            HYB[hybrid-boundary<br/>12 rails + 4 chains + 5 oracles]
        end

        subgraph L7["L7 — Production"]
            COMP[compiler.yaml + acceptance-tests]
        end

        L0 --> L1
        L1 --> L2
        L2 --> L3
        L3 --> L4
        L4 --> L5
        L5 --> L6
        L6 --> L7

        style L0 fill:#c8e6c9,stroke:#2e7d32,stroke-width:3px
        style L1 fill:#bbdefb,stroke:#1565c0
        style L2 fill:#ffe0b2,stroke:#e65100
        style L3 fill:#f8bbd0,stroke:#c2185b
        style L4 fill:#e1bee7,stroke:#7b1fa2
        style L5 fill:#b2dfdb,stroke:#00695c
        style L6 fill:#ffccbc,stroke:#d84315
        style L7 fill:#fff9c4,stroke:#f9a825,stroke-width:3px
    ```

    **Layering Rule**: A file in layer N may only reference files in layers 0..N.

