# ============================================================
# SECTION 9 — PROJECTION RULES (Ledger-specific)
# ============================================================
# Projections are derived read models built from events.
# They interpret reality — they are not reality itself.
# ============================================================

projection_rules:

  account_balance_view:
    source_events:
      - ledger.entry.posted
      - ledger.entry.reversed
      - ledger.entry.corrected
      - ledger.period.closed
    computation:
      description: Running balance per account
      formula: |
        balance = opening_balance
        for each posting in chronological order:
          if posting.direction == DEBIT:
            balance += posting.amount
          else:
            balance -= posting.amount
        return balance
      adjustments:
        - RESERVE and COLLATERAL accounts: track separately
        - MEMORANDUM accounts: track counts, not values
    cache_invalidation:
      trigger: on every ledger.entry.posted event
      scope: affected accounts only

  transaction_history_view:
    source_events:
      - ledger.entry.posted
      - ledger.entry.reversed
      - ledger.entry.corrected
    computation:
      description: Chronological list of all journal entries
      fields:
        - entry_id
        - transaction_id
        - description
        - total_amount
        - event_reference
        - actor_context
        - posted_at
      filters:
        - by_account_id
        - by_correlation_id
        - by_date_range
        - by_actor_id
        - by_entry_type
    cache_invalidation:
      trigger: on every ledger event
      scope: append only

  reserve_position_view:
    source_events:
      - vault.reserve.created
      - vault.reserve.locked
      - vault.reserve.released
      - vault.reserve.expired
      - vault.reserve.consumed
      - ledger.entry.posted
    computation:
      description: Current reserve positions across all assets
      fields:
        - asset_id
        - total_balance
        - reserved_balance
        - locked_balance
        - available_balance
      source_of_truth: vault events (ledger provides confirmation)
    cache_invalidation:
      trigger: on every vault.reserve.* event
      scope: affected asset

  audit_trail_view:
    source_events:
      - all ledger events
      - all vault events
      - all treasury events
      - all governance events
    computation:
      description: Complete immutable audit trail of all financial actions
      fields:
        - timestamp
        - event_name
        - source_domain
        - actor_context
        - event_data
        - related_entry_id
        - related_event_ids
      ordering: strict chronological
      retention: permanent
    cache_invalidation:
      trigger: on every event in the system
      scope: append only

  reconciliation_dashboard_view:
    source_events:
      - ledger.reconciliation.started
      - ledger.reconciliation.mismatch_detected
      - ledger.reconciliation.completed
    computation:
      description: Current state of all reconciliation processes
      fields:
        - reconciliation_id
        - type
        - state
        - severity
        - expected_value
        - actual_value
        - discrepancy_amount
        - started_at
        - resolved_at
      filters:
        - by_state
        - by_severity
        - by_type
        - by_date_range
    cache_invalidation:
      trigger: on every ledger.reconciliation.* event
      scope: affected reconciliation

# ============================================================
# SECTION 10 — IMMUTABLE AUDIT REQUIREMENTS
# ============================================================

audit_requirements:

  forbidden_operations:
    - operation: UPDATE journal_entry
      constitutional_reference: INV-001
      reason: Events are immutable. Journal entries are event-derived.
    - operation: DELETE journal_entry
      constitutional_reference: INV-001
      reason: Events cannot be deleted. Journal entries cannot be deleted.
    - operation: UPDATE posting
      constitutional_reference: INV-001, INV-002
      reason: Postings are part of immutable journal entries.
    - operation: DELETE posting
      constitutional_reference: INV-001, INV-002
      reason: Deleting a posting would unbalance the entry.
    - operation: ALTER historical_balance
      constitutional_reference: INV-001
      reason: Historical balances are derived from immutable events.

  permitted_operations:
    - operation: CREATE journal_entry
      condition: passes validation pipeline
    - operation: APPEND posting
      condition: only during entry creation, never after posting
    - operation: REVERSE journal_entry
      condition: creates new entry with inverse postings
    - operation: COMPENSATE journal_entry
      condition: creates new correction entry with governance approval
    - operation: CLOSE accounting_period
      condition: creates closing entries, does not modify history

  audit_event_requirements:
    every_posted_entry_must_produce:
      - entry_id
      - journal_id
      - transaction_id
      - event_reference
      - correlation_id
      - causation_id
      - all_postings_with_account_and_amount
      - actor_context
      - authorization_context
      - posted_at
      - balance_after  (for each affected account)

  query_requirements:
    governance_must_be_able_to:
      - query any entry by entry_id
      - query all entries for a transaction_id
      - query all entries for a correlation_id
      - query account balance at any point in time
      - query full transaction history for any account
      - query reconciliation status
      - export audit trail for regulatory compliance