# ============================================================
# SECTION 14 — STATE MACHINES (references to 05_state-machines.yaml)
# ============================================================

state_machine_references:

  policy_evaluation_lifecycle:
    file: 05_state-machines.yaml
    domain: policy
    aggregate: policy_evaluation
    states:
      IDLE:
        description: No evaluation in progress
        allowed_transitions: [GATHERING_CONTEXT]
      GATHERING_CONTEXT:
        description: Collecting all seven evaluation dimensions
        allowed_transitions: [EVALUATING_RULES, IDLE]
      EVALUATING_RULES:
        description: Evaluating rules in deterministic order
        allowed_transitions: [COMPUTING_DECISION, IDLE]
      COMPUTING_DECISION:
        description: Applying strategy and conflict resolution
        allowed_transitions: [DECISION_RENDERED, IDLE]
      DECISION_RENDERED:
        description: Final decision produced and emitted
        allowed_transitions: [ARCHIVED]
      ARCHIVED:
        description: Evaluation record persisted for audit
        allowed_transitions: []

  policy_rule_lifecycle:
    file: 05_state-machines.yaml
    domain: policy
    aggregate: policy_rule
    states:
      DRAFT:
        description: Rule created but not yet active
        allowed_commands:
          - policy.rule.update
          - policy.rule.activate
      ACTIVE:
        description: Rule is live and participating in evaluations
        allowed_commands:
          - policy.rule.update
          - policy.rule.deactivate
      INACTIVE:
        description: Rule is disabled and not participating in evaluations
        allowed_commands:
          - policy.rule.update
          - policy.rule.activate
      ARCHIVED:
        description: Rule is permanently retired
        allowed_commands: []

  policy_escalation_lifecycle:
    file: 05_state-machines.yaml
    domain: policy
    aggregate: escalation
    states:
      PENDING:
        description: Escalation created, awaiting resolver assignment
        allowed_commands:
          - policy.escalation.resolve
      UNDER_REVIEW:
        description: Resolver is actively reviewing the escalation
        allowed_commands:
          - policy.escalation.resolve
      RESOLVED:
        description: Escalation resolved with a final decision
        allowed_commands: []
      EXPIRED:
        description: Deadline passed without resolution
        allowed_commands: []
      AUTO_DENIED:
        description: Deadline passed with auto_deny_after_deadline = true
        allowed_commands: []

# ============================================================
# SECTION 15 — PROHIBITIONS
# ============================================================

prohibitions:

  - id: PROH-001
    rule: Never evaluate without authorization_context
    enforcement: evaluation engine rejects any policy.set.evaluate lacking valid authorization_context_id
    violation_severity: critical
    violation_action: reject_and_audit
    constitutional_reference: INV-008

  - id: PROH-002
    rule: Never produce non-deterministic decisions
    enforcement: deterministic_hash verified on every evaluation; audit replay validates reproducibility
    violation_severity: critical
    violation_action: halt_system_and_escalate_to_governance
    constitutional_reference: INV-008

  - id: PROH-003
    rule: Never allow policy evaluation to mutate state
    enforcement: evaluation engine is a pure function; all state changes emitted as events via commands only
    violation_severity: critical
    violation_action: halt_and_investigate
    constitutional_reference: INV-001

  - id: PROH-004
    rule: Never skip constitutional rule evaluation
    enforcement: rules with constitutional_reference are flagged non-skippable; evaluation engine validates all such rules were evaluated
    violation_severity: critical
    violation_action: reject_evaluation_and_escalate_to_governance
    constitutional_reference: INV-008

  - id: PROH-005
    rule: Never grant capabilities that Identity did not authorize
    enforcement: policy decision cannot introduce capabilities not present in identity.authorization_context.capabilities
    violation_severity: critical
    violation_action: reject_and_terminate_actor_session
    constitutional_reference: INV-003

  - id: PROH-006
    rule: Never allow agent to modify policy rules
    enforcement: all policy mutation commands validate issuer.actor_type is not ai_agent
    violation_severity: critical
    violation_action: reject_command_and_audit
    constitutional_reference: INV-004

  - id: PROH-007
    rule: Never allow agent to resolve escalations
    enforcement: policy.escalation.resolve validates issuer.actor_type is not ai_agent
    violation_severity: critical
    violation_action: reject_command_and_audit
    constitutional_reference: INV-004

  - id: PROH-008
    rule: Never evaluate against inactive or non-governance-approved policy sets
    enforcement: policy.set.evaluate validates policy_set.active = true and policy_set.governance_approved = true
    violation_severity: critical
    violation_action: reject_evaluation_and_audit
    constitutional_reference: INV-008

  - id: PROH-009
    rule: Never make external network calls during evaluation
    enforcement: evaluation engine runs in isolated context; all data pre-gathered in GATHERING_CONTEXT
    violation_severity: critical
    violation_action: halt_evaluation_and_investigate
    constitutional_reference: INV-008

  - id: PROH-010
    rule: Never allow governance-approved policy set to lack constitutional rule coverage
    enforcement: policy.set.create validates at least one rule in rule_ids has a non-null constitutional_reference
    violation_severity: high
    violation_action: reject_set_creation
    constitutional_reference: INV-008

# ============================================================
# SECTION 16 — INTEGRATION POINTS
# ============================================================

integration_points:

  consumes:
    - domain: identity
      interface: AuthorizationContext
      contract_name: identity_to_policy
      description: Receives authenticated identity, capabilities, scope, and actor type
      data_received:
        authorization_context_id:
          type: uuid
          required: true
        actor_id:
          type: uuid
          required: true
        actor_type:
          type: string
          required: true
        capabilities:
          type: array
          items: string
          required: true
        scope:
          type: object
          required: true
        kyc_status:
          type: string
          required: true
        jurisdiction:
          type: string
          required: false
        trust_level:
          type: string
          required: true
      consumption_point: GATHERING_CONTEXT state, step 1
      version: 1.0.0

    - domain: vault
      interface: VaultState
      contract_name: vault_to_policy
      description: Receives asset availability, risk classification, reserve state, and custody attestation
      data_received:
        asset_id:
          type: uuid
          required: true
        asset_state:
          type: string
          required: true
        risk_classification:
          type: string
          required: true
        available_balance:
          type: decimal
          required: true
        reserved_balance:
          type: decimal
          required: true
        custody_attestation_valid:
          type: boolean
          required: true
        custody_attestation_expires_at:
          type: timestamp
          required: true
      consumption_point: GATHERING_CONTEXT state, step 3
      version: 1.0.0

    - domain: treasury
      interface: TreasuryState
      contract_name: treasury_to_policy
      description: Receives liquidity position, velocity state, and liquidity state classification
      data_received:
        asset_id:
          type: uuid
          required: true
        total_available:
          type: decimal
          required: true
        total_reserved:
          type: decimal
          required: true
        in_transit:
          type: decimal
          required: true
        available_liquidity_ratio:
          type: decimal
          required: true
        liquidity_state:
          type: string
          required: true
        actor_daily_velocity:
          type: decimal
          required: true
        actor_daily_velocity_limit:
          type: decimal
          required: true
        actor_daily_velocity_ratio:
          type: decimal
          required: true
      consumption_point: GATHERING_CONTEXT state, step 4
      version: 1.0.0

    - domain: governance
      interface: GovernanceRules
      contract_name: governance_to_policy
      description: Receives active compliance requirements, emergency controls, and governance directives
      data_received:
        active_compliance_requirements:
          type: array
          items: compliance_requirement
          required: true
        emergency_controls_active:
          type: boolean
          required: true
        governance_directives:
          type: array
          items: object
          required: true
      consumption_point: GATHERING_CONTEXT state, step 5
      version: 1.0.0

  provides:
    - domain: intent
      interface: PolicyDecision
      contract_name: policy_to_intent
      description: Provides the deterministic policy decision for command normalization and validation
      data_provided:
        decision_id:
          type: uuid
          required: true
        evaluation_id:
          type: uuid
          required: true
        decision:
          type: enum
          ref: policy_decision_outcome
          required: true
        confidence:
          type: enum
          ref: decision_confidence
          required: true
        conditions:
          type: array
          required: false
          default: []
        risk_assessment:
          type: object
          required: true
        compliance_flags:
          type: array
          required: true
        deterministic_hash:
          type: string
          format: sha256hex
          required: true
        evaluated_at:
          type: timestamp
          required: true
      provision_point: DECISION_RENDERED state
      version: 1.0.0

    - domain: governance
      interface: ComplianceEvents
      contract_name: policy_to_governance
      description: Provides compliance violation events and escalation requests for governance review
      data_provided:
        policy.compliance.violation.detected:
          type: event
          required: true
        policy.escalation.created:
          type: event
          required: true
        policy.evaluation.completed:
          type: event
          required: true
      provision_point: DECISION_RENDERED state
      version: 1.0.0

    - domain: governance
      interface: EscalationInterface
      contract_name: policy_escalation_to_governance
      description: Provides escalation records requiring human or governance resolution
      data_provided:
        escalation_id:
          type: uuid
          required: true
        evaluation_id:
          type: uuid
          required: true
        escalation_reason:
          type: enum
          ref: escalation_reason
          required: true
        escalation_target:
          type: enum
          ref: escalation_target
          required: true
        required_resolution:
          type: enum
          ref: required_resolution
          required: true
        deadline:
          type: timestamp
          required: true
        auto_deny_after_deadline:
          type: boolean
          required: true
        context:
          type: object
          required: true
      provision_point: DECISION_RENDERED state (when decision is ESCALATE)
      version: 1.0.0