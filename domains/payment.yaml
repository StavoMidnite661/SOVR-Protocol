        output: { rail_execution_id, rail_message_id, status, submitted_at }
      confirm:
        input: { rail_execution_id }
        output: { confirmed, confirmation_timestamp, rail_reference_id, actual_amount, fees }
      reconcile:
        input: { rail_reference_id, expected_amount, expected_fees }
        output: { matched, discrepancy, reconciliation_status }
      compensate:
        input: { rail_execution_id, reason }
        output: { compensation_id, status }
    event_emissions:
      prepare: payment.rail.fednow.prepared
      execute: payment.rail.fednow.executed
