# ============================================================
# SOVR Financial OS — Payment Execution Domain
# File: domains/payment.yaml
# Status: FROZEN
# Build Phase: E
# Domain Priority: 6 (Execution Boundary)
# ============================================================
# Payment is the Execution Boundary of SOVR.
# It is NOT a payment gateway. It is the constitutional
# interface between the SOVR runtime and external financial
# systems. Payment receives settlement instructions from
# Treasury and executes them through abstract rail adapters.
#
# CRITICAL: No adapter may mutate constitutional state.
# Adapters only emit events.
#
# Constitutional references:
#   INV-001: Every state change requires an immutable event
#   INV-003: No actor may exceed granted authority
#   INV-005: Every financial action must produce an auditable event trail
#   INV-007: Value preservation outranks execution speed
#   INV-008: No command executes without identity, capability, scope, and policy validation
#   INV-009: Unknown financial states must be represented explicitly
# ============================================================

domain:
  name: payment
  version: 1.0.0
  description: >
    The Execution Boundary Domain. Bridges the constitutional runtime to
    external financial systems through abstract rail adapters. Receives
    settlement instructions from Treasury, selects execution rails,
    orchestrates adapter lifecycle, and produces execution receipts.
  constitutional_references:
    invariants: [INV-001, INV-003, INV-005, INV-007, INV-008, INV-009]
    conflict_resolution_rank: 2  # asset_security

  production_invariants:
    - id: PI-PAY-001
      rule: Payment adapters SHALL NOT mutate constitutional state
      description: Adapters are output-only. They prepare, execute, confirm, reconcile, and compensate — but never write to the event store, ledger, vault, or any constitutional data structure.
      enforcement_point: adapter_runtime
      violation_severity: critical
      violation_action: terminate_adapter_and_audit

    - id: PI-PAY-002
      rule: External system responses SHALL NOT be trusted without confirmation
      description: No external settlement is final until confirmed through the adapter's confirm() interface. Optimistic external responses must be tracked as PENDING until confirmation.
      enforcement_point: settlement_coordinator
      violation_severity: high
      violation_action: flag_as_unknown_and_escalate

    - id: PI-PAY-003
      rule: Every rail operation SHALL produce a traceable receipt
      description: For every adapter execution, an ExecutionReceipt must be produced containing rail_reference_id, amount_executed, fees, and constitutional compliance attestation.
      enforcement_point: receipt_service
      violation_severity: high
      violation_action: block_subsequent_operations_until_receipt_issued

    - id: PI-PAY-004
      rule: Payment routing SHALL be deterministic for identical inputs
      description: Given the same payment_request, available_rails, treasury_state, and vault_state, the routing engine must select the same rail. Randomness in routing is prohibited.
      enforcement_point: routing_engine
      violation_severity: medium
      violation_action: log_violation_and_use_default_route

# ============================================================
# SECTION 2 — PAYMENT REQUEST MODEL
# ============================================================

enums:
  rail_type:
    - ACH
    - FEDNOW
    - WIRE
    - RTP
    - CARD
    - BLOCKCHAIN
    - INTERNAL_TRANSFER
    - STABLECOIN
    - SWIFT
    - SEPA
    - CASH_SETTLEMENT
    - FUTURE_ADAPTER

  payment_urgency:
    - IMMEDIATE
    - STANDARD
    - BATCH

  payment_state:
    - RECEIVED
    - PLANNING
    - ROUTING
    - PREPARING
    - EXECUTING
    - CONFIRMING
    - RECONCILING
    - SETTLED
    - FAILED
    - COMPENSATING
    - REVERSED

  adapter_phase:
    - PREPARE
    - VALIDATE
    - EXECUTE
    - CONFIRM
    - RECONCILE
    - COMPENSATE

  reconciliation_trigger:
    - AUTOMATIC_SCHEDULED
    - EVENT_DRIVEN
    - ON_DEMAND
    - DISCREPANCY_DETECTED

  reconciliation_status:
    - MATCHED
    - DISCREPANCY_FOUND
    - ESCALATED
    - RESOLVED

  receipt_attestation:
    - CONSTITUTIONALLY_COMPLIANT
    - COMPLIANT_WITH_EXCEPTIONS
    - NON_COMPLIANT

entities:
  payment_request:
    description: A request to execute a payment through an external rail
    attributes:
      payment_request_id:
        type: string
        format: uuid
        required: true
        unique: true
      source_transfer_id:
        type: string
        format: uuid
        required: true
        description: References treasury.transfer.transfer_id
      execution_plan_id:
        type: string
        format: uuid
        required: false
        description: Populated after routing
      rail_type:
        type: enum
        values_ref: rail_type
        required: false
        description: Populated after routing
      amount:
        type: object
        required: true
        description: Polymorphic value matching vault value model
        fields:
          native_unit:
            type: string
            required: true
          quantity:
            type: decimal
            precision: 18
            required: false
          face_value:
            type: decimal
            precision: 2
            required: false
          precision:
            type: integer
            required: true
      sender:
        type: object
        required: true
        fields:
          identity_id:
            type: string
            format: uuid
            required: true
          account_id:
            type: string
            format: uuid
            required: true
          rail_account_ref:
            type: string
            required: true
            description: Rail-specific account identifier
      recipient:
        type: object
        required: true
        fields:
          identity_id:
            type: string
            format: uuid
            required: false
            description: Null for external recipients
          account_id:
            type: string
            format: uuid
            required: false
          rail_account_ref:
            type: string
            required: true
          name:
            type: string
            required: false
          rail_metadata:
            type: object
            required: false
            description: Rail-specific recipient data (e.g. routing_number, IBAN)
      urgency:
        type: enum
        values_ref: payment_urgency
        required: true
      retry_policy:
        type: object
        required: true
        fields:
          max_retries:
            type: integer
            required: true
          retry_delay_ms:
            type: integer
            required: true
          backoff_multiplier:
            type: decimal
            precision: 2
            required: true
      state:
        type: enum
        values_ref: payment_state
        required: true
      constitutional_gates_passed:
        type: object
        required: true
        fields:
          identity_verified:
            type: boolean
            required: true
          policy_evaluated:
            type: boolean
            required: true
          capability_confirmed:
            type: boolean
            required: true
          authority_bound:
            type: boolean
            required: true
          policy_decision_id:
            type: string
            format: uuid
            required: true
      created_at:
        type: timestamp
        required: true
      updated_at:
        type: timestamp
        required: true
      completed_at:
        type: timestamp
        required: false

# ============================================================
# SECTION 3 — EXECUTION PLAN MODEL
# ============================================================

  execution_plan:
    description: A routing and execution plan for a payment request
    attributes:
      execution_plan_id:
        type: string
        format: uuid
        required: true
        unique: true
      payment_request_id:
        type: string
        format: uuid
        required: true
      selected_rail:
        type: enum
        values_ref: rail_type
        required: true
      routing_decision:
        type: object
        required: true
        fields:
          primary_rail:
            type: enum
            values_ref: rail_type
            required: true
          confidence_score:
            type: decimal
            precision: 4
            required: true
          selection_criteria:
            type: array
            items:
              type: object
              fields:
                criterion:
                  type: string
                  required: true
                score:
                  type: decimal
                  precision: 4
                  required: true
                weight:
                  type: decimal
                  precision: 4
                  required: true
            required: true
          rejected_rails:
            type: array
            items:
              type: object
              fields:
                rail:
                  type: enum
                  values_ref: rail_type
                  required: true
                rejection_reason:
                  type: string
                  required: true
            required: true
          alternative_rails:
            type: array
            items:
              type: enum
              values_ref: rail_type
              required: true
      step_sequence:
        type: array
        items:
          type: object
          fields:
            step_order:
              type: integer
              required: true
            phase:
              type: enum
              values_ref: adapter_phase
              required: true
            timeout_ms:
              type: integer
              required: true
            compensation_step:
              type: string
              required: false
              description: Which step to compensate if this step fails
        required: true
      estimated_settlement_time_ms:
        type: integer
        required: true
      compensation_strategy:
        type: enum
        values: [SEQUENTIAL_REVERSE, PARALLEL_ROLLBACK, MANUAL_ESCALATION]
        required: true
      state:
        type: enum
        values: [DRAFT, APPROVED, EXECUTING, COMPLETED, FAILED]
        required: true
      created_at:
        type: timestamp
        required: true

# ============================================================
# SECTION 4 — ROUTING ENGINE
# ============================================================

routing_engine:
  description: >
    Pure evaluation function. Given identical inputs, produces
    identical outputs. Never mutates state.
  type: pure_function
  constitutional_reference: PI-PAY-004

  inputs:
    payment_request:
      type: ref:payment_request
      required: true
    available_rails:
      type: array
      items:
        type: ref:rail_adapter_config
      required: true
    treasury_state:
      type: object
      required: true
      description: Current liquidity and transfer state from Treasury
    vault_state:
      type: object
      required: true
      description: Asset state confirmation from Vault
    policy_constraints:
      type: object
      required: true
      description: Any policy-imposed constraints on rail selection

  evaluation_criteria:
    - criterion: cost
      weight: 0.25
      type: minimize
      description: Estimated transaction fees
    - criterion: speed
      weight: 0.20
      type: minimize
      description: Estimated settlement time
    - criterion: reliability
      weight: 0.25
      type: maximize
      description: Historical success rate of the rail
    - criterion: regulatory_compliance
      weight: 0.20
      type: gate
      description: Rail must satisfy regulatory requirements for the asset type
      gate_behavior: REJECT_IF_FAIL
    - criterion: asset_type_compatibility
      weight: 0.10
      type: gate
      description: Rail must support the asset type being transferred
      gate_behavior: REJECT_IF_FAIL

  output:
    type: routing_decision
    fields:
      selected_rail:
        type: enum
        values_ref: rail_type
      confidence_score:
        type: decimal
        precision: 4
        minimum: 0.0
        maximum: 1.0
      alternative_rails:
        type: array
        items:
          type: enum
          values_ref: rail_type
      rejected_rails:
        type: array
        items:
          type: object
          fields:
            rail: { type: enum, values_ref: rail_type }
            reason: { type: string }

# ============================================================
# SECTION 5 — EXTERNAL RAIL ADAPTERS
# ============================================================
# All adapters are abstract interfaces. No implementation details.
# Every adapter MUST implement: prepare, validate, execute, confirm, reconcile, compensate
# No adapter may mutate constitutional state. Adapters only emit events.
# ============================================================

rail_adapters:

  ACH:
    rail_id: ACH
    rail_type: DOMESTIC_BANK_TRANSFER
    finality_model: DEFERRED_SETTLEMENT
    supported_asset_types: [cash]
    settlement_time_range:
      min_ms: 3600000
      max_ms: 172800000
    retry_config:
      max_retries: 3
      retry_delay_ms: 300000
    interface:
      prepare:
        input: { payment_request_id, amount, sender.rail_account_ref, recipient.rail_account_ref, recipient.rail_metadata }
        output: { rail_preparation_id, status, estimated_settlement_date }
      validate:
        input: { rail_preparation_id }
        output: { valid, errors, warnings }
      execute:
        input: { rail_preparation_id }
        output: { rail_execution_id, rail_trace_number, status, submitted_at }
      confirm:
        input: { rail_execution_id }
        output: { confirmed, confirmation_date, rail_reference_id, actual_amount, fees }
      reconcile:
        input: { rail_reference_id, expected_amount, expected_fees }
        output: { matched, discrepancy, reconciliation_status }
      compensate:
        input: { rail_execution_id, reason }
        output: { compensation_id, status, reversal_rail_reference_id }
    event_emissions:
      prepare: payment.rail.ach.prepared
      execute: payment.rail.ach.executed
      confirm: payment.rail.ach.confirmed
      fail: payment.rail.ach.failed
    prohibition: ADAPTERS_MAY_NOT_MUTATE_CONSTITUTIONAL_STATE

  FEDNOW:
    rail_id: FEDNOW
    rail_type: INSTANT_PAYMENT
    finality_model: IMMEDIATE_SETTLEMENT
    supported_asset_types: [cash]
    settlement_time_range:
      min_ms: 5000
      max_ms: 30000
    retry_config:
