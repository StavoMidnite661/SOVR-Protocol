# -----------------------------------------------------------
# CONDITIONAL CAPABILITY CONSTRAINTS
# -----------------------------------------------------------
# Some capabilities have conditional grants for specific actor types.
# These constraints are enforced at INV-008 gate 2 (capability check)
# and gate 3 (scope validation).
# -----------------------------------------------------------

conditional_constraints:
  - capability_id: treasury.transfer.initiate
    actor_type: ai_agent
    conditions:
      - id: "CT-TRANSFER-001"
        description: "Per-transfer amount limit"
        constraint: "amount <= actor.quota.per_transfer_max"
      - id: "CT-TRANSFER-002"
        description: "Daily cumulative amount limit"
        constraint: "sum(actor.transfers_today.amounts) <= actor.quota.daily_max"
      - id: "CT-TRANSFER-003"
        description: "No self-transfer"
        constraint: "transfer.source_account != transfer.destination_account"

  - capability_id: vault.valuation.update
    actor_type: ai_agent
    conditions:
      - id: "CT-VAL-001"
        description: "Approved valuation source"
        constraint: "valuation.source in actor.config.approved_oracle_list"
      - id: "CT-VAL-002"
        description: "Valuation delta within tolerance"
        constraint: "abs(valuation.new_value - valuation.previous_value) / valuation.previous_value <= actor.config.valuation_tolerance_pct"

  - capability_id: payment.initiate
    actor_type: ai_agent
    conditions:
      - id: "CT-PAY-001"
        description: "Per-payment amount limit"
        constraint: "amount <= actor.quota.per_payment_max"
      - id: "CT-PAY-002"
        description: "Approved payee requirement"
        constraint: "payment.recipient in actor.config.approved_payee_list"
      - id: "CT-PAY-003"
        description: "Policy compliance check"
        constraint: "policy.evaluate(payment_context).decision == ALLOW"

