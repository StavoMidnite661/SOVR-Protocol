# ============================================================
# SOVR Financial OS — Security Capabilities
# File: 08_security-capabilities.yaml
# Status: FROZEN
# Build Phase: D (Security & Intelligence Subsystem)
# ============================================================
# Defines all capabilities (permissions) in SOVR.
# Capabilities are the unit of authority in the system.
# No actor may perform an action without holding the
# corresponding capability scoped to the target resource.
#
# Constitutional references:
#   INV-003: No actor may exceed granted authority
#   INV-004: No agent may create, grant, or modify financial authority
#   INV-008: Gates 2-3 — capability and scope validation
# ============================================================

---
meta:
  schema_version: "1.0.0"
  file_id: "08_security-capabilities"
  total_capabilities: 106
  build_phase: "D"
  status: CONSTITUTIONAL_FREEZE

enums:
  domain:
    - VAULT
    - LEDGER
    - TREASURY
    - IDENTITY
    - POLICY
    - INTENT
    - AGENT
    - PAYMENT
    - GOVERNANCE
  action:
    - CREATE
    - READ
    - UPDATE
    - DELETE
    - EXECUTE
    - GOVERN
    - AUDIT
  risk_level:
    - NONE
    - LOW
    - MEDIUM
    - HIGH
    - CRITICAL
  actor_type:
    - human
    - organization
    - ai_agent
    - service_account
    - governance
    - external_system
    - system

scope_pattern_language:
  syntax: "{resource_type}:{resource_id}:{field}"
  wildcards:
    - token: "*"
      matches: "any single segment value"
    - token: "self"
      matches: "the actor's own resource identifier"
    - token: "**"
      matches: "any remaining path segments recursively"
  examples:
    - pattern: "actor:self:*"
      meaning: "the actor's own identity, all fields"
    - pattern: "asset:{asset_id}:*"
      meaning: "a specific asset, all fields"
    - pattern: "actor:*:trust_level"
      meaning: "any actor's trust level field"
    - pattern: "ledger:account:{account_id}"
      meaning: "a specific ledger account"
    - pattern: "policy:rule:*"
      meaning: "all policy rules"
  enforcement:
    gate: "INV-008"
    stage: "gate_3_scope_validation"
    rule: "scope patterns are matched at INV-008 gate 3 before command execution"

