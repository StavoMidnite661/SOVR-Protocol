apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: sovr-system
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'sovr-api'
        static_configs:
          - targets: ['api:3001']
        metrics_path: /metrics
        scheme: http
      - job_name: 'sovr-event-processor'
        static_configs:
          - targets: ['event-processor:3002']
        metrics_path: /metrics
      - job_name: 'sovr-projection-service'
        static_configs:
          - targets: ['projection-service:3003']
        metrics_path: /metrics
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres:5432']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: sovr-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: sovr-system
spec:
  ports:
    - port: 9090
      targetPort: 9090
  selector:
    app: prometheus
