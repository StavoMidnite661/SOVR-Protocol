apiVersion: apps/v1
kind: Deployment
metadata:
  name: projection-service
  namespace: sovr-system
  labels:
    app: projection-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: projection-service
  template:
    metadata:
      labels:
        app: projection-service
    spec:
      serviceAccountName: sovr-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: projection-service
          image: sovr-worker:latest
          ports:
            - containerPort: 3003
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sovr-secrets
                  key: database-url
            - name: SERVICE_ROLE
              value: projection-service
            - name: WORKER_CONCURRENCY
              value: "4"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: projection-service
  namespace: sovr-system
spec:
  ports:
    - port: 3003
      targetPort: 3003
  selector:
    app: projection-service
