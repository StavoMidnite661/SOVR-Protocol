apiVersion: v1
kind: ServiceAccount
metadata:
  name: sovr-service-account
  namespace: sovr-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sovr-role
  namespace: sovr-system
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sovr-role-binding
  namespace: sovr-system
subjects:
  - kind: ServiceAccount
    name: sovr-service-account
    namespace: sovr-system
roleRef:
  kind: Role
  name: sovr-role
  apiGroup: rbac.authorization.k8s.io
