apiVersion: v1
kind: ConfigMap
metadata:
  name: sovr-config
  namespace: sovr-system
data:
  NODE_ENV: "production"
  API_PORT: "3001"
  API_HOST: "0.0.0.0"
  PROTOCOL_VERSION: "1.1.0"
  LOG_LEVEL: "info"
  DATABASE_SSL_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  METRICS_ENABLED: "true"
  AUDIT_ENABLED: "true"
  FEATURE_STREAMING: "true"
  DATABASE_POOL_MIN: "2"
  DATABASE_POOL_MAX: "20"
  EVENT_STORE_CHECKPOINT_INTERVAL: "1000"
  WORKER_CONCURRENCY: "4"
