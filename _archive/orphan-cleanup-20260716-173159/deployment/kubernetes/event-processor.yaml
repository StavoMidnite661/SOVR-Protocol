apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-processor
  namespace: sovr-system
  labels:
    app: event-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: event-processor
  template:
    metadata:
      labels:
        app: event-processor
    spec:
      serviceAccountName: sovr-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: event-processor
          image: sovr-worker:latest
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sovr-secrets
                  key: database-url
            - name: SERVICE_ROLE
              value: event-processor
            - name: WORKER_CONCURRENCY
              value: "4"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: event-processor
  namespace: sovr-system
spec:
  ports:
    - port: 3002
      targetPort: 3002
  selector:
    app: event-processor
