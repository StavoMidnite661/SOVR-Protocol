version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sovr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovr_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-sovr_protocol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sovr}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sovr-network

  api:
    build:
      context: ..
      dockerfile: deployment/api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3001}
      DATABASE_URL: postgres://${POSTGRES_USER:-sovr}:${POSTGRES_PASSWORD:-sovr_secure_password}@postgres:5432/${POSTGRES_DB:-sovr_protocol}
      PROTOCOL_VERSION: ${PROTOCOL_VERSION:-1.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - sovr-network

  worker:
    build:
      context: ..
      dockerfile: deployment/worker/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-sovr}:${POSTGRES_PASSWORD:-sovr_secure_password}@postgres:5432/${POSTGRES_DB:-sovr_protocol}
      PROTOCOL_VERSION: ${PROTOCOL_VERSION:-1.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
    networks:
      - sovr-network

  event-processor:
    build:
      context: ..
      dockerfile: deployment/worker/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-sovr}:${POSTGRES_PASSWORD:-sovr_secure_password}@postgres:5432/${POSTGRES_DB:-sovr_protocol}
      PROTOCOL_VERSION: ${PROTOCOL_VERSION:-1.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      SERVICE_ROLE: event-processor
    networks:
      - sovr-network

  projection-service:
    build:
      context: ..
      dockerfile: deployment/worker/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-sovr}:${POSTGRES_PASSWORD:-sovr_secure_password}@postgres:5432/${POSTGRES_DB:-sovr_protocol}
      PROTOCOL_VERSION: ${PROTOCOL_VERSION:-1.1.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-4}
      SERVICE_ROLE: projection-service
    networks:
      - sovr-network

volumes:
  postgres_data:

networks:
  sovr-network:
    driver: bridge
