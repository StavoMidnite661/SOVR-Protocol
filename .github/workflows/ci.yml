name: SOVR Protocol CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install compiler dependencies
        working-directory: packages/compiler
        run: npm ci

      - name: Validate all YAML files parse correctly
        run: |
          node -e "
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const path = require('path');
          function walk(dir) {
            let results = [];
            for (const entry of fs.readdirSync(dir, {withFileTypes: true})) {
              if (entry.name === 'node_modules' || entry.name === '.git' || entry.name === '_archive') continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) results = results.concat(walk(full));
              else if (entry.name.endsWith('.yaml') || entry.name.endsWith('.yml')) results.push(full);
            }
            return results;
          }
          const files = walk('.');
          let ok = 0, fail = 0;
          for (const f of files) {
            try { yaml.load(fs.readFileSync(f, 'utf8'), {json: true}); ok++; }
            catch(e) { fail++; console.error('FAIL:', f, e.message.split('\n')[0]); }
          }
          console.log(ok + '/' + (ok+fail) + ' YAML files parse OK');
          if (fail > 0) process.exit(1);
          "

  compile:
    name: Compile Protocol
    runs-on: ubuntu-latest
    needs: yaml-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install compiler dependencies
        working-directory: packages/compiler
        run: npm ci

      - name: Build compiler
        working-directory: packages/compiler
        run: npm run build

      - name: Compile YAML → Runtime Artifacts
        working-directory: packages/compiler
        run: node dist/cli.js compile

      - name: Verify zero diagnostics
        run: |
          node -e "
          const manifest = require('./generated/compiler-manifest.yaml' ) || {};
          // Parse the manifest to check diagnostics
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const m = yaml.load(fs.readFileSync('generated/compiler-manifest.yaml', 'utf8'));
          console.log('Errors:', m.stats.errors, 'Warnings:', m.stats.warnings);
          if (m.stats.errors > 0) { console.error('FAIL: errors > 0'); process.exit(1); }
          "

      - name: Verify byte-identical reproducibility
        working-directory: packages/compiler
        run: node dist/cli.js verify

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-artifacts
          path: generated/

  boot:
    name: Boot Sequence
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install compiler dependencies
        working-directory: packages/compiler
        run: npm ci

      - name: Build compiler
        working-directory: packages/compiler
        run: npm run build

      - name: Run boot sequence (8 runlevels)
        working-directory: packages/compiler
        run: node dist/cli.js boot

      - name: Verify boot attestation
        run: |
          node -e "
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const attestation = JSON.parse(fs.readFileSync('generated/boot-attestation.json', 'utf8'));
          const manifest = yaml.load(fs.readFileSync('generated/compiler-manifest.yaml', 'utf8'));
          if (attestation.build_hash !== manifest.build_hash) {
            console.error('FAIL: boot attestation build_hash mismatch');
            process.exit(1);
          }
          if (attestation.final_health !== 'HEALTHY') {
            console.error('FAIL: system not HEALTHY after boot');
            process.exit(1);
          }
          console.log('✓ Boot attestation verified — build_hash matches, system HEALTHY');
          "
