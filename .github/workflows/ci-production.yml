name: SOVR Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install compiler dependencies
        working-directory: packages/compiler
        run: npm ci
      - name: Validate all YAML files
        run: |
          node -e "
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const path = require('path');
          function walk(dir) {
            let results = [];
            for (const entry of fs.readdirSync(dir, {withFileTypes: true})) {
              if (['node_modules','.git','_archive'].includes(entry.name)) continue;
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) results = results.concat(walk(full));
              else if (entry.name.endsWith('.yaml') || entry.name.endsWith('.yml')) results.push(full);
            }
            return results;
          }
          const files = walk('.');
          let ok = 0, fail = 0;
          for (const f of files) {
            try { yaml.load(fs.readFileSync(f, 'utf8'), {json: true}); ok++; }
            catch(e) { fail++; console.error('FAIL:', f, e.message.split('\n')[0]); }
          }
          console.log(ok + '/' + (ok+fail) + ' YAML files valid');
          if (fail > 0) process.exit(1);
          "

  compile-and-verify:
    name: Compile & Verify
    runs-on: ubuntu-latest
    needs: yaml-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install compiler
        working-directory: packages/compiler
        run: npm ci
      - name: Build compiler
        working-directory: packages/compiler
        run: npm run build
      - name: Compile protocol
        working-directory: packages/compiler
        run: node dist/cli.js compile
      - name: Verify zero diagnostics
        run: |
          node -e "
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const m = yaml.load(fs.readFileSync('generated/compiler-manifest.yaml', 'utf8'));
          console.log('Errors:', m.stats.errors, 'Warnings:', m.stats.warnings);
          console.log('IR nodes:', m.stats.ir_nodes, 'Generated files:', m.stats.generated_files);
          console.log('Build hash:', m.build_hash);
          if (m.stats.errors > 0) process.exit(1);
          "
      - name: Verify reproducibility
        working-directory: packages/compiler
        run: node dist/cli.js verify
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sovr-generated
          path: generated/

  boot-sequence:
    name: Boot Sequence (8 Runlevels)
    runs-on: ubuntu-latest
    needs: compile-and-verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install compiler
        working-directory: packages/compiler
        run: npm ci
      - name: Build compiler
        working-directory: packages/compiler
        run: npm run build
      - name: Boot kernel
        working-directory: packages/compiler
        run: node dist/cli.js boot
      - name: Verify boot attestation
        run: |
          node -e "
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const attestation = JSON.parse(fs.readFileSync('generated/boot-attestation.json', 'utf8'));
          const manifest = yaml.load(fs.readFileSync('generated/compiler-manifest.yaml', 'utf8'));
          if (attestation.build_hash !== manifest.build_hash) {
            console.error('FAIL: build_hash mismatch'); process.exit(1);
          }
          if (attestation.final_health !== 'HEALTHY') {
            console.error('FAIL: not HEALTHY'); process.exit(1);
          }
          console.log('✓ Boot attestation verified — build_hash matches, system HEALTHY');
          "

  constitutional-audit:
    name: Constitutional Audit
    runs-on: ubuntu-latest
    needs: compile-and-verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install compiler
        working-directory: packages/compiler
        run: npm ci
      - name: Build compiler
        working-directory: packages/compiler
        run: npm run build
      - name: Compile and audit invariants
        run: |
          node -e "
          const yaml = require('./packages/compiler/node_modules/js-yaml');
          const fs = require('fs');
          const constitution = yaml.load(fs.readFileSync('01_constitution.yaml', 'utf8'));
          const invariants = constitution.invariants || [];
          console.log('Invariants found:', invariants.length);
          for (const inv of invariants) {
            console.log('  ' + inv.id + ': ' + inv.name + ' [' + inv.violation_severity + ']');
          }
          if (invariants.length < 10) {
            console.error('FAIL: expected 10 invariants, got ' + invariants.length);
            process.exit(1);
          }
          console.log('\\n✓ All 10 constitutional invariants present');
          "
