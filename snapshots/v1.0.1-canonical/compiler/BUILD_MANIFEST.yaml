# ============================================================
# SOVR Financial OS — Deterministic Build Manifest (Definition)
# File: compiler/BUILD_MANIFEST.yaml
# Phase: 4.6 — Deterministic Build Manifest
# Status: ARCHITECTURE_ONLY (Rule Zero — no implementation)
# ============================================================
# This file defines the SCHEMA and REPRODUCIBILITY RULES of the
# deterministic build manifest the compiler emits at PASS-019
# (MANIFEST_GENERATION). The manifest is itself a generated
# artifact; this document specifies its contract. Two identical
# repositories shall produce byte-identical manifests.
#
# Authority: compiler.yaml, SEMANTIC_COMPILER_CONTRACT.yaml
# (determinism.build_hash, certification.deterministic_build_hash).
# On divergence, frozen specs prevail.
# ============================================================

manifest:
  schema_version: "1.0.0"
  description: >
    Generated by PASS-019. Content-addressable record of a build.
    Reproducibility is the core invariant: identical inputs + compiler
    version yield a byte-identical manifest.

# ------------------------------------------------------------
# MANIFEST FIELDS
# ------------------------------------------------------------
fields:

  - field: protocol_version
    type: string
    source: 00_protocol-manifest.yaml
    example: "1.0.0"

  - field: compiler_version
    type: string
    source: compiler identity
    example: "0.1.0-arch"
    note: must be pinned; version drift changes build_hash

  - field: protocol_target_version
    type: string
    source: SEMANTIC_COMPILER_CONTRACT.target_protocol_version
    example: "1.0.1"

  - field: input_hashes
    type: map<file_path, sha256>
    source: DISCOVERY_MANIFEST + parsed bytes
    note: every input file's sha256; keys sorted lexicographically

  - field: ir_hash
    type: sha256
    source: PASS-013 IR_GENERATION
    note: content hash of canonical SOVR_IR serialization

  - field: output_hashes
    type: map<artifact_path, sha256>
    source: all generated artifacts
    note: every generated file's sha256; keys sorted lexicographically

  - field: generation_order
    type: list<generator_id>
    source: GENERATOR_REGISTRY order
    note: stable, registered order

  - field: generator_versions
    type: map<generator_id, version>
    source: GENERATOR_REGISTRY

  - field: registry_versions
    type: map<registry, version>
    source: [DOMAIN_REGISTRY, AGGREGATE_REGISTRY, METADATA_STANDARD, ACCEPTANCE_STANDARD]

  - field: build_hash
    type: sha256
    source: >
      sha256(sorted(input_hashes) + ir_hash + sorted(output_hashes)
            + compiler_version + registry_versions + generation_order)
    note: single digest summarizing the entire reproducible build

# ------------------------------------------------------------
# TIMESTAMP POLICY
# ------------------------------------------------------------
timestamp_policy:
  wall_clock_in_manifest: PROHIBITED
  generated_at_field: omitted_or_canonical_only
  rationale: >
    Any wall-clock value would break byte-identical reproducibility.
    Provenance is captured by content hashes, not time.

# ------------------------------------------------------------
# REPRODUCIBILITY RULES
# ------------------------------------------------------------
reproducibility_rules:
  - R1: input set is the closed discovery frontier (no hidden inputs)
  - R2: file lists are sorted before hashing
  - R3: IR serialization is canonical (sorted keys, NFC, LF)
  - R4: no randomness in any generation stage
  - R5: no wall-clock or environment-variable leakage into outputs
  - R6: generator dispatch order is the registered stable order
  - R7: output paths are deterministic functions of the IR
  - R8: build_hash incorporates compiler_version + registry_versions
  - R9: identical inputs + identical compiler version => byte-identical manifest
  - R10: environmental isolation — build does not depend on host state

# ------------------------------------------------------------
# VERIFICATION OF REPRODUCIBILITY
# ------------------------------------------------------------
verification:
  method: build twice from the same commit; diff manifests
  expected: zero differences (byte-identical)
  on_difference: FAIL_BUILD with CERT diagnostic (CERT-002 if untraceable)

