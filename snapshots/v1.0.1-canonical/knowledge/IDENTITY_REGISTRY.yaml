identity_registry:
  schema_version: 1.0.0
  protocol_version: 1.0.0
  phase: constitutional_digital_twin
  principle: NO_OBJECT_WITHOUT_IDENTITY
  id_format: SOVR-<TYPE>-<6DIGIT>
  prefixes:
    PROT: Protocol
    DOM: Domain
    ENT: Entity
    VO: ValueObject
    AGG: Aggregate
    CMD: Command
    EVT: Event
    POL: Policy
    CAP: Capability
    SAG: Saga
    SM: StateMachine
    PRJ: Projection
    REP: Repository
    INV: Invariant
    AT: AcceptanceTest
    CERT: Certification
    PASS: CompilerPass
    GEN: Generator
    AMD: Amendment
    FND: Finding
    EVD: Evidence
    MAN: Manifest
  totals:
    Protocol: 1
    Domain: 9
    Entity: 47
    Aggregate: 18
    Command: 89
    Event: 134
    Policy: 69
    Capability: 58
    StateMachine: 20
    Invariant: 10
    AcceptanceTest: 76
    CompilerPass: 20
    Generator: 9
    Amendment: 12
    Finding: 15
  note: Saga objects (16) are not enumerated individually because 09_saga-orchestration.yaml is invalid YAML (G-01) and cannot be parsed without an amendment. They will be assigned SOVR-SAG identities when the amendment AMD-0001 restores parseability. Acceptance test count totals 105 per inventory; 41 concrete tests are registered here, the remainder are parameterized templates (CMD/SM sections).
