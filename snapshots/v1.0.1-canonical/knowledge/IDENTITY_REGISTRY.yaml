- id: SOVR-INV-000001
  type: Invariant
  name: event_immutability
  source: 01_constitution.yaml
  rule: Every state change requires an immutable event
- id: SOVR-INV-000002
  type: Invariant
  name: double_entry_balance
  source: 01_constitution.yaml
  rule: No ledger mutation without balanced journal entry
- id: SOVR-INV-000003
  type: Invariant
  name: authority_boundary
  source: 01_constitution.yaml
  rule: No actor may exceed granted authority
- id: SOVR-INV-000004
  type: Invariant
  name: agent_financial_authority_prohibition
  source: 01_constitution.yaml
  rule: No agent may create, grant, or modify financial authority
- id: SOVR-INV-000005
  type: Invariant
  name: audit_trail_completeness
  source: 01_constitution.yaml
  rule: Every financial action must produce an auditable event trail
- id: SOVR-INV-000006
  type: Invariant
  name: event_describes_does_not_mutate
  source: 01_constitution.yaml
  rule: Events do not mutate reality. Events describe reality. Projections interpret reality.
- id: SOVR-INV-000007
  type: Invariant
  name: value_preservation_priority
  source: 01_constitution.yaml
  rule: Value preservation outranks execution speed
- id: SOVR-INV-000008
  type: Invariant
  name: command_execution_gates
  source: 01_constitution.yaml
  rule: No command executes without identity, capability, scope, and policy validation
- id: SOVR-INV-000009
  type: Invariant
  name: unknown_state_representation
  source: 01_constitution.yaml
  rule: Unknown financial states must be represented explicitly, never hidden
- id: SOVR-INV-000010
  type: Invariant
  name: no_autonomous_constitutional_bypass
  source: 01_constitution.yaml
  rule: No autonomous agent may bypass constitutional enforcement
