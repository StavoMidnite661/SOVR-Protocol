# ============================================================
# SOVR Financial OS — Dependency Graph
# File: DEPENDENCY_GRAPH.yaml
# ============================================================

dependencies:
  kernel:
    depends_on: []
    forbidden: [business logic, domain rules]

  governance:
    depends_on: [kernel]
    forbidden: [domain business logic]

  vault:
    depends_on: [kernel, governance]
    forbidden: [treasury, payment, UI]

  ledger:
    depends_on: [kernel, governance]
    forbidden: [treasury, payment, UI]

  treasury:
    depends_on: [kernel, governance]
    forbidden: [payment, UI]

  payment:
    depends_on: [kernel, governance]
    forbidden: [treasury, UI]

  identity:
    depends_on: [kernel, governance]
    forbidden: [payment, UI]

  policy:
    depends_on: [kernel, governance]
    forbidden: [UI]

  intent:
    depends_on: [kernel, governance]
    forbidden: [UI]

  runtime:
    depends_on: [kernel]
    forbidden: [UI]

  compiler:
    depends_on: [kernel]
    forbidden: [domain business logic]

  projection:
    depends_on: [kernel]
    forbidden: [UI]

  certification:
    depends_on: [all domains]
    forbidden: [UI]

  settlement:
    depends_on: [kernel, payment, treasury]
    forbidden: [UI]

  infrastructure:
    depends_on: [all domains]
    forbidden: [domain business logic]
