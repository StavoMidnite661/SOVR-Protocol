    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  governance.policy_rule.review:
    aggregate: policy_rule
    source_domain: governance
    version: 1.0.0
    description: Review a policy rule before activation
    issuer:
      actor_types: [human, governance]
      minimum_capability: governance.policy.review
    authorization_requirements:
      identity: required
      capability: governance.policy.review
      scope: policy:rule:{rule_id}
      policy: policy_review_policy
    validation_rules:
      - rule: policy_rule_must_exist
        check: policy_rule with rule_id exists
        on_failure: REJECT
      - rule: policy_rule_must_be_draft
