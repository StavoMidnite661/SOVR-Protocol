  governance.capability.grant:
    aggregate: capability_grant
    source_domain: governance
    version: 1.0.0
    description: Grant a capability to an actor
    issuer:
      actor_types: [governance]
      minimum_capability: governance.capability.grant
    authorization_requirements:
      identity: required
      capability: governance.capability.grant
      scope: capability:{capability_id}
      policy: capability_management_policy
    validation_rules:
      - rule: capability_exists
        check: capability_id exists in security-capabilities
        on_failure: REJECT
      - rule: target_actor_exists
        check: actor_id references verified identity
        on_failure: REJECT
      - rule: scope_pattern_valid
        check: scope_pattern matches scope_pattern_language syntax
        on_failure: REJECT
      - rule: governance_approval_obtained
        check: governance_approval_id is provided
        on_failure: REJECT
    required_payload:
      - capability_id
      - actor_id
      - scope_pattern
      - expires_at
      - conditions
    resulting_events:
      success: [governance.capability.granted]
      failure: [governance.capability.grant_failed]
    failure_conditions:
      - capability_not_found
      - actor_not_found
      - invalid_scope_pattern
      - governance_approval_missing
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  governance.capability.revoke:
    aggregate: capability_grant
    source_domain: governance
    version: 1.0.0
    description: Revoke a capability from an actor
    issuer:
      actor_types: [governance]
      minimum_capability: governance.capability.revoke
    authorization_requirements:
      identity: required
      capability: governance.capability.revoke
      scope: capability:{capability_id}
      policy: capability_management_policy
    validation_rules:
      - rule: capability_grant_exists
        check: active capability grant exists for actor_id + capability_id
        on_failure: REJECT
      - rule: not_governance_only_capability
        check: capability_id is not governance-only
        on_failure: REJECT
    required_payload:
