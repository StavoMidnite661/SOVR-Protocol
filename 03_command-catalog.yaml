      - rule: target_domains_specified
        check: target_domains is non-empty
        on_failure: REJECT
    required_payload:
      - audit_type
      - target_domains
      - start_date
      - end_date
      - filters
    resulting_events:
      success: [governance.audit.queried]
      failure: [governance.audit.query_failed]
    failure_conditions:
      - invalid_time_range
      - missing_target_domains
      - unauthorized_domain_access
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

