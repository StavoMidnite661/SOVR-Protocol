    validation_rules:
      - rule: actor_type_must_be_recognized
        check: actor_type in [human, organization, ai_agent, service_account, external_system]
        on_failure: REJECT
      - rule: display_name_must_not_be_empty
        check: display_name is non-empty string
        on_failure: REJECT
      - rule: legal_identifier_format_valid_if_provided
        check: if legal_identifier provided, it matches expected format for actor_type
        on_failure: REJECT
    produces_events:
      - identity.actor.registered
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  identity.actor.verify:
    aggregate: actor
    source_domain: identity
    version: 1.0.0
    description: Verify an actor that is in PENDING_VERIFICATION state, confirming their identity
    issuer:
      actor_types: [governance]
      minimum_capability: identity.actor.verify
    authorization_requirements:
      identity: required
      capability: identity.actor.verify
      scope: actor_id
      policy: identity_verification_policy
    validation_rules:
      - rule: actor_must_be_in_pending_verification_state
        check: actor.state == PENDING_VERIFICATION
        on_failure: REJECT
      - rule: governance_must_have_verify_authority
        check: caller governance identity has verification authority
        on_failure: REJECT
    produces_events:
      - identity.actor.verified
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  identity.actor.suspend:
    aggregate: actor
    source_domain: identity
    version: 1.0.0
    description: Suspend an active actor, temporarily revoking their ability to act in the system
    issuer:
      actor_types: [governance]
      minimum_capability: identity.actor.suspend
    authorization_requirements:
      identity: required
      capability: identity.actor.suspend
      scope: actor_id
      policy: identity_suspension_policy
    validation_rules:
      - rule: actor_must_be_active
        check: actor.state == ACTIVE
        on_failure: REJECT
      - rule: suspension_reason_must_be_provided
        check: reason is non-empty string
        on_failure: REJECT
    produces_events:
      - identity.actor.suspended
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  identity.actor.revoke:
    aggregate: actor
    source_domain: identity
    version: 1.0.0
    description: Revoke an actor permanently, removing their ability to act in the system
    issuer:
      actor_types: [governance]
      minimum_capability: identity.actor.revoke
    authorization_requirements:
      identity: required
      capability: identity.actor.revoke
      scope: actor_id
      policy: identity_revocation_policy
    validation_rules:
      - rule: actor_must_be_active_or_suspended
        check: actor.state in [ACTIVE, SUSPENDED]
        on_failure: REJECT
      - rule: revocation_reason_must_be_provided
        check: reason is non-empty string
        on_failure: REJECT
    produces_events:
      - identity.actor.revoked
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  identity.actor.archive:
    aggregate: actor
    source_domain: identity
    version: 1.0.0
    description: Archive a revoked actor record for long-term retention and compliance
    issuer:
      actor_types: [governance, system]
      minimum_capability: identity.actor.archive
    authorization_requirements:
      identity: required
      capability: identity.actor.archive
      scope: actor_id
      policy: identity_archive_policy
    validation_rules:
      - rule: actor_must_be_revoked
