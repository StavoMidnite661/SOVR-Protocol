      policy_required: true
      capability_required: true
      invariants: []

  governance.escalation.resolve:
    aggregate: escalation
    source_domain: governance
    version: 1.0.0
    description: Resolve a pending governance escalation
    issuer:
      actor_types: [human, governance]
      minimum_capability: governance.escalation.resolve
    authorization_requirements:
