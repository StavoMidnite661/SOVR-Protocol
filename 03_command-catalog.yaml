# ============================================================
# SOVR Financial OS — Command Catalog
# File: 03_command-catalog.yaml
# Status: FROZEN — Phase J (Protocol Closure) complete
# ============================================================
# Defines the universe of commands (intents to act) in SOVR.
# This file is populated domain-by-domain.
# Current domains: Vault, Ledger, Treasury, Identity, Policy, Intent, Agent, Payment | Fix: constitutional_gates retrofitted, Payment registered
# ============================================================

commands:

  # ========================================================
  # VAULT DOMAIN COMMANDS
  # ========================================================

  vault.asset.register:
    aggregate: asset
    source_domain: vault
    version: 1.0.0
    description: Register a new asset into the SOVR Vault
    issuer:
      actor_types: [human, governance]
      minimum_capability: vault.asset.create
    authorization_requirements:
      identity: required
      capability: vault.asset.create
      scope: custody_location
      policy: vault_registration_policy
    validation_rules:
      - rule: asset_id_must_be_globally_unique
        check: no_existing_asset_with_same_id
        on_failure: REJECT
      - rule: asset_type_must_be_recognized
        check: asset_type_in [cash, stablecoin, tokenized_asset, collateral_position, liquidity_position, external_claim]
        on_failure: REJECT
      - rule: issuer_identity_must_be_verified
        check: identity.state == VERIFIED
        on_failure: REJECT
      - rule: quantity_or_face_value_must_be_positive
        check: (quantity > 0) OR (face_value > 0)
        on_failure: REJECT
      - rule: custody_location_must_be_registered
        check: custody_location exists in registered custody targets
        on_failure: REJECT
      - rule: ownership_id_must_be_verified_identity
        check: identity with ownership_id exists and is VERIFIED
        on_failure: REJECT
    required_payload:
      - asset_id
      - asset_type
      - issuer_id
      - face_value        # if cash or stablecoin
      - quantity           # if tokenized, liquidity
      - custody_location
      - ownership_id
      - valuation_source
      - native_unit
      - precision
    resulting_events:
      success: [vault.asset.registered]
      failure: [vault.asset.registration_failed]
    failure_conditions:
      - duplicate_asset_id
      - unrecognized_asset_type
      - unverified_issuer
      - invalid_amount
      - unregistered_custody_location
      - unverified_owner
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.asset.verify:
    aggregate: asset
    source_domain: vault
    version: 1.0.0
    description: Verify the existence and correctness of a registered asset
    issuer:
      actor_types: [human, governance, system]
      minimum_capability: vault.asset.verify
    authorization_requirements:
      identity: required
      capability: vault.asset.verify
      scope: asset_id
      policy: vault_verification_policy
    validation_rules:
      - rule: asset_must_exist
        check: asset with asset_id exists
        on_failure: REJECT
      - rule: asset_must_be_in_registered_state
        check: asset.state == REGISTERED
        on_failure: REJECT
      - rule: attestation_proof_required
        check: attestation_proof provided and non-empty
        on_failure: REJECT
      - rule: attester_must_be_trusted
        check: attester_id in trusted_attesters
        on_failure: REJECT
    required_payload:
      - asset_id
      - attester_id
      - attestation_proof
      - verification_method
    resulting_events:
      success: [vault.asset.verified, vault.custody.attested]
      failure: [vault.asset.rejected]
    failure_conditions:
      - asset_not_found
      - asset_not_in_registered_state
      - missing_attestation
      - untrusted_attester
      - attestation_invalid
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.asset.reject:
    aggregate: asset
    source_domain: vault
    version: 1.0.0
    description: Reject a registered asset that fails verification
    issuer:
      actor_types: [human, governance]
      minimum_capability: vault.asset.verify
    authorization_requirements:
      identity: required
      capability: vault.asset.verify
      scope: asset_id
      policy: vault_verification_policy
    validation_rules:
      - rule: asset_must_exist
        check: asset with asset_id exists
        on_failure: REJECT
      - rule: asset_must_be_rejectable
        check: asset.state in [REGISTERED, VERIFIED]
        on_failure: REJECT
      - rule: rejection_reason_required
        check: reason is non-empty string
        on_failure: REJECT
    required_payload:
      - asset_id
      - reason
    resulting_events:
      success: [vault.asset.rejected]
      failure: [vault.asset.rejection_failed]
    failure_conditions:
      - asset_not_found
      - asset_not_rejectable
      - missing_reason
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.reserve.create:
    aggregate: reservation
    source_domain: vault
    version: 1.0.0
    description: Create a reservation against available value
    issuer:
      actor_types: [human, ai_agent, system]
      minimum_capability: vault.reserve.create
    authorization_requirements:
      identity: required
      capability: vault.reserve.create
      scope: asset_id
      policy: vault_reservation_policy
    validation_rules:
      - rule: asset_must_be_available
        check: asset.state == AVAILABLE
        on_failure: REJECT
      - rule: actor_must_have_reserve_control
        check: actor has reserve_control authority on asset_id
        on_failure: REJECT
      - rule: amount_must_be_positive
        check: amount > 0
        on_failure: REJECT
      - rule: amount_must_not_exceed_available_balance
        check: amount <= balance.available_balance for asset_id
        on_failure: REJECT
      - rule: no_conflicting_reservation
        check: no overlapping active reservation for same asset portion
        on_failure: REJECT
      - rule: expiration_must_be_in_future
        check: expiration > now
        on_failure: REJECT
      - rule: expiration_within_max_duration
        check: (expiration - now) <= 86400s
        on_failure: REJECT
    required_payload:
      - asset_id
      - amount
      - expiration
      - purpose
    auto_generated:
      - reservation_id: uuid
      - initiating_command_id: this command's id
      - actor_id: from identity context
      - created_at: now
    resulting_events:
      success: [vault.reserve.created]
      failure: [vault.reserve.creation_failed]
    failure_conditions:
      - asset_not_available
      - insufficient_balance
      - no_reserve_authority
      - conflicting_reservation
      - invalid_expiration
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.reserve.lock:
    aggregate: reservation
    source_domain: vault
    version: 1.0.0
    description: Lock a pending reservation, committing the value
    issuer:
      actor_types: [human, ai_agent, system]
      minimum_capability: vault.reserve.lock
    authorization_requirements:
      identity: required
      capability: vault.reserve.lock
      scope: asset_id
      policy: vault_reservation_policy
    validation_rules:
      - rule: reservation_must_exist
        check: reservation with reservation_id exists
        on_failure: REJECT
      - rule: reservation_must_be_pending
        check: reservation.state == PENDING
        on_failure: REJECT
      - rule: reservation_must_not_be_expired
        check: reservation.expiration > now
        on_failure: REJECT
      - rule: available_balance_still_sufficient
        check: reservation.amount <= balance.available_balance
        on_failure: REJECT
    required_payload:
      - reservation_id
      - expected_consuming_transaction_id
    auto_generated:
      - lock_id: uuid
      - locked_at: now
    resulting_events:
      success: [vault.reserve.locked]
      failure: [vault.reserve.lock_failed]
    failure_conditions:
      - reservation_not_found
      - reservation_not_pending
      - reservation_expired
      - balance_insufficient
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.reserve.release:
    aggregate: reservation
    source_domain: vault
    version: 1.0.0
    description: Release a reservation, returning value to available pool
    issuer:
      actor_types: [human, governance, system]
      minimum_capability: vault.reserve.release
    authorization_requirements:
      identity: required
      capability: vault.reserve.release
      scope: asset_id
      policy: vault_reservation_policy
    validation_rules:
      - rule: reservation_must_exist
        check: reservation with reservation_id exists
        on_failure: REJECT
      - rule: reservation_must_be_releasable
        check: reservation.state in [PENDING, ACTIVE]
        on_failure: REJECT
      - rule: release_reason_required_if_active
        check: if reservation.state == ACTIVE then reason is non-empty
        on_failure: REJECT
    required_payload:
      - reservation_id
      - reason
    auto_generated:
      - released_at: now
    resulting_events:
      success: [vault.reserve.released]
      failure: [vault.reserve.release_failed]
    failure_conditions:
      - reservation_not_found
      - reservation_not_releasable
      - missing_reason_for_active_release
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.reserve.expire:
    aggregate: reservation
    source_domain: vault
    version: 1.0.0
    description: System-generated command when a reservation expires
    issuer:
      actor_types: [system]
      minimum_capability: system.internal
    authorization_requirements:
      identity: exempt  # system command
      capability: system.internal
      scope: none
      policy: none
    validation_rules:
      - rule: reservation_must_exist
        check: reservation with reservation_id exists
        on_failure: NOOP
      - rule: reservation_must_be_expirable
        check: reservation.state in [PENDING, ACTIVE]
        on_failure: NOOP
      - rule: expiration_must_have_passed
        check: reservation.expiration <= now
        on_failure: NOOP
    required_payload:
      - reservation_id
    auto_generated:
      - expired_at: now
    resulting_events:
      success: [vault.reserve.expired]
      failure: []  # system command silently no-ops on failure
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.collateral.add:
    aggregate: collateral
    source_domain: vault
    version: 1.0.0
    description: Pledge an asset as collateral for an obligation
    issuer:
      actor_types: [human]
      minimum_capability: vault.collateral.create
    authorization_requirements:
      identity: required
      capability: vault.collateral.create
      scope: asset_id
      policy: collateral_policy
    validation_rules:
      - rule: asset_must_be_eligible_for_collateral
        check: asset quality_score >= 0.6 AND asset.type in eligible_types
        on_failure: REJECT
      - rule: ownership_must_be_verified
        check: asset.ownership_id == actor_id
        on_failure: REJECT
      - rule: no_conflicting_collateral_position
        check: no active collateral for same asset_id and obligation_id
        on_failure: REJECT
      - rule: concentration_limits_not_exceeded
        check: adding this collateral would not breach any concentration limit
        on_failure: REJECT
      - rule: obligation_must_exist
        check: obligation with obligation_id exists
        on_failure: REJECT
    required_payload:
      - asset_id
      - obligation_id
      - haircut_override  # optional, defaults to asset type default
    auto_generated:
      - collateral_id: uuid
      - gross_value: from current valuation
      - effective_value: gross_value * (1 - haircut_rate)
      - quality_score: computed from score factors
      - created_at: now
    resulting_events:
      success: [vault.collateral.added, vault.collateral.valued]
      failure: [vault.collateral.addition_failed]
    failure_conditions:
      - asset_not_eligible
      - ownership_mismatch
      - conflicting_collateral
      - concentration_limit_exceeded
      - obligation_not_found
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.collateral.remove:
    aggregate: collateral
    source_domain: vault
    version: 1.0.0
    description: Release collateral after obligation is satisfied
    issuer:
      actor_types: [human, governance]
      minimum_capability: vault.collateral.release
    authorization_requirements:
      identity: required
      capability: vault.collateral.release
      scope: asset_id
      policy: collateral_policy
    validation_rules:
      - rule: collateral_must_exist
        check: collateral with collateral_id exists
        on_failure: REJECT
      - rule: release_conditions_must_be_met
        check: obligation satisfied OR obligation amount reduced sufficiently
        on_failure: REJECT
      - rule: margin_ratio_must_remain_above_maintenance
        check: (remaining_collateral - this_collateral) / obligation >= 0.80
        on_failure: REJECT
    required_payload:
      - collateral_id
      - release_reason
    auto_generated:
      - released_at: now
    resulting_events:
      success: [vault.collateral.released]
      failure: [vault.collateral.release_failed]
    failure_conditions:
      - collateral_not_found
      - release_conditions_not_met
      - margin_ratio_would_breach
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.collateral.revalue:
    aggregate: collateral
    source_domain: vault
    version: 1.0.0
    description: Update collateral valuation
    issuer:
      actor_types: [system, governance]
      minimum_capability: vault.collateral.evaluate
    authorization_requirements:
      identity: required_for_governance, exempt_for_system
      capability: vault.collateral.evaluate
      scope: asset_id
      policy: collateral_policy
    validation_rules:
      - rule: collateral_must_exist
        check: collateral with collateral_id exists
        on_failure: REJECT
      - rule: valuation_source_must_be_trusted
        check: valuation_source in trusted_sources
        on_failure: REJECT
      - rule: valuation_must_not_be_stale
        check: valuation.age < staleness_threshold
        on_failure: REJECT
    required_payload:
      - collateral_id
      - new_valuation
      - valuation_source
      - valuation_source_type
    auto_generated:
      - revalued_at: now
      - value_change: new_valuation - previous_valuation
      - new_effective_value: new_valuation * (1 - haircut_rate)
    resulting_events:
      success: [vault.collateral.revalued]
      conditional: [vault.collateral.margin_call]  # emitted if ratio < maintenance
      failure: [vault.collateral.revaluation_failed]
    failure_conditions:
      - collateral_not_found
      - untrusted_valuation_source
      - stale_valuation
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.asset.reconcile:
    aggregate: reconciliation
    source_domain: vault
    version: 1.0.0
    description: Initiate reconciliation of vault state against external reality
    issuer:
      actor_types: [governance, system]
      minimum_capability: vault.reconcile
    authorization_requirements:
      identity: required
      capability: vault.reconcile
      scope: asset_id or actor_id
      policy: reconciliation_policy
    validation_rules:
      - rule: no_concurrent_reconciliation
        check: no active reconciliation for same scope
        on_failure: REJECT
      - rule: external_data_provided
        check: external_proof or external_data is non-empty
        on_failure: REJECT
    required_payload:
      - scope
      - asset_id           # if scope is single_asset
      - actor_id           # if scope is actor_holdings
      - external_proof
    auto_generated:
      - reconciliation_id: uuid
      - started_at: now
    resulting_events:
      success: [vault.reconciliation.started]
      conditional: [vault.reconciliation.completed, vault.reconciliation.discrepancy_found]
      failure: [vault.reconciliation.failed]
    failure_conditions:
      - concurrent_reconciliation
      - missing_external_data
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  vault.valuation.update:
    aggregate: valuation
    source_domain: vault
    version: 1.0.0
    description: Update the trusted valuation of an asset
    issuer:
      actor_types: [system, governance]
      minimum_capability: vault.valuation.manage
    authorization_requirements:
      identity: required_for_governance, exempt_for_system
      capability: vault.valuation.manage
      scope: asset_id
      policy: valuation_policy
    validation_rules:
      - rule: asset_must_exist
        check: asset with asset_id exists
        on_failure: REJECT
      - rule: source_must_be_trusted
        check: source_type in [oracle, internal_pricing, market_feed, manual]
        on_failure: REJECT
      - rule: valuation_must_not_be_stale
        check: valuation.timestamp within staleness threshold
        on_failure: REJECT
      - rule: manual_valuation_requires_governance_approval
        check: if source_type == manual then governance_approved == true
        on_failure: REJECT
    required_payload:
      - asset_id
      - price
      - reference_currency
      - source_type
      - source_id
      - governance_approved  # required if source_type == manual
    auto_generated:
      - valuation_id: uuid
      - valued_at: now
      - is_stale: false
    resulting_events:
      success: [vault.valuation.updated]
      conditional: [vault.asset.impaired]  # if value dropped significantly
      failure: [vault.valuation.update_failed]
    failure_conditions:
      - asset_not_found
      - untrusted_source
      - stale_valuation
      - manual_without_governance_approval
      - policy_violation

  # ========================================================
  # LEDGER DOMAIN COMMANDS
  # ========================================================
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.journal.create:
    aggregate: journal
    source_domain: ledger
    version: 1.0.0
    description: Create a new journal for a domain or subsystem
    issuer:
      actor_types: [governance]
      minimum_capability: ledger.journal.manage
    authorization_requirements:
      identity: required
      capability: ledger.journal.manage
      scope: ledger_id
      policy: journal_management_policy
    validation_rules:
      - rule: journal_name_unique_within_ledger
        check: no existing journal with same name in this ledger
        on_failure: REJECT
      - rule: domain_must_be_recognized
        check: domain in recognized_domains
        on_failure: REJECT
      - rule: ledger_must_be_active
        check: ledger.status == ACTIVE
        on_failure: REJECT
    required_payload:
      - ledger_id
      - name
      - domain
      - description
    auto_generated:
      - journal_id: uuid
    resulting_events:
      success: [ledger.journal.created]
      failure: [ledger.journal.creation_failed]
    failure_conditions:
      - duplicate_journal_name
      - unrecognized_domain
      - ledger_not_active
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.entry.post:
    aggregate: journal_entry
    source_domain: ledger
    version: 1.0.0
    description: Submit a journal entry for validation and posting
    issuer:
      actor_types: [human, ai_agent, governance, system]
      minimum_capability: ledger.entry.post
    authorization_requirements:
      identity: required
      capability: ledger.entry.post
      scope: account_ids referenced in postings
      policy: entry_posting_policy
    validation_rules:
      - rule: at_least_two_postings
        check: postings.length >= 2
        on_failure: REJECT
      - rule: all_accounts_exist_and_active
        check: all posting.account_id reference ACTIVE accounts
        on_failure: REJECT
      - rule: all_postings_have_valid_asset
        check: all posting.asset_id reference valid Vault assets
        on_failure: REJECT
      - rule: amounts_positive
        check: all posting.amount > 0
        on_failure: REJECT
      - rule: debits_equal_credits
        check: sum(debits) == sum(credits) within asset precision
        on_failure: REJECT
      - rule: direction_allowed_for_account
        check: posting.direction consistent with account.debit_allowed/credit_allowed
        on_failure: REJECT
      - rule: actor_has_posting_authority
        check: actor has permission to post to all referenced accounts
        on_failure: REJECT
      - rule: event_reference_valid
        check: event_reference exists in event store and is journalizable
        on_failure: REJECT
      - rule: event_not_already_journalized
        check: no existing entry references this event_reference (unless correction)
        on_failure: REJECT
      - rule: domain_account_ownership_respected
        check: postings to domain-owned accounts are from permitted domains
        on_failure: REJECT
    required_payload:
      - journal_id
      - transaction_id
      - event_reference
      - correlation_id
      - causation_id
      - description
      - entry_type
      - postings:
          - account_id
          - amount
          - direction
          - asset_id
          - description
    auto_generated:
      - entry_id: uuid
      - created_at: now
      - actor_context: from identity context
      - authorization_context: from policy result
    resulting_events:
      success: [ledger.entry.posted]
      failure: [ledger.entry.rejected]
    failure_conditions:
      - insufficient_postings
      - invalid_account
      - invalid_asset
      - invalid_amount
      - unbalanced_entry
      - direction_not_allowed
      - no_posting_authority
      - invalid_event_reference
      - event_already_journalized
      - domain_violation
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.entry.reverse:
    aggregate: journal_entry
    source_domain: ledger
    version: 1.0.0
    description: Reverse a previously posted journal entry by creating inverse postings
    issuer:
      actor_types: [governance, system]
      minimum_capability: ledger.entry.reverse
    authorization_requirements:
      identity: required
      capability: ledger.entry.reverse
      scope: original_entry_id
      policy: entry_reversal_policy
    validation_rules:
      - rule: original_entry_exists
        check: entry with original_entry_id exists
        on_failure: REJECT
      - rule: original_entry_posted_or_settled
        check: original_entry.status in [POSTED, SETTLED]
        on_failure: REJECT
      - rule: not_already_reversed
        check: no existing reversal entry references this original_entry_id
        on_failure: REJECT
      - rule: reversal_reason_provided
        check: reversal_reason is non-empty string
        on_failure: REJECT
      - rule: accounts_still_valid
        check: all accounts in original entry still exist
        on_failure: REJECT
    required_payload:
      - original_entry_id
      - reversal_reason
    auto_generated:
      - entry_id: uuid
      - journal_id: from original entry
      - entry_type: REVERSAL
      - postings: inverted from original
      - created_at: now
    resulting_events:
      success: [ledger.entry.reversed]
      failure: [ledger.entry.reversal_failed]
    failure_conditions:
      - original_entry_not_found
      - original_entry_not_posted
      - already_reversed
      - missing_reason
      - invalid_accounts
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.entry.correct:
    aggregate: journal_entry
    source_domain: ledger
    version: 1.0.0
    description: Create a compensating correction entry for a previously posted entry
    issuer:
      actor_types: [governance]
      minimum_capability: ledger.entry.correct
    authorization_requirements:
      identity: required
      capability: ledger.entry.correct
      scope: original_entry_id
      policy: entry_correction_policy
    validation_rules:
      - rule: original_entry_exists
        check: entry with original_entry_id exists
        on_failure: REJECT
      - rule: original_entry_posted_or_settled
        check: original_entry.status in [POSTED, SETTLED]
        on_failure: REJECT
      - rule: correction_description_provided
        check: correction_description is non-empty string
        on_failure: REJECT
      - rule: governance_approval_obtained
        check: approved_by references a verified governor
        on_failure: REJECT
      - rule: correction_entry_balances
        check: sum(debits) == sum(credits) in correction postings
        on_failure: REJECT
    required_payload:
      - original_entry_id
      - correction_description
      - approved_by
      - postings:
          - account_id
          - amount
          - direction
          - asset_id
          - description
    auto_generated:
      - entry_id: uuid
      - journal_id: from original entry
      - entry_type: CORRECTION
      - created_at: now
    resulting_events:
      success: [ledger.entry.corrected]
      failure: [ledger.entry.correction_failed]
    failure_conditions:
      - original_entry_not_found
      - original_entry_not_posted
      - missing_description
      - no_governance_approval
      - unbalanced_correction
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.reconciliation.start:
    aggregate: reconciliation
    source_domain: ledger
    version: 1.0.0
    description: Initiate a reconciliation process
    issuer:
      actor_types: [governance, system]
      minimum_capability: ledger.reconcile
    authorization_requirements:
      identity: required
      capability: ledger.reconcile
      scope: depends on reconciliation type
      policy: reconciliation_policy
    validation_rules:
      - rule: no_conflicting_reconciliation
        check: no active reconciliation for same scope
        on_failure: REJECT
      - rule: source_data_available
        check: external reference data provided
        on_failure: REJECT
      - rule: valid_reconciliation_type
        check: type in [internal, vault_reconciliation, treasury_reconciliation, external_reconciliation]
        on_failure: REJECT
    required_payload:
      - type
      - scope
      - source_data
    auto_generated:
      - reconciliation_id: uuid
      - started_at: now
    resulting_events:
      success: [ledger.reconciliation.started]
      conditional: [ledger.reconciliation.mismatch_detected]
      failure: [ledger.reconciliation.start_failed]
    failure_conditions:
      - conflicting_reconciliation
      - missing_source_data
      - invalid_type
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.reconciliation.resolve:
    aggregate: reconciliation
    source_domain: ledger
    version: 1.0.0
    description: Resolve a reconciliation discrepancy
    issuer:
      actor_types: [governance]
      minimum_capability: ledger.reconcile
    authorization_requirements:
      identity: required
      capability: ledger.reconcile
      scope: reconciliation_id
      policy: reconciliation_policy
    validation_rules:
      - rule: reconciliation_exists
        check: reconciliation with reconciliation_id exists
        on_failure: REJECT
      - rule: reconciliation_in_resolvable_state
        check: reconciliation.state in [INVESTIGATION, ADJUSTMENT_REQUIRED]
        on_failure: REJECT
      - rule: resolution_method_provided
        check: resolution_method specified
        on_failure: REJECT
      - rule: if_adjustment_then_balanced
        check: if resolution requires adjustment, the correction entry must balance
        on_failure: REJECT
    required_payload:
      - reconciliation_id
      - resolution_method
      - correction_postings  # if adjustment required
    auto_generated:
      - resolved_at: now
    resulting_events:
      success: [ledger.reconciliation.completed]
      conditional: [ledger.entry.corrected]
      failure: [ledger.reconciliation.resolution_failed]
    failure_conditions:
      - reconciliation_not_found
      - reconciliation_not_resolvable
      - missing_resolution_method
      - unbalanced_adjustment
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.account.create:
    aggregate: account
    source_domain: ledger
    version: 1.0.0
    description: Create a new account in the chart of accounts
    issuer:
      actor_types: [governance]
      minimum_capability: ledger.account.manage
    authorization_requirements:
      identity: required
      capability: ledger.account.manage
      scope: ledger_id
      policy: account_management_policy
    validation_rules:
      - rule: account_code_unique
        check: no existing account with same code in this ledger
        on_failure: REJECT
      - rule: account_type_recognized
        check: account_type in [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE, MEMORANDUM, RESERVE, COLLATERAL]
        on_failure: REJECT
      - rule: parent_exists_if_specified
        check: if parent_account_id, parent account exists
        on_failure: REJECT
      - rule: normal_balance_consistent
        check: normal_balance matches account_type definition
        on_failure: REJECT
    required_payload:
      - ledger_id
      - account_code
      - account_name
      - account_type
      - domain_ownership
      - owner_id
      - parent_account_id
      - debit_allowed
      - credit_allowed
      - requires_approval
    auto_generated:
      - account_id: uuid
      - normal_balance: derived from account_type
      - status: ACTIVE
      - created_at: now
    resulting_events:
      success: [ledger.account.created]
      failure: [ledger.account.creation_failed]
    failure_conditions:
      - duplicate_account_code
      - unrecognized_type
      - parent_not_found
      - inconsistent_normal_balance
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.account.freeze:
    aggregate: account
    source_domain: ledger
    version: 1.0.0
    description: Freeze an account, preventing new postings
    issuer:
      actor_types: [governance]
      minimum_capability: ledger.account.manage
    authorization_requirements:
      identity: required
      capability: ledger.account.manage
      scope: account_id
      policy: account_management_policy
    validation_rules:
      - rule: account_exists
        check: account with account_id exists
        on_failure: REJECT
      - rule: account_is_active
        check: account.status == ACTIVE
        on_failure: REJECT
      - rule: no_pending_entries
        check: no journal entries in CREATED or VALIDATING state reference this account
        on_failure: REJECT
      - rule: freeze_reason_provided
        check: reason is non-empty string
        on_failure: REJECT
    required_payload:
      - account_id
      - reason
    auto_generated:
      - frozen_at: now
    resulting_events:
      success: [ledger.account.frozen]
      failure: [ledger.account.freeze_failed]
    failure_conditions:
      - account_not_found
      - account_not_active
      - pending_entries_exist
      - missing_reason
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  ledger.period.close:
    aggregate: accounting_period
    source_domain: ledger
    version: 1.0.0
    description: Close an accounting period, generating closing entries
    issuer:
      actor_types: [governance, system]
      minimum_capability: ledger.period.manage
    authorization_requirements:
      identity: required
      capability: ledger.period.manage
      scope: period_id
      policy: period_management_policy
    validation_rules:
      - rule: period_exists
        check: period with period_id exists
        on_failure: REJECT
      - rule: period_is_open
        check: period.status == OPEN
        on_failure: REJECT
      - rule: all_entries_settled
        check: all entries for this period are in POSTED or SETTLED state
        on_failure: REJECT
      - rule: no_pending_reconciliations
        check: no active reconciliations for this period
        on_failure: REJECT
      - rule: previous_period_closed
        check: if not first period, previous period status == CLOSED
        on_failure: REJECT
    required_payload:
      - period_id
    auto_generated:
      - closed_at: now
    resulting_events:
      success: [ledger.period.closing, ledger.entry.posted, ledger.period.closed]
      failure: [ledger.period.close_failed]
    failure_conditions:
      - period_not_found
      - period_not_open
      - unsettled_entries_exist
      - pending_reconciliations_exist
      - previous_period_not_closed
      - policy_violation

  # ========================================================
  # TREASURY DOMAIN COMMANDS
  # ========================================================
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.transfer.request:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Request a new treasury transfer (initiates the transfer lifecycle)
    issuer:
      actor_types: [human, ai_agent, system]
      minimum_capability: treasury.transfer.request
    authorization_requirements:
      identity: required
      capability: treasury.transfer.request
      scope: source actor and asset
      policy: transfer_request_policy
    validation_rules:
      - rule: source_actor_exists_and_active
        check: source_actor_id references an active actor
        on_failure: REJECT
      - rule: destination_actor_valid
        check: destination details are complete and valid
        on_failure: REJECT
      - rule: asset_exists_in_vault
        check: asset_id references a verified or available Vault asset
        on_failure: REJECT
      - rule: amount_positive_and_within_precision
        check: amount > 0 and within asset precision
        on_failure: REJECT
      - rule: no_duplicate_pending_transfer
        check: no active transfer with same dedup_key exists
        on_failure: REJECT
    required_payload:
      - source_actor_id
      - destination_details:
          - type
          - address
          - rail
          - reference
      - asset_id
      - amount
      - purpose
    auto_generated:
      - order_id: uuid
      - state: REQUESTED
      - created_at: now
    resulting_events:
      success: [treasury.transfer.requested]
      failure: [treasury.transfer.rejected]
    failure_conditions:
      - source_actor_not_found
      - destination_invalid
      - asset_not_found
      - amount_invalid
      - duplicate_transfer
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.transfer.authorize:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Authorize a requested transfer (identity, capability, policy gates)
    issuer:
      actor_types: [human, system]
      minimum_capability: treasury.transfer.authorize
    authorization_requirements:
      identity: required
      capability: treasury.transfer.authorize
      scope: order_id
      policy: transfer_execution_policy
    validation_rules:
      - rule: transfer_in_requested_state
        check: transfer_order.state == REQUESTED
        on_failure: REJECT
      - rule: transfer_not_expired
        check: now < transfer_order.created_at + 3600s
        on_failure: REJECT
      - rule: policy_evaluates_to_approve
        check: policy_result == APPROVE
        on_failure: REJECT
      - rule: actor_has_authority
        check: actor has transfer authority over source asset
        on_failure: REJECT
      - rule: compliance_rules_passed
        check: all compliance rules evaluate to pass
        on_failure: REJECT
    required_payload:
      - order_id
    auto_generated:
      - authorized_at: now
      - policy_result: from evaluation
    resulting_events:
      success: [treasury.transfer.authorized]
      failure: [treasury.transfer.rejected]
    failure_conditions:
      - transfer_not_found
      - transfer_not_in_requested_state
      - transfer_expired
      - policy_denied
      - insufficient_authority
      - compliance_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.transfer.reserve:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Lock vault reservation for an authorized transfer
    issuer:
      actor_types: [system]
      minimum_capability: treasury.transfer.reserve
    authorization_requirements:
      identity: required
      capability: treasury.transfer.reserve
      scope: order_id
      policy: transfer_execution_policy
    validation_rules:
      - rule: transfer_in_authorized_state
        check: transfer_order.state == AUTHORIZED
        on_failure: REJECT
      - rule: authorization_not_expired
        check: now < transfer_order.authorized_at + 300s
        on_failure: REJECT
      - rule: vault_available_balance_sufficient
        check: vault confirms available_balance >= transfer_order.amount
        on_failure: REJECT
      - rule: no_conflicting_reservation
        check: no active reservation for this order_id
        on_failure: REJECT
    required_payload:
      - order_id
    auto_generated:
      - vault_reservation_id: from vault response
      - vault_lock_id: from vault response
      - reserved_at: now
    resulting_events:
      success: [treasury.transfer.reserved]
      failure: [treasury.transfer.rejected]
    failure_conditions:
      - transfer_not_authorized
      - authorization_expired
      - insufficient_balance
      - vault_reservation_failed
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.transfer.execute:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Execute a reserved transfer by sending instruction to payment rail
    issuer:
      actor_types: [system]
      minimum_capability: treasury.transfer.execute
    authorization_requirements:
      identity: required
      capability: treasury.transfer.execute
      scope: order_id
      policy: transfer_execution_policy
    validation_rules:
      - rule: transfer_in_reserved_state
        check: transfer_order.state == RESERVED
        on_failure: REJECT
      - rule: vault_lock_still_active
        check: vault confirms lock_id is still ACTIVE
        on_failure: REJECT
      - rule: payment_rail_available
        check: target payment rail is reachable
        on_failure: REJECT
      - rule: execution_saga_defined
        check: compensation saga steps are defined for this rail
        on_failure: REJECT
    required_payload:
      - order_id
    auto_generated:
      - instruction_id: uuid
      - executing_at: now
    resulting_events:
      success: [treasury.transfer.executing]
      conditional: [treasury.transfer.settled, treasury.transfer.failed]
      failure: [treasury.transfer.failed]
    failure_conditions:
      - transfer_not_reserved
      - vault_lock_expired
      - payment_rail_unavailable
      - no_compensation_saga
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.transfer.cancel:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Cancel a transfer that has not yet been executed
    issuer:
      actor_types: [human, governance, system]
      minimum_capability: treasury.transfer.cancel
    authorization_requirements:
      identity: required
      capability: treasury.transfer.cancel
      scope: order_id
      policy: transfer_cancellation_policy
    validation_rules:
      - rule: transfer_in_cancellable_state
        check: transfer_order.state in [REQUESTED, AUTHORIZED, RESERVED]
        on_failure: REJECT
      - rule: cancellation_reason_provided
        check: reason is non-empty string
        on_failure: REJECT
      - rule: no_execution_in_progress
        check: no pending execution instruction on payment rail
        on_failure: REJECT
      - rule: vault_reservation_releasable
        check: if RESERVED, vault reservation can be released
        on_failure: REJECT
    required_payload:
      - order_id
      - reason
    auto_generated:
      - cancelled_at: now
    resulting_events:
      success: [treasury.transfer.rejected]
      failure: [treasury.transfer.failed]
    failure_conditions:
      - transfer_not_cancellable
      - missing_reason
      - execution_already_in_progress
      - vault_release_failed
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.transfer.compensate:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Initiate or continue a compensation saga for a failed transfer
    issuer:
      actor_types: [governance, system]
      minimum_capability: treasury.transfer.compensate
    authorization_requirements:
      identity: required
      capability: treasury.transfer.compensate
      scope: order_id
      policy: compensation_policy
    validation_rules:
      - rule: transfer_in_compensatable_state
        check: transfer_order.state in [FAILED, COMPENSATION_REQUIRED]
        on_failure: REJECT
      - rule: compensation_step_defined
        check: next compensation step exists in saga definition
        on_failure: REJECT
      - rule: vault_lock_resolvable
        check: vault lock can be released or consumed appropriately
        on_failure: REJECT
      - rule: governance_approval_if_required
        check: if saga step requires governance, approval is present
        on_failure: REJECT
    required_payload:
      - order_id
      - compensation_step
    auto_generated:
      - compensated_at: now
    resulting_events:
      success: [treasury.transfer.compensation_required]
      failure: [treasury.transfer.failed]
    failure_conditions:
      - transfer_not_compensatable
      - no_compensation_step
      - vault_resolution_failed
      - governance_approval_missing
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.liquidity.check:
    aggregate: liquidity_position
    source_domain: treasury
    version: 1.0.0
    description: Check available liquidity for an actor across assets
    issuer:
      actor_types: [human, ai_agent, system, governance]
      minimum_capability: treasury.liquidity.read
    authorization_requirements:
      identity: required
      capability: treasury.liquidity.read
      scope: actor_id
      policy: liquidity_read_policy
    validation_rules:
      - rule: actor_exists
        check: actor_id references an active actor
        on_failure: REJECT
      - rule: scope_matches_actor
        check: caller has read access to this actor's liquidity
        on_failure: REJECT
    required_payload:
      - actor_id
      - asset_id  # optional, if omitted returns all assets
    auto_generated:
      - check_id: uuid
      - computed_at: now
    resulting_events:
      success: []
      conditional: [treasury.liquidity.warning]
      failure: []
    failure_conditions:
      - actor_not_found
      - scope_denied
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.liquidity.allocate:
    aggregate: liquidity_position
    source_domain: treasury
    version: 1.0.0
    description: Allocate liquidity from one asset or source to cover an obligation
    issuer:
      actor_types: [governance, system]
      minimum_capability: treasury.liquidity.manage
    authorization_requirements:
      identity: required
      capability: treasury.liquidity.manage
      scope: actor_id
      policy: liquidity_allocation_policy
    validation_rules:
      - rule: source_has_sufficient_liquidity
        check: source available balance >= allocation amount
        on_failure: REJECT
      - rule: allocation_purpose_valid
        check: purpose in [transfer_cover, margin_call, settlement_reserve, operational]
        on_failure: REJECT
      - rule: does_not_breach_minimum_reserve
        check: post-allocation balance >= minimum reserve threshold
        on_failure: REJECT
      - rule: asset_compatible
        check: source and target assets are conversion-compatible
        on_failure: REJECT
      - rule: no_duplicate_allocation
        check: no active allocation with same dedup_key
        on_failure: REJECT
    required_payload:
      - actor_id
      - source_asset_id
      - target_asset_id
      - amount
      - purpose
    auto_generated:
      - allocation_id: uuid
      - allocated_at: now
    resulting_events:
      success: []
      conditional: [treasury.liquidity.warning]
      failure: [treasury.transfer.failed]
    failure_conditions:
      - insufficient_liquidity
      - invalid_purpose
      - breaches_minimum_reserve
      - asset_incompatible
      - duplicate_allocation
      - policy_violation
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  treasury.settlement.confirm:
    aggregate: transfer_order
    source_domain: treasury
    version: 1.0.0
    description: Confirm settlement of a transfer (from external rail or reconciliation)
    issuer:
      actor_types: [system, governance]
      minimum_capability: treasury.settlement.confirm
    authorization_requirements:
      identity: required
      capability: treasury.settlement.confirm
      scope: order_id
      policy: settlement_policy
    validation_rules:
      - rule: transfer_in_settleable_state
        check: transfer_order.state in [EXECUTING, PENDING_SETTLEMENT, UNKNOWN_EXTERNAL_STATE]
        on_failure: REJECT
      - rule: settlement_reference_provided
        check: settlement_reference is non-empty
        on_failure: REJECT
      - rule: settlement_amount_matches
        check: settlement.amount == transfer_order.amount
        on_failure: REJECT
      - rule: not_already_settled
        check: no prior settlement confirmation for this order_id
        on_failure: REJECT
    required_payload:
      - order_id
      - settlement_reference
      - settled_at
      - settlement_amount
    auto_generated:
      - confirmed_at: now
    resulting_events:
      success: [treasury.transfer.settled, treasury.settlement.confirmed]
      failure: [treasury.transfer.failed]
    failure_conditions:
      - transfer_not_settleable
      - missing_settlement_reference
      - amount_mismatch
      - already_settled
      - policy_violation

  # ========================================================
  # IDENTITY DOMAIN COMMANDS
  # ========================================================
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  identity.actor.register:
