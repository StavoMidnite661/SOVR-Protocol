    aggregate: emergency_halt
    source_domain: governance
    version: 1.0.0
    description: Lift an active emergency halt
    issuer:
      actor_types: [governance]
      minimum_capability: governance.emergency.halt
    authorization_requirements:
      identity: required
      capability: governance.emergency.halt
      scope: governance:emergency:*
      policy: emergency_halt_policy
    validation_rules:
      - rule: halt_must_be_active
        check: emergency_halt.state == ACTIVE
        on_failure: REJECT
      - rule: two_distinct_governors
        check: two distinct governance identity_ids provided
        on_failure: REJECT
      - rule: review_completed_or_waived
        check: post_action_review_completed == true or review_waived == true
        on_failure: REJECT
    required_payload:
      - halt_id
      - lift_reason
    resulting_events:
      success: [governance.emergency_halt.lifted]
      failure: [governance.emergency_halt.lift_failed]
    failure_conditions:
      - halt_not_active
      - single_governor_only
      - review_not_completed
    constitutional_gates:
      identity_required: true
      policy_required: true
      capability_required: true
      invariants: []

  governance.audit.query:
