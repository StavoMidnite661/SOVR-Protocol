# ============================================================
# SOVR Financial OS — Event Catalog
# File: 04_event-catalog.yaml
# Status: FROZEN — Phase J (Protocol Closure) complete
# ============================================================
# Defines the universe of events (facts about what happened)
# in SOVR. Events are immutable observations. They describe
# reality — they do not mutate it. Projections interpret them.
#
# This file is populated domain-by-domain.
# Current domains: Vault, Ledger, Treasury, Identity, Policy, Intent, Agent, Payment
# ============================================================

event_envelope:
  description: >
    Every event in SOVR must include these envelope fields.
    No event may be published without a complete envelope.
    This is the authoritative event contract for the protocol compiler.
  compile_target: true
  fields:
    event_id:
      type: string
      format: uuid
      required: true
      description: Globally unique event identifier
    event_name:
      type: string
      required: true
      description: Fully qualified event name (domain.aggregate.action)
    event_version:
      type: string
      format: semver
      required: true
      description: Event schema version
    aggregate:
      type: string
      required: true
      description: The aggregate/entity this event relates to
    aggregate_id:
      type: string
      format: uuid
      required: true
      description: The specific instance of the aggregate
    source_domain:
      type: enum
      values: [vault, ledger, treasury, identity, policy, intent, agent, payment, governance]
      required: true
      description: The domain that produced this event
    command_id:
      type: string
      format: uuid
      required: true
      description: UUID of the command that caused this event
    triggering_command:
      type: string
      required: true
      description: Fully qualified command name (e.g. vault.asset.register)
    causation_id:
      type: string
      format: uuid
      required: true
      description: The event_id that caused this event (parent event in chain)
    correlation_id:
      type: string
      format: uuid
      required: true
      description: Groups all events from a single business operation
    actor_id:
      type: string
      format: uuid
      required: true
      description: UUID of the actor who initiated the operation
    identity_context:
      type: object
      required: true
      description: Identity state at the time of event production
      fields:
        identity_id:
          type: string
          format: uuid
          required: true
        actor_type:
          type: enum
          values: [human, organization, ai_agent, service_account, governance, external_system, system]
          required: true
        session_id:
          type: string
          format: uuid
          required: false
        agent_id:
          type: string
          format: uuid
          required: false
          description: Required if actor_type is ai_agent
        model_version:
          type: string
          required: false
          description: Required if actor_type is ai_agent
        delegation_chain:
          type: array
          items:
            type: string
            format: uuid
          required: false
          description: Chain of delegating identity IDs (if delegated)
    policy_decision_id:
      type: string
      format: uuid
      required: true
      description: UUID of the PolicyDecision that authorized the triggering command
    capability_id:
      type: string
      required: true
      description: The capability that was exercised (e.g. vault.asset.create)
    timestamp:
      type: timestamp
      required: true
      description: When the event occurred (domain time, not wall clock)
    payload:
      type: object
      required: true
      description: Event-specific data fields (defined per event type)
    projection_effect:
      type: object
      required: true
      description: Instructions for projection engine on how to process this event
      fields:
        target:
          type: string
          required: true
          description: Target read model / projection name
        operation:
          type: enum
          values: [insert, update, delete, append, no_op]
          required: true
        invalidation_keys:
          type: array
          items:
            type: string
          required: false
          description: Cache keys to invalidate
    audit:
      type: object
      required: true
      description: Audit metadata for governance and compliance
      fields:
        constitutional_rules_referenced:
          type: array
          items:
            type: string
          required: true
          description: Invariant IDs evaluated during command execution
        enforcement_actions:
          type: array
          items:
            type: string
          required: false
          description: Any enforcement actions taken during this event lifecycle
        retention_class:
          type: enum
          values: [permanent, regulatory_7y, operational_90d, session]
          required: true

events:

  # ========================================================
  # VAULT DOMAIN EVENTS
  # ========================================================

  vault.asset.registered:
    aggregate: asset
    aggregate_id_field: asset_id
    source_domain: vault
    version: 1.0.0
    description: A new asset has been registered in the Vault
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
    guarantees:
      - asset_id is globally unique
      - asset_type is recognized
      - issuer identity is verified
      - no existing asset with same asset_id
    projection_effect:
      target: vault_asset_view
      operation: insert
    data_fields:
      asset_id:
        type: string
        format: uuid
      asset_type:
        type: enum
        values: [cash, stablecoin, tokenized_asset, collateral_position, liquidity_position, external_claim]
      issuer_id:
        type: string
        format: uuid
      ownership_id:
        type: string
        format: uuid
      beneficial_owner_id:
        type: string
        format: uuid
        required: false
      custody_provider:
        type: enum
        values: [sovr_internal, on_chain, external_bank, third_party]
      custody_location:
        type: string
      quantity:
        type: decimal
        precision: 18
        required: false
      face_value:
        type: decimal
        precision: 2
        required: false
      native_unit:
        type: string
      precision:
        type: integer
      risk_classification:
        type: enum
        values: [minimal, low, medium, medium_to_high, high]
      valuation_source:
        type: string
      reserve_ratio:
        type: decimal
        precision: 4
      registered_at:
        type: timestamp

  vault.asset.verified:
    aggregate: asset
    aggregate_id_field: asset_id
    source_domain: vault
    version: 1.0.0
    description: An asset has been verified to exist and be correct
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - treasury_projection
    guarantees:
      - asset was in REGISTERED state
      - attestation proof was valid
      - attester was trusted
      - asset is now in VERIFIED state
    projection_effect:
      target: vault_asset_view
      operation: update
      updates:
        state: VERIFIED
        verified_at: event.timestamp
    data_fields:
      asset_id:
        type: string
        format: uuid
      verifier_id:
        type: string
        format: uuid
      attestation_proof_hash:
        type: string
      verified_at:
        type: timestamp
      verification_method:
        type: enum
        values: [on_chain_balance_proof, off_chain_custodian_statement, internal_ledger_confirmation]

  vault.asset.rejected:
    aggregate: asset
    aggregate_id_field: asset_id
    source_domain: vault
    version: 1.0.0
    description: An asset has been rejected during verification
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
    guarantees:
      - asset was in REGISTERED or VERIFIED state
      - rejection reason was provided
      - asset is now in REJECTED state
    projection_effect:
      target: vault_asset_view
      operation: update
      updates:
        state: REJECTED
    data_fields:
      asset_id:
        type: string
        format: uuid
      rejector_id:
        type: string
        format: uuid
      reason:
        type: string
      rejected_at:
        type: timestamp

  vault.asset.impaired:
    aggregate: asset
    aggregate_id_field: asset_id
    source_domain: vault
    version: 1.0.0
    description: An asset has been marked as impaired due to value decline
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - governance_projection
      - policy_projection
    guarantees:
      - asset existed and was in operational state
      - valuation drop detected by trusted source
      - governance will be notified
    projection_effect:
      target: vault_asset_view
      operation: update
      updates:
        state: IMPAIRED
        current_valuation: impaired_value
    data_fields:
      asset_id:
        type: string
        format: uuid
      previous_value:
        type: decimal
        precision: 18
      impaired_value:
        type: decimal
        precision: 18
      impairment_reason:
        type: string
      detected_at:
        type: timestamp

  vault.asset.write_down:
    aggregate: asset
    aggregate_id_field: asset_id
    source_domain: vault
    version: 1.0.0
    description: An asset has been permanently written down
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - ledger_projection
      - governance_projection
    guarantees:
      - write-down was governance-approved
      - journal entry will be created
      - audit trail is complete
    projection_effect:
      target: vault_asset_view
      operation: update
      updates:
        current_valuation: new_book_value
    data_fields:
      asset_id:
        type: string
        format: uuid
      previous_book_value:
        type: decimal
        precision: 18
      new_book_value:
        type: decimal
        precision: 18
      write_down_amount:
        type: decimal
        precision: 18
      approved_by:
        type: string
        format: uuid
      written_down_at:
        type: timestamp

  vault.reserve.created:
    aggregate: reservation
    aggregate_id_field: reservation_id
    source_domain: vault
    version: 1.0.0
    description: A value reservation has been created
    producer: vault_service
    consumers:
      - vault_projection
      - treasury_projection
    guarantees:
      - asset was in AVAILABLE state
      - actor had reserve_control authority
      - amount did not exceed available_balance
      - no conflicting reservation existed
      - reservation is in PENDING state
    projection_effect:
      target: vault_balance_view
      operation: update
      updates:
        reserved_balance: reserved_balance + amount
        available_balance: available_balance - amount
    data_fields:
      reservation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      actor_id:
        type: string
        format: uuid
      amount:
        type: decimal
        precision: 18
      expiration:
        type: timestamp
      purpose:
        type: string
      created_at:
        type: timestamp

  vault.reserve.locked:
    aggregate: reservation
    aggregate_id_field: reservation_id
    source_domain: vault
    version: 1.0.0
    description: A reservation has been locked, committing the value
    producer: vault_service
    consumers:
      - vault_projection
      - treasury_projection
      - payment_projection
    guarantees:
      - reservation was in PENDING state
      - reservation was not expired
      - available_balance was still sufficient
      - reservation is now in ACTIVE state with lock
    projection_effect:
      target: vault_balance_view
      operation: update
      updates:
        locked_balance: locked_balance + amount
        reserved_balance: reserved_balance - amount
    data_fields:
      reservation_id:
        type: string
        format: uuid
      lock_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      amount:
        type: decimal
        precision: 18
      expected_consuming_transaction_id:
        type: string
        format: uuid
      locked_at:
        type: timestamp

  vault.reserve.released:
    aggregate: reservation
    aggregate_id_field: reservation_id
    source_domain: vault
    version: 1.0.0
    description: A reservation has been released, returning value to available pool
    producer: vault_service
    consumers:
      - vault_projection
      - treasury_projection
    guarantees:
      - reservation was in PENDING or ACTIVE state
      - value has been returned to available pool
      - reservation is now in RELEASED state
    projection_effect:
      target: vault_balance_view
      operation: update
      updates:
        available_balance: available_balance + amount
        reserved_balance: reserved_balance - amount  # if was PENDING
        locked_balance: locked_balance - amount       # if was ACTIVE
    data_fields:
      reservation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      amount:
        type: decimal
        precision: 18
      release_reason:
        type: string
      released_at:
        type: timestamp

  vault.reserve.expired:
    aggregate: reservation
    aggregate_id_field: reservation_id
    source_domain: vault
    version: 1.0.0
    description: A reservation has expired without being consumed
    producer: vault_service
    consumers:
      - vault_projection
      - treasury_projection
    guarantees:
      - reservation was in PENDING or ACTIVE state
      - expiration time had passed
      - value has been returned to available pool
      - reservation is now in EXPIRED state
    projection_effect:
      target: vault_balance_view
      operation: update
      updates:
        available_balance: available_balance + amount
        reserved_balance: reserved_balance - amount
        locked_balance: locked_balance - amount
    data_fields:
      reservation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      amount:
        type: decimal
        precision: 18
      expired_at:
        type: timestamp

  vault.collateral.added:
    aggregate: collateral
    aggregate_id_field: collateral_id
    source_domain: vault
    version: 1.0.0
    description: An asset has been pledged as collateral
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - policy_projection
    guarantees:
      - asset was eligible for collateral
      - ownership was verified
      - quality score met minimum
      - concentration limits not exceeded
      - collateral is in ACTIVE state
    projection_effect:
      target: vault_collateral_view
      operation: insert
    data_fields:
      collateral_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      owner_id:
        type: string
        format: uuid
      obligation_id:
        type: string
        format: uuid
      gross_value:
        type: decimal
        precision: 18
      effective_value:
        type: decimal
        precision: 18
      haircut_applied:
        type: decimal
        precision: 6
      quality_score:
        type: decimal
        precision: 4
      added_at:
        type: timestamp

  vault.collateral.valued:
    aggregate: collateral
    aggregate_id_field: collateral_id
    source_domain: vault
    version: 1.0.0
    description: Collateral has been initially valued
    producer: vault_service
    consumers:
      - vault_projection
    guarantees:
      - valuation source was trusted
      - haircut was correctly applied
    projection_effect:
      target: vault_collateral_view
      operation: update
      updates:
        gross_value: event.gross_value
        effective_value: event.effective_value
        last_valued_at: event.timestamp
    data_fields:
      collateral_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      previous_effective_value:
        type: decimal
        precision: 18
      new_effective_value:
        type: decimal
        precision: 18
      valuation_source:
        type: string
      valued_at:
        type: timestamp

  vault.collateral.revalued:
    aggregate: collateral
    aggregate_id_field: collateral_id
    source_domain: vault
    version: 1.0.0
    description: Collateral valuation has been updated due to market change
    producer: vault_service
    consumers:
      - vault_projection
      - policy_projection
      - audit_projection
    guarantees:
      - valuation source was trusted and not stale
      - previous and new values recorded
    projection_effect:
      target: vault_collateral_view
      operation: update
      updates:
        gross_value: event.new_value
        effective_value: new_value * (1 - haircut)
        margin_ratio: effective_value / obligation_amount
        last_valued_at: event.timestamp
    data_fields:
      collateral_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      previous_value:
        type: decimal
        precision: 18
      new_value:
        type: decimal
        precision: 18
      value_change:
        type: decimal
        precision: 18
      valuation_source:
        type: string
      revalued_at:
        type: timestamp

  vault.collateral.released:
    aggregate: collateral
    aggregate_id_field: collateral_id
    source_domain: vault
    version: 1.0.0
    description: Collateral has been released
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
    guarantees:
      - release conditions were met
      - margin ratio remains above maintenance
      - collateral is now in RELEASED state
    projection_effect:
      target: vault_collateral_view
      operation: update
      updates:
        state: RELEASED
    data_fields:
      collateral_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      release_reason:
        type: string
      released_at:
        type: timestamp

  vault.collateral.margin_call:
    aggregate: collateral
    aggregate_id_field: collateral_id
    source_domain: vault
    version: 1.0.0
    description: A margin call has been triggered on a collateral position
    producer: vault_service
    consumers:
      - vault_projection
      - governance_projection
      - policy_projection
      - audit_projection
    guarantees:
      - margin ratio fell below maintenance threshold
      - owner and obligation holder notified
      - deadline set for remediation
    projection_effect:
      target: vault_collateral_view
      operation: update
      updates:
        state: MARGIN_CALL
    data_fields:
      collateral_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      current_ratio:
        type: decimal
        precision: 6
      maintenance_ratio:
        type: decimal
        precision: 6
      shortfall_amount:
        type: decimal
        precision: 18
      deadline:
        type: timestamp
      called_at:
        type: timestamp

  vault.collateral.liquidation_initiated:
    aggregate: collateral
    aggregate_id_field: collateral_id
    source_domain: vault
    version: 1.0.0
    description: Collateral liquidation has begun after unresolved margin call
    producer: vault_service
    consumers:
      - vault_projection
      - governance_projection
      - audit_projection
      - treasury_projection
    guarantees:
      - margin call was unresolved past deadline
      - governance was notified
      - liquidation will be orderly
    projection_effect:
      target: vault_collateral_view
      operation: update
      updates:
        state: LIQUIDATING
    data_fields:
      collateral_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      liquidation_reason:
        type: string
      initiated_at:
        type: timestamp
      expected_proceeds:
        type: decimal
        precision: 18

  vault.custody.attested:
    aggregate: custody
    aggregate_id_field: attestation_id
    source_domain: vault
    version: 1.0.0
    description: Custody has been attested (proof of asset existence)
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
    guarantees:
      - attester was trusted
      - proof hash is stored
      - attestation has validity period
    projection_effect:
      target: vault_custody_view
      operation: insert_or_update
    data_fields:
      attestation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      custody_provider:
        type: string
      attestation_proof_hash:
        type: string
      attested_at:
        type: timestamp
      attestation_valid_until:
        type: timestamp

  vault.custody.proof_expired:
    aggregate: custody
    aggregate_id_field: attestation_id
    source_domain: vault
    version: 1.0.0
    description: A custody attestation has expired
    producer: vault_service
    consumers:
      - vault_projection
      - governance_projection
    guarantees:
      - attestation validity period has passed
      - asset may be restricted from operations
    projection_effect:
      target: vault_custody_view
      operation: update
      updates:
        is_current: false
    data_fields:
      attestation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      custody_provider:
        type: string
      expired_at:
        type: timestamp

  vault.valuation.updated:
    aggregate: valuation
    aggregate_id_field: valuation_id
    source_domain: vault
    version: 1.0.0
    description: An asset valuation has been updated
    producer: vault_service
    consumers:
      - vault_projection
      - policy_projection
    guarantees:
      - valuation source was trusted
      - valuation was not stale
      - manual valuations had governance approval
    projection_effect:
      target: vault_asset_view
      operation: update
      updates:
        current_valuation: event.new_valuation
        valuation_updated_at: event.timestamp
    data_fields:
      valuation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      previous_valuation:
        type: decimal
        precision: 18
      new_valuation:
        type: decimal
        precision: 18
      valuation_source:
        type: string
      source_type:
        type: enum
        values: [oracle, internal_pricing, market_feed, manual]
      updated_at:
        type: timestamp

  vault.reconciliation.started:
    aggregate: reconciliation
    aggregate_id_field: reconciliation_id
    source_domain: vault
    version: 1.0.0
    description: A vault reconciliation has been initiated
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - governance_projection
    guarantees:
      - no conflicting reconciliation was active
      - external data was provided
    projection_effect:
      target: vault_reconciliation_view
      operation: insert
    data_fields:
      reconciliation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      initiated_by:
        type: string
        format: uuid
      scope:
        type: enum
        values: [single_asset, actor_holdings, full_vault]
      started_at:
        type: timestamp

  vault.reconciliation.completed:
    aggregate: reconciliation
    aggregate_id_field: reconciliation_id
    source_domain: vault
    version: 1.0.0
    description: A vault reconciliation has completed successfully
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
    guarantees:
      - all items were reconciled
      - no discrepancies found
    projection_effect:
      target: vault_reconciliation_view
      operation: update
      updates:
        state: COMPLETED
        completed_at: event.timestamp
    data_fields:
      reconciliation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      items_reconciled:
        type: integer
      completed_at:
        type: timestamp

  vault.reconciliation.discrepancy_found:
    aggregate: reconciliation
    aggregate_id_field: reconciliation_id
    source_domain: vault
    version: 1.0.0
    description: A discrepancy was found during reconciliation
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - governance_projection
    guarantees:
      - discrepancy amount is quantified
      - severity is assessed
      - governance is notified
    projection_effect:
      target: vault_reconciliation_view
      operation: update
      updates:
        state: DISCREPANCY_FOUND
    data_fields:
      reconciliation_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      expected_value:
        type: decimal
        precision: 18
      actual_value:
        type: decimal
        precision: 18
      discrepancy_amount:
        type: decimal
        precision: 18
      severity:
        type: enum
        values: [low, medium, high, critical]
      detected_at:
        type: timestamp

  vault.ownership.transferred:
    aggregate: ownership
    aggregate_id_field: asset_id
    source_domain: vault
    version: 1.0.0
    description: Ownership of an asset has been transferred
    producer: vault_service
    consumers:
      - vault_projection
      - audit_projection
      - identity_projection
      - governance_projection
    guarantees:
      - current owner authorized the transfer
      - new owner identity is verified
      - journal entry will be created
      - policy evaluation passed
    projection_effect:
      target: vault_asset_view
      operation: update
      updates:
        ownership_id: new_owner_id
    data_fields:
      asset_id:
        type: string
        format: uuid
      previous_owner_id:
        type: string
        format: uuid
      new_owner_id:
        type: string
        format: uuid
      authorized_by:
        type: string
        format: uuid
      transferred_at:
        type: timestamp

  # ========================================================
  # LEDGER DOMAIN EVENTS
  # ========================================================

  ledger.journal.created:
    aggregate: journal
    aggregate_id_field: journal_id
    source_domain: ledger
    version: 1.0.0
    description: A new journal has been created in the ledger
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
    guarantees:
      - journal name unique within ledger
      - domain is recognized
      - ledger is ACTIVE
    projection_effect:
      target: ledger_journal_view
      operation: insert
    data_fields:
      journal_id:
        type: string
        format: uuid
      ledger_id:
        type: string
        format: uuid
      name:
        type: string
      domain:
        type: string
      description:
        type: string
      created_at:
        type: timestamp

  ledger.entry.posted:
    aggregate: journal_entry
    aggregate_id_field: entry_id
    source_domain: ledger
    version: 1.0.0
    description: A journal entry has been validated and posted to the ledger
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
      - vault_projection
    guarantees:
      - entry passed full validation pipeline
      - debits equal credits
      - all accounts were ACTIVE
      - actor had posting authority
      - event reference was valid and not already journalized
      - entry is now immutable
    projection_effect:
      target: account_balance_view
      operation: update
      updates:
        for each posting: apply debit/credit to account running balance
    data_fields:
      entry_id:
        type: string
        format: uuid
      journal_id:
        type: string
        format: uuid
      transaction_id:
        type: string
        format: uuid
      event_reference:
        type: string
        format: uuid
      correlation_id:
        type: string
        format: uuid
      entry_type:
        type: enum
        values: [STANDARD, REVERSAL, CORRECTION, CLOSING, ADJUSTMENT]
      description:
        type: string
      posting_count:
        type: integer
      total_debits:
        type: decimal
        precision: 18
      total_credits:
        type: decimal
        precision: 18
      posted_at:
        type: timestamp
      actor_context:
        actor_id:
          type: string
          format: uuid
        actor_type:
          type: enum
        values: [human, organization, ai_agent, service_account, governance, external_system, system]
        identity_id:
          type: string
          format: uuid
      authorization_context:
        capability:
          type: string
        scope:
          type: string
        policy_result:
          type: enum
          values: [APPROVE, DENY, REQUIRE_APPROVAL]
      postings:
        posting_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        account_code:
          type: string
        amount:
          type: decimal
          precision: 18
        direction:
          type: enum
          values: [DEBIT, CREDIT]
        asset_id:
          type: string
          format: uuid
        description:
          type: string
      balance_after:
        account_id:
          type: string
          format: uuid
        new_balance:
          type: decimal
          precision: 18

  ledger.entry.rejected:
    aggregate: journal_entry
    aggregate_id_field: entry_id
    source_domain: ledger
    version: 1.0.0
    description: A journal entry failed validation and was rejected
    producer: ledger_service
    consumers:
      - audit_projection
    guarantees:
      - entry was not posted
      - no account balances were affected
      - rejection reason is recorded
    projection_effect:
      target: none
      operation: none
    data_fields:
      entry_id:
        type: string
        format: uuid
      journal_id:
        type: string
        format: uuid
      transaction_id:
        type: string
        format: uuid
      rejection_reason:
        type: string
      failed_validation_rules:
        type: array
        items:
          type: string
      rejected_at:
        type: timestamp
      actor_id:
        type: string
        format: uuid

  ledger.entry.reversed:
    aggregate: journal_entry
    aggregate_id_field: entry_id
    source_domain: ledger
    version: 1.0.0
    description: A journal entry has been reversed by a new entry with inverse postings
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - original entry exists and was POSTED or SETTLED
      - reversal entry has inverse postings
      - original entry is not modified
      - both entries link to each other
    projection_effect:
      target: account_balance_view
      operation: update
      updates:
        for each posting: apply inverse debit/credit to account running balance
    data_fields:
      entry_id:
        type: string
        format: uuid
      journal_id:
        type: string
        format: uuid
      original_entry_id:
        type: string
        format: uuid
      reversal_reason:
        type: string
      reversed_at:
        type: timestamp
      postings:
        posting_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        amount:
          type: decimal
          precision: 18
        direction:
          type: enum
          values: [DEBIT, CREDIT]
      balance_after:
        account_id:
          type: string
          format: uuid
        new_balance:
          type: decimal
          precision: 18

  ledger.entry.corrected:
    aggregate: journal_entry
    aggregate_id_field: entry_id
    source_domain: ledger
    version: 1.0.0
    description: A compensating correction entry has been posted
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - original entry exists and was POSTED or SETTLED
      - correction entry balances
      - governance approved the correction
      - original entry is not modified
    projection_effect:
      target: account_balance_view
      operation: update
      updates:
        for each posting: apply debit/credit to account running balance
    data_fields:
      entry_id:
        type: string
        format: uuid
      journal_id:
        type: string
        format: uuid
      original_entry_id:
        type: string
        format: uuid
      correction_description:
        type: string
      approved_by:
        type: string
        format: uuid
      corrected_at:
        type: timestamp
      postings:
        posting_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        amount:
          type: decimal
          precision: 18
        direction:
          type: enum
          values: [DEBIT, CREDIT]

  ledger.account.created:
    aggregate: account
    aggregate_id_field: account_id
    source_domain: ledger
    version: 1.0.0
    description: A new account has been added to the chart of accounts
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
    guarantees:
      - account code unique within ledger
      - account type recognized
      - normal balance consistent with type
    projection_effect:
      target: chart_of_accounts_view
      operation: insert
    data_fields:
      account_id:
        type: string
        format: uuid
      account_code:
        type: string
      account_name:
        type: string
      account_type:
        type: enum
        values: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE, MEMORANDUM, RESERVE, COLLATERAL]
      normal_balance:
        type: enum
        values: [DEBIT, CREDIT, NONE]
      domain_ownership:
        type: string
      owner_id:
        type: string
        format: uuid
      created_at:
        type: timestamp

  ledger.account.frozen:
    aggregate: account
    aggregate_id_field: account_id
    source_domain: ledger
    version: 1.0.0
    description: An account has been frozen, preventing new postings
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - account was ACTIVE
      - no pending entries existed
      - freeze reason recorded
    projection_effect:
      target: chart_of_accounts_view
      operation: update
      updates:
        status: FROZEN
    data_fields:
      account_id:
        type: string
        format: uuid
      reason:
        type: string
      frozen_at:
        type: timestamp
      frozen_by:
        type: string
        format: uuid

  ledger.reconciliation.started:
    aggregate: reconciliation
    aggregate_id_field: reconciliation_id
    source_domain: ledger
    version: 1.0.0
    description: A ledger reconciliation process has been initiated
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - no conflicting reconciliation was active
      - source data was available
      - reconciliation type is valid
    projection_effect:
      target: reconciliation_dashboard_view
      operation: insert
    data_fields:
      reconciliation_id:
        type: string
        format: uuid
      type:
        type: enum
        values: [internal, vault_reconciliation, treasury_reconciliation, external_reconciliation]
      scope:
        type: string
      initiated_by:
        type: string
        format: uuid
      started_at:
        type: timestamp

  ledger.reconciliation.mismatch_detected:
    aggregate: reconciliation
    aggregate_id_field: reconciliation_id
    source_domain: ledger
    version: 1.0.0
    description: A discrepancy was found during ledger reconciliation
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - discrepancy amount quantified
      - severity assessed
      - governance notified if severity >= medium
    projection_effect:
      target: reconciliation_dashboard_view
      operation: update
      updates:
        state: MISMATCH_DETECTED
        severity: event.severity
        discrepancy_amount: event.discrepancy_amount
    data_fields:
      reconciliation_id:
        type: string
        format: uuid
      expected_value:
        type: decimal
        precision: 18
      actual_value:
        type: decimal
        precision: 18
      discrepancy_amount:
        type: decimal
        precision: 18
      severity:
        type: enum
        values: [none, low, medium, high, critical]
      affected_accounts:
        type: array
        items:
          type: string
          format: uuid
      detected_at:
        type: timestamp

  ledger.reconciliation.completed:
    aggregate: reconciliation
    aggregate_id_field: reconciliation_id
    source_domain: ledger
    version: 1.0.0
    description: A ledger reconciliation has been resolved
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - resolution method recorded
      - if adjustment: correction entry posted and balanced
    projection_effect:
      target: reconciliation_dashboard_view
      operation: update
      updates:
        state: COMPLETE
        resolution_method: event.resolution_method
    data_fields:
      reconciliation_id:
        type: string
        format: uuid
      resolution_method:
        type: enum
        values: [auto_tolerance, adjustment, escalation, no_action_needed]
      adjustment_entry_id:
        type: string
        format: uuid
        required: false
      resolved_at:
        type: timestamp

  ledger.period.closing:
    aggregate: accounting_period
    aggregate_id_field: period_id
    source_domain: ledger
    version: 1.0.0
    description: An accounting period is being closed with closing entries
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
    guarantees:
      - all entries for the period are settled
      - no pending reconciliations
      - closing entries will be posted
    projection_effect:
      target: accounting_period_view
      operation: update
      updates:
        status: CLOSING
    data_fields:
      period_id:
        type: string
        format: uuid
      ledger_id:
        type: string
        format: uuid
      closing_entries:
        entry_id:
          type: string
          format: uuid
      started_at:
        type: timestamp

  ledger.period.closed:
    aggregate: accounting_period
    aggregate_id_field: period_id
    source_domain: ledger
    version: 1.0.0
    description: An accounting period has been fully closed
    producer: ledger_service
    consumers:
      - ledger_projection
      - audit_projection
      - governance_projection
    guarantees:
      - closing entries posted and balanced
      - period is immutable
      - next period can now be closed
    projection_effect:
      target: accounting_period_view
      operation: update
      updates:
        status: CLOSED
        closing_entries_recorded: true
    data_fields:
      period_id:
        type: string
        format: uuid
      closing_entry_ids:
        type: array
        items:
          type: string
          format: uuid
      closed_at:
        type: timestamp

  # ========================================================
  # TREASURY DOMAIN EVENTS
  # ========================================================

  treasury.transfer.requested:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A new treasury transfer has been requested
    producer: treasury_service
    consumers:
      - treasury_projection
      - audit_projection
    guarantees:
      - order_id is globally unique
      - transfer state is REQUESTED
      - all required fields are present
    projection_effect:
      target: transfer_order_view
      operation: insert
    data_fields:
      order_id:
        type: string
        format: uuid
      source_actor_id:
        type: string
        format: uuid
      destination_details:
        type: object
      asset_id:
        type: string
        format: uuid
      amount:
        type: decimal
        precision: 18
      purpose:
        type: string
      requested_at:
        type: timestamp

  treasury.transfer.authorized:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A transfer has passed identity, capability, and policy gates
    producer: treasury_service
    consumers:
      - treasury_projection
      - audit_projection
    guarantees:
      - all authorization gates passed
      - policy evaluation result is APPROVE
      - transfer state is AUTHORIZED
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: AUTHORIZED
        authorized_at: event.timestamp
    data_fields:
      order_id:
        type: string
        format: uuid
      authorized_by:
        type: string
        format: uuid
      policy_result:
        type: string
      rules_applied:
        type: array
      authorized_at:
        type: timestamp

  treasury.transfer.rejected:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A transfer has been rejected
    producer: treasury_service
    consumers:
      - treasury_projection
      - audit_projection
      - governance_projection
    guarantees:
      - rejection reason is recorded
      - transfer state is REJECTED
      - no value was moved
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: REJECTED
        rejection_reason: event.reason
    data_fields:
      order_id:
        type: string
        format: uuid
      reason:
        type: string
      rejection_stage:
        type: string
      error_code:
        type: string
      rejected_at:
        type: timestamp

  treasury.transfer.reserved:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: Vault reservation has been locked for a transfer
    producer: treasury_service
    consumers:
      - treasury_projection
      - vault_projection
      - audit_projection
    guarantees:
      - vault lock is ACTIVE
      - vault_reservation_id references an ACTIVE reservation
      - transfer state is RESERVED
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: RESERVED
        vault_reservation_id: event.vault_reservation_id
        vault_lock_id: event.vault_lock_id
    data_fields:
      order_id:
        type: string
        format: uuid
      vault_reservation_id:
        type: string
        format: uuid
      vault_lock_id:
        type: string
        format: uuid
      reserved_amount:
        type: decimal
        precision: 18
      reserved_at:
        type: timestamp

  treasury.transfer.executing:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: Transfer execution has begun on the payment rail
    producer: treasury_service
    consumers:
      - treasury_projection
      - payment_projection
      - audit_projection
    guarantees:
      - vault lock was ACTIVE at time of execution
      - instruction_id references the payment instruction
      - compensation saga is defined
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: EXECUTING
        instruction_id: event.instruction_id
    data_fields:
      order_id:
        type: string
        format: uuid
      instruction_id:
        type: string
        format: uuid
      payment_rail:
        type: string
      max_attempts:
        type: integer
      timeout:
        type: integer
      executing_at:
        type: timestamp

  treasury.transfer.settled:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A transfer has been confirmed as settled
    producer: treasury_service
    consumers:
      - treasury_projection
      - vault_projection
      - ledger_projection
      - audit_projection
    guarantees:
      - settlement confirmed by external rail or reconciliation
      - vault reservation will be consumed
      - ledger journal entry will be posted
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: SETTLED
        settled_at: event.timestamp
    data_fields:
      order_id:
        type: string
        format: uuid
      settlement_reference:
        type: string
      settlement_amount:
        type: decimal
        precision: 18
      settled_at:
        type: timestamp

  treasury.transfer.failed:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A transfer has failed during execution or settlement
    producer: treasury_service
    consumers:
      - treasury_projection
      - vault_projection
      - audit_projection
      - governance_projection
    guarantees:
      - failure reason is recorded
      - vault lock may need to be released
      - compensation saga may be triggered
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: FAILED
        failure_reason: event.reason
    data_fields:
      order_id:
        type: string
        format: uuid
      reason:
        type: string
      failure_stage:
        type: string
      error_code:
        type: string
      retryable:
        type: boolean
      failed_at:
        type: timestamp

  treasury.transfer.expired:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A transfer has expired without completing
    producer: treasury_service
    consumers:
      - treasury_projection
      - vault_projection
      - audit_projection
    guarantees:
      - no value was moved
      - any vault reservation was released
      - transfer state is EXPIRED
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: EXPIRED
        expired_at: event.timestamp
    data_fields:
      order_id:
        type: string
        format: uuid
      expiration_reason:
        type: string
      state_at_expiration:
        type: string
      expired_at:
        type: timestamp

  treasury.transfer.compensation_required:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: A compensation saga has been initiated for a failed transfer
    producer: treasury_service
    consumers:
      - treasury_projection
      - vault_projection
      - audit_projection
      - governance_projection
    guarantees:
      - compensation step is defined
      - vault lock resolution is required
      - governance may need to approve
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        state: COMPENSATION_REQUIRED
        current_compensation_step: event.compensation_step
    data_fields:
      order_id:
        type: string
        format: uuid
      compensation_step:
        type: string
      compensation_saga_id:
        type: string
        format: uuid
      vault_resolution_required:
        type: boolean
      governance_approval_required:
        type: boolean
      initiated_at:
        type: timestamp

  treasury.liquidity.warning:
    aggregate: liquidity_position
    aggregate_id_field: actor_id
    source_domain: treasury
    version: 1.0.0
    description: Liquidity has fallen below a configured threshold
    producer: treasury_service
    consumers:
      - treasury_projection
      - governance_projection
      - alert_projection
    guarantees:
      - threshold breach is real (computed from projection)
      - no false positives from stale data
    projection_effect:
      target: liquidity_position_view
      operation: update
      updates:
        warning_active: true
        warning_level: event.level
    data_fields:
      actor_id:
        type: string
        format: uuid
      asset_id:
        type: string
        format: uuid
      current_available:
        type: decimal
        precision: 18
      threshold:
        type: decimal
        precision: 18
      level:
        type: string
      triggered_by:
        type: string
      warned_at:
        type: timestamp

  treasury.settlement.confirmed:
    aggregate: transfer_order
    aggregate_id_field: order_id
    source_domain: treasury
    version: 1.0.0
    description: Settlement has been confirmed for a transfer
    producer: treasury_service
    consumers:
      - treasury_projection
      - ledger_projection
      - vault_projection
      - audit_projection
    guarantees:
      - settlement matches original transfer amount
      - settlement reference is recorded
      - vault consumption will be triggered
    projection_effect:
      target: transfer_order_view
      operation: update
      updates:
        settlement_status: CONFIRMED
        settlement_reference: event.settlement_reference
    data_fields:
      order_id:
        type: string
        format: uuid
      settlement_reference:
        type: string
      settlement_amount:
        type: decimal
        precision: 18
      settlement_rail:
        type: string
      confirmed_at:
        type: timestamp

  # ========================================================
  # IDENTITY DOMAIN EVENTS
  # ========================================================

  identity.actor.registered:
    aggregate: actor
    aggregate_id_field: identity_id
    source_domain: identity
    version: 1.0.0
    description: A new actor has been registered in the Identity subsystem
    producer: identity_service
    consumers:
      - identity_projection
      - audit_projection
    guarantees:
      - INV-005: audit trail maintained
      - INV-008: identity gate enforced
    projection_effect:
      target: identity_actor_view
      operation: insert
    data_fields:
      identity_id:
        type: string
        format: uuid
      actor_type:
        type: enum
      display_name:
        type: string
      registered_by:
        type: string
        format: uuid
      trust_level:
        type: enum

  identity.actor.verified:
    aggregate: actor
    aggregate_id_field: identity_id
    source_domain: identity
    version: 1.0.0
    description: An actor has been verified by an authority
    producer: identity_service
    consumers:
      - identity_projection
      - audit_projection
    guarantees:
      - INV-003: authority establishment
      - INV-005: audit trail maintained
    projection_effect:
      target: identity_actor_view
      operation: update
      updates:
        verification_status: VERIFIED
        trust_level: event.trust_level_assigned
    data_fields:
      identity_id:
        type: string
        format: uuid
      verified_by:
        type: string
        format: uuid
      trust_level_assigned:
        type: enum

  identity.actor.suspended:
    aggregate: actor
    aggregate_id_field: identity_id
    source_domain: identity
    version: 1.0.0
    description: An actor has been suspended
    producer: identity_service
    consumers:
      - identity_projection
      - audit_projection
    guarantees:
      - INV-003: authority modification
      - INV-005: audit trail maintained
    projection_effect:
      target: identity_actor_view
      operation: update
      updates:
        status: SUSPENDED
    data_fields:
      identity_id:
        type: string
        format: uuid
      suspended_by:
        type: string
        format: uuid
      reason:
        type: string

  identity.actor.revoked:
    aggregate: actor
    aggregate_id_field: identity_id
    source_domain: identity
