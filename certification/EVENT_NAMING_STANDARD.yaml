# ============================================================
# SOVR Financial OS — Event Naming Standard
# File: certification/EVENT_NAMING_STANDARD.yaml
# Status: PHASE XIV-E.1 TASK 5
# ============================================================
# Enforces the canonical event naming convention:
#   domain.aggregate.action
#
# All events in 04_event-catalog.yaml MUST conform to this
# standard. The semantic-validator.ts enforces this as ERROR.
# ============================================================

meta:
  schema_version: "1.0.0"
  generated_at: "2026-07-18"
  status: FROZEN
  phase: "XIV-E.1"
  authority: 04_event-catalog.yaml
  enforcement: semantic-validator.ts

# ================================================================
# CANONICAL PATTERN
# ================================================================

canonical_pattern: "domain.aggregate.action"

pattern_explanation:
  domain:
    description: The bounded context that owns the aggregate
    examples: [vault, ledger, treasury, identity, policy, intent, agent, payment, governance, hybrid, kernel]
    constraint: lowercase, single word, matches domain name in protocol

  aggregate:
    description: The entity or aggregate root within the domain
    examples: [asset, reserve, collateral, journal, entry, account, transfer, actor, credential, session, delegation, rule, evaluation, escalation, intent, instance, registration, payment_request, execution, rail, reconciliation, receipt, proposal, amendment, emergency_halt, audit_record, capability_grant, blockchain_boundary, oracle_price, attestation, reorg_event, fork_event, system_health, saga_instance]
    constraint: lowercase, snake_case within aggregate name if needed (e.g., emergency_halt)

  action:
    description: The state change or fact being recorded
    examples: [registered, verified, rejected, impaired, created, locked, released, expired, added, valued, revalued, margin_call, liquidation_initiated, attested, proof_expired, updated, started, completed, failed, submitted, approved, escalated, deferred, cancelled, archived, bound, revoked, exceeded, prepared, executed, confirmed, timed_out, discrepancy, issued, compensated, settled, denied, activated, deactivated, halted, lifted, queried, reviewed, granted, resolved, expired]
    constraint: lowercase, past tense or adjective phrase describing the fact

