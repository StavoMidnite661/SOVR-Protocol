# ================================================================
# VALIDATION RULES
# ================================================================

validation_rules:

  - rule: THREE_SEGMENT_MINIMUM
    description: Event names MUST have at least 3 segments separated by dots
    pattern: "^[a-z][a-z0-9_]*\\.[a-z][a-z0-9_]*\\.[a-z][a-z0-9_]*$"
    severity: ERROR

  - rule: LOWERCASE_ONLY
    description: All segments MUST be lowercase
    pattern: "^[a-z][a-z0-9_]*$"
    severity: ERROR

  - rule: DOMAIN_MUST_MATCH_REGISTERED_DOMAIN
    description: First segment MUST match a registered domain name
    allowed_values: [vault, ledger, treasury, identity, policy, intent, agent, payment, governance, hybrid, kernel]
    severity: ERROR

  - rule: NO_EMPTY_SEGMENTS
    description: No segment may be empty (no consecutive dots, no leading/trailing dots)
    pattern: "^[^.]+\\.[^.]+\\.(.+)$"
    severity: ERROR

  - rule: AGGREGATE_NOT_VERB
    description: Aggregate segment SHOULD be a noun, not a verb
    examples:
      valid: [asset, reserve, transfer, session, proposal]
      invalid: [register, transfer, create, approve]
    severity: WARNING

  - rule: ACTION_NOT_NOUN
    description: Action segment SHOULD be a verb or state adjective, not a noun
    examples:
      valid: [registered, verified, completed, failed, confirmed]
      invalid: [creation, approval, completion, failure]
    severity: WARNING

  - rule: COMPOUND_AGGREGATES_UNDERSCORE
    description: If aggregate name is compound, use underscore not dot
    examples:
      valid: [emergency_halt, execution_plan, payment_request]
      invalid: [emergency.halt, execution.plan]
    severity: WARNING

# ================================================================
# SEMANTIC VALIDATOR ENFORCEMENT
# ================================================================

semantic_validator_enforcement:

  check_name: EVENT_NAME_STANDARD
  severity: ERROR
  file: packages/compiler/src/validator/semantic-validator.ts
  method: checkEventNameStandard()
  description: Validates all event names conform to domain.aggregate.action pattern

  promoted_warnings:
    - EVENT_NAME_STANDARD
    - UNKNOWN_EVENT_REFERENCE
    - MISSING_PROJECTION
    - COMMAND_GATES_COMPLETENESS
    - MISSING_INVARIANT
