naming_conflicts:

  - event: treasury.transfer.rejected
    issue: duplicate_semantic
    detail: >
      This event is emitted by both treasury.transfer.authorize and
      treasury.transfer.cancel commands. The state machine also uses
      it for REQUESTED_to_REJECTED and AUTHORIZED_to_REJECTED transitions.
      Consider splitting into treasury.transfer.authorization_rejected
      and treasury.transfer.cancelled for clarity.
    severity: medium

  - event: policy.evaluation.active_operation_blocked
    issue: missing_from_catalog
    detail: >
      Referenced by policy_review_saga but not declared in catalog.
      Should be added or saga should use policy.evaluation.denied.
    severity: medium

  - event: payment.execution.settled
    issue: duplicate_semantic
    detail: >
      Similar to treasury.transfer.settled and payment.rail.confirmed.
      Three events representing the same conceptual state change.
      Should be unified or explicitly differentiated.
    severity: medium

  - event: payment.settlement.confirmed
    issue: duplicate_semantic
    detail: >
      Overlaps with treasury.settlement.confirmed. Two events for
      the same settlement confirmation concept.
    severity: medium

  - event: payment.settlement.completed
    issue: duplicate_semantic
    detail: >
      Overlaps with treasury.transfer.settled. Three events for
      settlement completion.
    severity: medium

  - event: payment.settlement.failed
