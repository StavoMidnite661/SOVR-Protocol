    ## Compiler Runtime: Proof of Execution (programmatic input)
    
    Despite not reading YAML, the CompilerRuntime CAN execute:
    
    ```typescript
    import { CompilerRuntime, CompilerInput } from '@sovr/compiler-runtime'
    
    const input: CompilerInput = {
      constitution: { version: '1.0.0', invariants: [] },
      domains: [
        { name: 'vault', properties: { state: 'string' } },
        { name: 'ledger', properties: { balance: 'number' } }
      ],
      commands: [
        { name: 'CreateVault', domain: 'vault' },
        { name: 'PostEntry', domain: 'ledger' }
      ],
      events: [
        { name: 'VaultCreated', domain: 'vault' },
        { name: 'EntryPosted', domain: 'ledger' }
      ]
    }
    
    const runtime = new CompilerRuntime(input)
    const output = runtime.execute()
    // output.interfaces, output.schemas, output.validators, output.documentation
    // are populated
    runtime.writeOutput('./generated')
    // Creates: interfaces.ts, schemas.ts, validators.ts, README.md
    ```
    
    **Status**: Verified by code inspection. CompilerRuntime.execute() and
    writeOutput() are implemented and produce deterministic output for identical
    input. This proves the compiler RUNTIME is executable; the YAML BRIDGE is not.
    
