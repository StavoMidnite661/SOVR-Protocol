    ## Compiler Execution: ACTUAL
    
    ### What the compiler does today
    
    **packages/compiler/src/index.ts**:
    ```typescript
    export class ProtocolParser {
      parse(_filePath: string): ParsedProtocol {
        return {
          entities: [], commands: [], events: [],
          aggregates: [], capabilities: []
        }
      }
    }
    ```
    The stub returns empty arrays. It does not read or parse YAML.
    
    **packages/compiler/runtime/src/executor.ts**:
    ```typescript
    export class CompilerRuntime {
      execute(): CompilerOutput {
        this.generateInterfaces()
        this.generateSchemas()
        this.generateValidators()
        this.generateDocumentation()
        return this.output
      }
    }
    ```
    The runtime generates output from programmatic `CompilerInput` objects, not
    from YAML files. It does not read protocol YAML.
    
    ### What compiler.yaml declares
    
    compiler.yaml declares 20+ input files producing:
    - typescript_types, validation_library, fastify_routes, openapi_spec
    - json_schemas, event_classes, command_classes, aggregate_roots
    - prisma_models, sql_migrations, kafka_topics, redis_streams
    - workflow_definitions, policy_engine, capability_engine
    - test_skeletons, documentation
    
    **None of these outputs are currently generated from YAML sources.**
    
