        attributes:
          identity_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique identity identifier
          actor_type:
            type: enum
            values: [human, organization, ai_agent, service_account, governance, external_system]
            required: true
            description: Type of actor
          state:
            type: enum
            values: [PENDING_VERIFICATION, VERIFYING, ACTIVE, SUSPENDED, REVOKED, ARCHIVED]
            required: true
            description: Current lifecycle state
          display_name:
            type: string
            required: true
            description: Human-readable display name
          legal_identifier:
            type: string
            required: false
            description: Legal/tax ID for human/organization
          primary_contact:
            type: string
            required: false
            description: Primary contact information
          trust_level:
            type: enum
            values: [NONE, LOW, MEDIUM, HIGH, SOVEREIGN]
            required: true
            description: Trust classification level
          governance_approved_by:
            type: string
            format: uuid
            required: false
            description: Who approved this identity
          registered_at:
            type: timestamp
            required: true
            description: Registration timestamp
          verified_at:
            type: timestamp
            required: false
            description: Verification timestamp
          suspended_at:
            type: timestamp
            required: false
            description: Suspension timestamp
          revoked_at:
            type: timestamp
            required: false
