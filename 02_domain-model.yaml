      credential:
        description: Authentication credential bound to an identity
        attributes:
          credential_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique credential identifier
          identity_id:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
