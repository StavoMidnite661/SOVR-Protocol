          credential_type:
            type: enum
            values: [cryptographic_key, biometric_binding, hardware_token, delegated_token, governance_credential]
            required: true
            description: Type of credential
          state:
            type: enum
            values: [ACTIVE, EXPIRED, REVOKED, SUSPENDED, ROTATED]
            required: true
            description: Current credential state
          trust_level:
            type: enum
            values: [NONE, LOW, MEDIUM, HIGH, SOVEREIGN]
            required: true
            description: Trust level conferred by this credential
          authentication_factor:
            type: enum
            values: [KNOWLEDGE, POSSESSION, INHERENCE, DELEGATED, GOVERNANCE]
            required: true
            description: Authentication factor category
          binding_strength:
            type: enum
            values: [WEAK, MODERATE, STRONG, SOVEREIGN]
            required: true
            description: Strength of identity binding
          expires_at:
            type: timestamp
            required: true
            description: Credential expiration timestamp
          revocable:
            type: boolean
            required: true
            description: Whether the credential can be revoked
          scope_restrictions:
            type: array
            required: false
            description: Restrictions on credential scope
          max_delegation_depth:
            type: integer
            required: true
            description: Maximum delegation chain depth
          issued_at:
            type: timestamp
            required: true
            description: Issuance timestamp
          issued_by:
            type: string
            format: uuid
            required: true
            description: Identity that issued this credential
          last_used_at:
            type: timestamp
            required: false
            description: Last usage timestamp
        reference: domains/identity.yaml

      trust_anchor:
        description: Root of trust for identity verification
        attributes:
          trust_anchor_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique trust anchor identifier
          anchor_type:
            type: enum
            values: [GOVERNANCE_ROOT, ORGANIZATION_CA, EXTERNAL_CA, SYSTEM_INTERNAL]
            required: true
            description: Classification of trust anchor
          anchor_label:
            type: string
            required: true
            description: Human-readable label
          public_key_material:
            type: string
            required: true
            description: Public key or certificate material
          key_algorithm:
            type: enum
            values: [ed25519, secp256k1, rsa_4096]
            required: true
            description: Cryptographic algorithm
          key_usage:
            type: enum
            values: [AUTHENTICATION, SIGNING, ENCRYPTION, CERTIFICATE_AUTHORITY]
            required: true
            description: Intended key usage
          trust_level_issued:
            type: enum
            values: [NONE, LOW, MEDIUM, HIGH, SOVEREIGN]
            required: true
            description: Trust level this anchor can issue
          scope_of_trust:
            type: array
            required: true
            description: Domains or identities this anchor covers
          issued_by:
            type: string
            format: uuid
            required: true
            description: Identity that registered this anchor
          valid_from:
            type: timestamp
            required: true
            description: Validity start timestamp
          valid_until:
            type: timestamp
            required: true
            description: Validity end timestamp
          revocation_check_url:
            type: string
            required: false
            description: URL for revocation status checks
          status:
            type: enum
            values: [ACTIVE, REVOKED, EXPIRED]
            required: true
            description: Current trust anchor status
          governance_approval_id:
            type: string
            format: uuid
            required: false
            description: Governance approval reference
        reference: domains/identity.yaml

      delegation:
        description: Delegation of capabilities from one identity to another
        attributes:
          delegation_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique delegation identifier
          delegator_id:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Identity granting the delegation
          delegate_id:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Identity receiving the delegation
          delegated_capabilities:
            type: array
            required: true
            description: List of capability pattern and scope restriction objects
          max_delegation_depth:
            type: integer
            required: true
            description: Maximum depth for sub-delegation
          conditions:
            type: object
            required: false
            description: Delegation conditions including time, amount, and purpose restrictions
          state:
            type: enum
            values: [PENDING_ACCEPTANCE, ACTIVE, EXPIRED, REVOKED]
            required: true
            description: Current delegation state
          revocable_by_delegator:
            type: boolean
            required: true
            description: Always true for financial delegations
          audit_requirement:
            type: enum
            values: [STANDARD, ENHANCED, FULL]
            required: true
            description: Level of audit logging required
          created_at:
            type: timestamp
            required: true
            description: Creation timestamp
          accepted_at:
            type: timestamp
            required: false
            description: Acceptance timestamp
          revoked_at:
            type: timestamp
            required: false
            description: Revocation timestamp
          revoked_by:
            type: string
            format: uuid
            required: false
            description: Identity that revoked the delegation
          current_depth:
            type: integer
            required: true
            description: Current depth in delegation chain
          parent_delegation_id:
            type: string
            format: uuid
            required: false
            description: Parent delegation for chained delegations
        reference: domains/identity.yaml

      session:
        description: An active authentication session
        attributes:
          session_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique session identifier
          identity_id:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Authenticated identity
          credential_id:
            type: string
            format: uuid
            required: true
            references: identity.credential.credential_id
            description: Credential used for authentication
          authentication_method:
            type: enum
            values: [password, mfa, biometric, hardware_key, delegated, cryptographic_signature, mutual_tls, api_key, webhook_verification, multi_signature, governance_credential]
            required: true
            description: Method used to authenticate
          trust_level:
            type: enum
            values: [NONE, LOW, MEDIUM, HIGH, SOVEREIGN]
            required: true
            description: Trust level of this session
          binding_strength:
            type: enum
            values: [WEAK, MODERATE, STRONG, SOVEREIGN]
            required: true
            description: Identity binding strength
          state:
            type: enum
            values: [ACTIVE, EXPIRED, REVOKED, TERMINATED]
            required: true
            description: Current session state
          created_at:
            type: timestamp
            required: true
            description: Session creation timestamp
          last_activity_at:
            type: timestamp
            required: true
            description: Last activity timestamp
          expires_at:
            type: timestamp
            required: true
            description: Session expiration timestamp
          max_session_duration:
            type: integer
            required: true
            description: Maximum session duration in seconds
          idle_timeout:
            type: integer
            required: true
            description: Idle timeout in seconds
          capabilities_granted:
            type: array
            required: false
            description: Capabilities granted in this session
          delegation_chain:
            type: array
            required: false
            description: List of delegation chain entries
          concurrent_session_limit:
            type: integer
            required: true
            description: Maximum concurrent sessions allowed
          source_ip:
            type: string
            required: false
            description: Source IP address
          device_fingerprint:
            type: string
            required: false
            description: Device fingerprint hash
          geo_location:
            type: string
            required: false
            description: Geographic location
        reference: domains/identity.yaml

      authentication_context:
        description: Output object capturing the full authentication context
        attributes:
          identity_id:
            type: string
            format: uuid
            required: true
            description: Authenticated identity
          actor_type:
            type: enum
            values: [human, organization, ai_agent, service_account, governance, external_system]
            required: true
            description: Type of actor
          authentication_method:
            type: enum
            values: [password, mfa, biometric, hardware_key, delegated, cryptographic_signature, mutual_tls, api_key, webhook_verification, multi_signature, governance_credential]
            required: true
            description: Authentication method used
          credential_id:
            type: string
            format: uuid
            required: true
            description: Credential used
          trust_level:
            type: enum
            values: [NONE, LOW, MEDIUM, HIGH, SOVEREIGN]
            required: true
            description: Trust level established
          binding_strength:
            type: enum
            values: [WEAK, MODERATE, STRONG, SOVEREIGN]
            required: true
            description: Identity binding strength
          authenticated_at:
            type: timestamp
            required: true
            description: Authentication timestamp
          session_id:
            type: string
            format: uuid
            required: true
            description: Associated session
          expires_at:
            type: timestamp
            required: true
            description: Context expiration timestamp
          delegation_chain:
            type: array
            required: true
            description: Full delegation chain
          ip_address:
            type: string
            required: false
            description: Client IP address
          device_fingerprint:
            type: string
            required: false
            description: Device fingerprint
          geo_location:
            type: string
            required: false
            description: Geographic location
        reference: domains/identity.yaml

  # ========================================================
  # POLICY DOMAIN ENTITIES
  # ========================================================
  policy:
    name: Policy
    description: Rule Evaluation Domain
    entities:

      policy_rule:
        description: A single policy rule for authorization, risk, or compliance
        attributes:
          rule_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique rule identifier
          rule_name:
            type: string
            required: true
            description: Dot-notation name for the rule
          description:
            type: string
            required: true
            description: Human-readable rule description
          category:
            type: enum
            values: [AUTHORIZATION, RISK, COMPLIANCE, OPERATIONAL, GOVERNANCE, CONSTITUTIONAL]
            required: true
            description: Rule category
          priority:
            type: integer
            required: true
            description: Rule priority for ordering
          evaluation_order:
            type: integer
            required: true
            description: Order within the policy set
          condition_type:
            type: enum
            values: [ALWAYS, IF_FIELD, IF_STATE, IF_THRESHOLD, IF_PATTERN, IF_ABSENCE, COMPOSITE]
            required: true
            description: Type of condition to evaluate
          condition_field:
            type: string
            required: false
            description: Field to evaluate in condition
          condition_operator:
            type: enum
            values: [EQ, NEQ, GT, GTE, LT, LTE, IN, NOT_IN, MATCHES, CONTAINS, ABSENT, PRESENT]
            required: false
            description: Comparison operator
          condition_value:
            type: string
            required: false
            description: Expected condition value
          composite_operator:
            type: enum
            values: [AND, OR, NOT]
            required: false
            description: Operator for composite conditions
          action:
            type: enum
            values: [ALLOW, DENY, ESCALATE, DEFER, REQUIRE_CONDITION, REQUIRE_APPROVAL]
            required: true
            description: Action when rule matches
          escalation_target:
            type: enum
            values: [GOVERNANCE, HUMAN_OPERATOR, COMPLIANCE_OFFICER, NONE]
            required: true
            description: Target for escalation actions
          compliance_mapping:
            type: array
            required: false
            description: External compliance framework mappings
          constitutional_reference:
            type: string
            required: false
            description: Reference to constitutional invariant
          active:
            type: boolean
            required: true
            description: Whether the rule is active
          effective_from:
            type: timestamp
            required: true
            description: When the rule becomes effective
          effective_until:
            type: timestamp
            required: false
            description: When the rule stops being effective
          version:
            type: string
            format: semver
            required: true
            description: Rule version
          last_modified_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Identity that last modified this rule
          last_modified_at:
            type: timestamp
            required: true
            description: Last modification timestamp
          state:
            type: enum
            values: [DRAFT, ACTIVE, INACTIVE, ARCHIVED]
            required: true
            description: Current rule lifecycle state
        reference: domains/policy.yaml

      policy_set:
        description: A named collection of policy rules with evaluation strategy
        attributes:
          set_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique policy set identifier
          name:
            type: string
            required: true
            description: Policy set name
          description:
            type: string
            required: true
            description: Human-readable description
          domain_scope:
            type: enum
            values: [GLOBAL, VAULT, TREASURY, LEDGER, IDENTITY, AGENT, PAYMENT, GOVERNANCE]
            required: true
            description: Domain this policy set applies to
          rule_ids:
            type: array
            required: true
            description: List of policy rule identifiers
          evaluation_strategy:
            type: enum
            values: [FIRST_MATCH, ALL_MUST_PASS, MAJORITY, WEIGHTED_SCORE]
            required: true
            description: How rules in the set are combined
          conflict_resolution:
            type: enum
            values: [MOST_RESTRICTIVE, LEAST_RESTRICTIVE, PRIORITY_ORDER, ESCALATE]
            required: true
            description: How conflicting rule outcomes are resolved
          active:
            type: boolean
            required: true
            description: Whether the policy set is active
          governance_approved:
            type: boolean
            required: true
            description: Whether governance has approved this set
          version:
            type: string
            format: semver
            required: true
            description: Policy set version
          created_at:
            type: timestamp
            required: true
            description: Creation timestamp
        reference: domains/policy.yaml

      policy_evaluation:
        description: A single policy evaluation event
        attributes:
          evaluation_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique evaluation identifier
          policy_set_id:
            type: string
            format: uuid
            required: true
            references: policy.policy_set.set_id
            description: Policy set that was evaluated
          authorization_context_id:
            type: string
            format: uuid
            required: true
            description: Authorization context from Identity domain
          command_id:
            type: string
            format: uuid
            required: true
            description: Command being evaluated
          decision:
            type: enum
            values: [ALLOW, DENY, ESCALATE, DEFER]
            required: true
            description: Final policy decision
          confidence:
            type: enum
            values: [CERTAIN, HIGH, MEDIUM, LOW]
            required: true
            description: Confidence in the decision
          rules_evaluated:
            type: integer
            required: true
            description: Total number of rules evaluated
          rules_passed:
            type: integer
            required: true
            description: Number of rules that passed
          rules_failed:
            type: integer
            required: true
            description: Number of rules that failed
          risk_assessment_id:
            type: string
            format: uuid
            required: false
            description: Associated risk assessment
          deterministic_hash:
            type: string
            required: true
            description: Hash for deterministic replay verification
          state:
            type: enum
            values: [IDLE, GATHERING_CONTEXT, EVALUATING_RULES, COMPUTING_DECISION, DECISION_RENDERED, ARCHIVED]
            required: true
            description: Current evaluation state
          evaluation_duration_ms:
            type: integer
            required: true
            description: Duration of the evaluation in milliseconds
          evaluated_at:
            type: timestamp
            required: true
            description: Evaluation timestamp
        reference: domains/policy.yaml

      policy_escalation:
        description: An escalation triggered during policy evaluation
        attributes:
          escalation_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique escalation identifier
          evaluation_id:
            type: string
            format: uuid
            required: true
            references: policy.policy_evaluation.evaluation_id
            description: Policy evaluation that triggered escalation
          escalation_reason:
            type: enum
            values: [NO_MATCHING_POLICY, CONFLICTING_RULES, RISK_THRESHOLD, COMPLIANCE_AMBIGUITY, NOVEL_OPERATION, GOVERNANCE_REQUIRED]
            required: true
            description: Reason for the escalation
          escalation_target:
            type: enum
            values: [GOVERNANCE, HUMAN_OPERATOR, COMPLIANCE_OFFICER]
            required: true
            description: Who must resolve the escalation
          required_resolution:
            type: enum
            values: [MANUAL_APPROVAL, POLICY_UPDATE, GOVERNANCE_DIRECTIVE]
            required: true
            description: Type of resolution required
          deadline:
            type: timestamp
            required: true
            description: Resolution deadline
          auto_deny_after_deadline:
            type: boolean
            required: true
            description: Whether to auto-deny if deadline passes
          state:
            type: enum
            values: [PENDING, UNDER_REVIEW, RESOLVED, EXPIRED, AUTO_DENIED]
            required: true
            description: Current escalation state
          created_at:
            type: timestamp
            required: true
            description: Escalation creation timestamp
          resolved_at:
            type: timestamp
            required: false
            description: Resolution timestamp
          resolved_by:
            type: string
            format: uuid
            required: false
            description: Identity that resolved the escalation
        reference: domains/policy.yaml

