            required: true
            description: Submission timestamp
          reviewed_at:
            type: timestamp
            required: false
            description: Review completion timestamp
        reference: domains/agent.yaml

      capability_binding:
        description: Binding of a capability to an agent instance
        attributes:
          binding_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique binding identifier
          agent_id:
            type: string
            format: uuid
            required: true
            references: agent.agent_instance.agent_id
            description: Agent the capability is bound to
          capability_id:
            type: string
            required: true
            description: The capability being bound
          scope_pattern:
            type: string
            required: true
            description: Scope pattern for the capability
          granted_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Identity that granted the binding
          granted_at:
            type: timestamp
            required: true
            description: Granting timestamp
          expires_at:
            type: timestamp
            required: false
            description: Binding expiration timestamp
          conditions:
            type: array
            required: false
            description: Conditions on the capability binding
          revocable:
            type: boolean
            required: true
            description: Whether the binding can be revoked
          state:
            type: enum
            values: [ACTIVE, EXPIRED, REVOKED]
            required: true
            description: Current binding state
        reference: domains/agent.yaml

      agent_audit_envelope:
        description: Immutable audit record of a single agent execution
        attributes:
          execution_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique execution identifier
          agent_id:
            type: string
            format: uuid
            required: true
            references: agent.agent_instance.agent_id
            description: Agent that executed
          identity_id:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Identity on behalf of which the agent acted
          intent_id:
            type: string
            format: uuid
            required: true
            references: intent.intent.intent_id
            description: Intent that triggered the execution
          command_id:
            type: string
            format: uuid
            required: true
            description: Command executed by the agent
          policy_decision_id:
            type: string
            format: uuid
            required: true
            references: policy.policy_evaluation.evaluation_id
            description: Policy decision authorizing the execution
          capability_id:
            type: string
            required: true
            description: Capability used for the execution
          authorization_context_id:
            type: string
            format: uuid
            required: true
            description: Authorization context
          resources_used:
            type: object
            required: true
            description: Resource consumption metrics
          execution_result:
            type: enum
            values: [SUCCESS, FAILURE, ESCALATED, TIMEOUT, PARTIAL]
            required: true
            description: Outcome of the execution
          execution_time_ms:
            type: integer
            required: true
            description: Execution duration in milliseconds
          constitutional_rules:
            type: array
            required: true
            description: Constitutional rules evaluated during execution
          model_version:
            type: string
            required: true
            description: AI model version used
          input_summary:
            type: string
            required: true
            description: Summary of agent input
          output_summary:
            type: string
            required: true
            description: Summary of agent output
          state_changes:
            type: array
            required: true
            description: List of state changes caused by execution
          error_detail:
            type: string
            required: false
            description: Error details if execution failed
          executed_at:
            type: timestamp
            required: true
            description: Execution start timestamp
          completed_at:
            type: timestamp
            required: false
            description: Execution completion timestamp
        reference: domains/agent.yaml

      execution_quota:
        description: Resource and scope limits for an agent within a time period
        attributes:
          quota_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique quota identifier
          agent_id:
            type: string
            format: uuid
            required: true
            references: agent.agent_instance.agent_id
            description: Agent the quota applies to
          period:
            type: enum
            values: [HOURLY, DAILY, WEEKLY, MONTHLY]
            required: true
            description: Quota reset period
          max_commands:
            type: integer
            required: true
            description: Maximum commands allowed per period
          max_financial_value:
            type: decimal
            precision: 18
            required: true
            description: Maximum financial value allowed per period
          max_distinct_actors_affected:
            type: integer
            required: true
            description: Maximum distinct actors the agent can affect per period
          max_asset_types:
            type: integer
            required: true
            description: Maximum asset types the agent can touch per period
          commands_executed:
            type: integer
            required: true
            description: Commands executed in the current period
          financial_value_moved:
            type: decimal
            precision: 18
            required: true
            description: Financial value moved in the current period
          reset_at:
            type: timestamp
            required: true
            description: Next quota reset timestamp
          enforced:
            type: boolean
            required: true
            description: Whether the quota is actively enforced
        reference: domains/agent.yaml

  # ========================================================
  # GOVERNANCE DOMAIN ENTITIES
  # ========================================================
  governance:
    name: Governance
    description: Constitutional Oversight Domain
    entities:

      governance_proposal:
        description: A proposed governance action requiring review and approval
        attributes:
          proposal_id:
            type: string
            format: uuid
            required: true
            unique: true
          proposal_type:
            type: enum
            values: [CONSTITUTIONAL_AMENDMENT, POLICY_RULE_CREATE, POLICY_RULE_MODIFY, CAPABILITY_GRANT, CAPABILITY_REVOKE, AGENT_APPROVAL, AGENT_OVERRIDE, BOUNDARY_SYSTEM_APPROVAL, EMERGENCY_HALT, AUDIT_INVESTIGATION]
            required: true
          proposed_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
          target_domain:
            type: enum
            values: [VAULT, LEDGER, TREASURY, IDENTITY, POLICY, INTENT, AGENT, PAYMENT, GOVERNANCE, SYSTEM]
            required: true
          state:
            type: enum
            values: [DRAFT, PENDING_REVIEW, APPROVED, REJECTED, EXPIRED, IMPLEMENTED, CANCELLED]
            required: true
          required_approvals:
            type: integer
            required: true
          current_approvals:
            type: integer
            required: true
            default: 0
          approval_threshold:
            type: enum
            values: [SINGLE, MAJORITY, UNANIMOUS]
            required: true
          expires_at:
            type: timestamp
            required: true
          implemented_at:
            type: timestamp
            required: false
          created_at:
            type: timestamp
            required: true
        reference: domains/governance.yaml

      governance_amendment:
        description: A proposed change to the constitutional framework
        attributes:
          amendment_id:
            type: string
            format: uuid
            required: true
            unique: true
          amendment_number:
            type: string
            required: true
            unique: true
          section:
            type: enum
            values: [INVARIANTS, CONFLICT_RESOLUTION, AUTHORITY_MODEL, FINANCIAL_INTEGRITY, AGENT_GOVERNANCE, GOVERNANCE_STRUCTURE, RUNTIME_ENFORCEMENT, PROTECTED_ARTICLES]
            required: true
          proposed_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
          state:
            type: enum
            values: [PROPOSED, UNDER_REVIEW, VOTING, APPROVED, REJECTED, RATIFIED, EXPIRED]
            required: true
          voting_ends_at:
            type: timestamp
            required: true
          ratified_at:
            type: timestamp
            required: false
          created_at:
            type: timestamp
            required: true
        reference: domains/governance.yaml

      governance_override:
        description: A governance override of an agent decision or system behavior
        attributes:
          override_id:
            type: string
            format: uuid
            required: true
            unique: true
          override_type:
            type: enum
            values: [AGENT_DECISION_OVERRIDE, POLICY_EXCEPTION, CAPABILITY_SUSPENSION, TRANSACTION_BLOCK, EMERGENCY_HALT]
            required: true
          target_type:
            type: enum
            values: [AGENT, POLICY_RULE, CAPABILITY, TRANSACTION, SYSTEM]
            required: true
          target_id:
            type: string
            format: uuid
            required: true
          issued_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
          effective_from:
            type: timestamp
            required: true
          expires_at:
            type: timestamp
            required: false
          state:
            type: enum
            values: [ACTIVE, EXPIRED, LIFTED, CANCELLED]
            required: true
          created_at:
            type: timestamp
            required: true
        reference: domains/governance.yaml

      emergency_halt:
        description: A record of an emergency system halt
        attributes:
          halt_id:
            type: string
            format: uuid
            required: true
            unique: true
          triggered_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
          trigger_reason:
            type: enum
            values: [ACTIVE_BREACH, ASSET_INTEGRITY_COMPROMISED, REGULATORY_MANDATE, SYSTEMIC_FAILURE]
            required: true
          affected_domains:
            type: array
            items:
              type: enum
              values: [VAULT, LEDGER, TREASURY, IDENTITY, POLICY, INTENT, AGENT, PAYMENT, ALL]
            required: true
          state:
            type: enum
            values: [ACTIVE, PARTIALLY_LIFTED, LIFTED, EXPIRED]
            required: true
          initiated_at:
            type: timestamp
            required: true
          expires_at:
            type: timestamp
            required: true
          lifted_at:
            type: timestamp
            required: false
          post_action_review_required:
            type: boolean
            required: true
            default: true
          post_action_review_completed:
            type: boolean
            required: true
            default: false
        reference: domains/governance.yaml

      audit_record:
        description: A governance-initiated audit record
        attributes:
          audit_id:
            type: string
            format: uuid
            required: true
            unique: true
          audit_type:
            type: enum
            values: [ROUTINE, INVESTIGATIVE, COMPLIANCE, EMERGENCY, CONSTITUTIONAL]
            required: true
          initiated_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
          target_domains:
            type: array
            items:
              type: enum
              values: [VAULT, LEDGER, TREASURY, IDENTITY, POLICY, INTENT, AGENT, PAYMENT, ALL]
            required: true
          start_date:
            type: timestamp
            required: true
          end_date:
            type: timestamp
            required: false
          state:
            type: enum
            values: [PENDING, IN_PROGRESS, COMPLETED, ESCALATED]
            required: true
          created_at:
            type: timestamp
            required: true
          completed_at:
            type: timestamp
            required: false
        reference: domains/governance.yaml

      escalation:
        description: A governance escalation record
        attributes:
          escalation_id:
            type: string
            format: uuid
            required: true
            unique: true
          source_domain:
            type: enum
            values: [VAULT, LEDGER, TREASURY, IDENTITY, POLICY, INTENT, AGENT, PAYMENT, GOVERNANCE]
            required: true
          source_event_id:
            type: string
            format: uuid
            required: true
          reason:
            type: string
            required: true
          submitted_by:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
          state:
            type: enum
            values: [PENDING, UNDER_REVIEW, RESOLVED, EXPIRED, AUTO_DENIED]
            required: true
          resolution:
            type: object
            required: false
          resolved_by:
            type: string
            format: uuid
            required: false
            references: identity.actor.identity_id
          resolved_at:
            type: timestamp
            required: false
          created_at:
            type: timestamp
            required: true
        reference: domains/governance.yaml

  # ========================================================
  # INTENT DOMAIN ENTITIES
  # ========================================================
  intent:
    name: Intent
    description: Intention Translation Domain
    entities:

      intent:
        description: A user or agent intent to perform an action
        attributes:
          intent_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique intent identifier
          intent_type:
            type: enum
            values: [COMPLETE, PARTIAL, CONDITIONAL, DELEGATED, SCHEDULED, MULTI_STEP]
            required: true
            description: Type of intent
          actor_id:
            type: string
            format: uuid
            required: true
            references: identity.actor.identity_id
            description: Identity originating the intent
          authorization_context_id:
            type: string
            format: uuid
            required: true
            description: Authorization context from Identity domain
          policy_decision_id:
            type: string
            format: uuid
            required: true
            references: policy.policy_evaluation.evaluation_id
            description: Policy decision for this intent
          objective:
            type: string
            required: true
            description: Natural language or structured objective
          domain_target:
            type: enum
            values: [VAULT, TREASURY, LEDGER, PAYMENT, IDENTITY, POLICY, AGENT, GOVERNANCE]
            required: true
            description: Target domain for the intent
          payload:
            type: object
            required: true
            description: Domain-specific payload varying by target
          confidence:
            type: enum
            values: [CERTAIN, HIGH, MEDIUM, LOW, AMBIGUOUS]
            required: true
            description: Confidence in intent interpretation
          state:
            type: enum
            values: [RECEIVED, ENRICHING, VALIDATING, READY, CONVERTED_TO_COMMAND, FAILED, CANCELLED, EXPIRED, ARCHIVED]
            required: true
            description: Current intent lifecycle state
          priority:
            type: enum
            values: [IMMEDIATE, HIGH, NORMAL, LOW, DEFERRED]
            required: true
            description: Intent processing priority
          conditions:
            type: array
            required: false
            description: Conditions that must be met
          schedule:
            type: object
            required: false
            description: Execution schedule for scheduled intents
          steps:
            type: array
            required: false
            description: Ordered steps for multi-step intents
          delegation_id:
            type: string
            format: uuid
            required: false
            references: identity.delegation.delegation_id
            description: Associated delegation
          original_actor_id:
            type: string
            format: uuid
            required: false
            description: Original actor for delegated intents
          converted_command_id:
            type: string
            format: uuid
            required: false
            description: Command generated from this intent
          error_detail:
            type: string
            required: false
            description: Error details if intent failed
          created_at:
            type: timestamp
            required: true
            description: Intent creation timestamp
          enriched_at:
            type: timestamp
            required: false
            description: Enrichment completion timestamp
          validated_at:
            type: timestamp
            required: false
            description: Validation completion timestamp
          converted_at:
            type: timestamp
            required: false
            description: Command conversion timestamp
          archived_at:
            type: timestamp
            required: false
            description: Archive timestamp
          expires_at:
            type: timestamp
            required: false
            description: Intent expiration timestamp
        reference: domains/intent.yaml

      enrichment_step:
        description: A single step in the intent enrichment pipeline
        attributes:
          step_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique step identifier
          intent_id:
            type: string
            format: uuid
            required: true
            references: intent.intent.intent_id
            description: Parent intent being enriched
          step_type:
            type: enum
            values: [FIELD_RESOLUTION, ENTITY_LOOKUP, AMOUNT_NORMALIZATION, CURRENCY_CONVERSION, COUNTERPARTY_RESOLUTION, SCOPE_EXPANSION, CONTEXT_ENRICHMENT]
            required: true
            description: Type of enrichment step
          input_fields:
            type: array
            required: true
            description: Fields consumed by this step
          output_fields:
            type: array
            required: true
            description: Fields produced by this step
          data_source:
            type: enum
            values: [VAULT, IDENTITY, TREASURY, LEDGER, EXTERNAL_ORACLE, POLICY]
            required: true
            description: Source domain for data lookup
          required:
            type: boolean
            required: true
            description: Whether this step must succeed
          retryable:
            type: boolean
            required: true
            description: Whether the step can be retried
          timeout_ms:
            type: integer
            required: true
            description: Step timeout in milliseconds
          state:
            type: enum
            values: [PENDING, IN_PROGRESS, COMPLETED, FAILED, SKIPPED]
            required: true
            description: Current step state
          result:
            type: object
            required: false
            description: Step result data
          error:
            type: string
            required: false
            description: Error message if step failed
          executed_at:
            type: timestamp
            required: false
            description: Step execution timestamp
          duration_ms:
            type: integer
            required: false
            description: Step execution duration in milliseconds
        reference: domains/intent.yaml

      intent_validation:
        description: Validation result for an intent
        attributes:
          validation_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique validation identifier
          intent_id:
            type: string
            format: uuid
            required: true
            references: intent.intent.intent_id
            description: Intent being validated
          overall_result:
            type: enum
            values: [VALID, INVALID, VALID_WITH_WARNINGS, REQUIRES_HUMAN_REVIEW]
            required: true
            description: Overall validation outcome
          blocking_failures:
            type: integer
            required: true
            description: Count of blocking validation failures
          warnings:
            type: integer
            required: true
            description: Count of validation warnings
          validated_at:
            type: timestamp
            required: true
            description: Validation timestamp
        reference: domains/intent.yaml

      command_conversion:
        description: Conversion of an intent into an executable command
        attributes:
          conversion_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique conversion identifier
          intent_id:
            type: string
            format: uuid
            required: true
            references: intent.intent.intent_id
            description: Source intent
          command_id:
            type: string
            format: uuid
            required: true
            description: Generated command identifier
          command_name:
            type: string
            required: true
            description: Fully qualified command name
          command_payload:
            type: object
            required: true
            description: Command payload
          conversion_confidence:
            type: enum
            values: [DIRECT, INFERRED, ASSUMED]
            required: true
            description: Confidence in the conversion
          assumptions_made:
            type: array
            required: true
            description: List of assumptions made during conversion
          human_confirmation_required:
            type: boolean
            required: true
            description: Whether human confirmation is needed
          confirmed_by:
            type: string
            format: uuid
            required: false
            references: identity.actor.identity_id
            description: Identity that confirmed the conversion
          converted_at:
            type: timestamp
            required: true
            description: Conversion timestamp
        reference: domains/intent.yaml

  # ========================================================
  # PAYMENT DOMAIN ENTITIES (Phase E — Mechanical Registration)
  # ========================================================

  payment:
    name: Payment
    description: Execution Boundary Domain — bridges constitutional runtime to external financial systems

    entities:

      payment_request:
        description: A request to execute a payment through an external rail
        attributes:
          payment_request_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique payment request identifier
          source_transfer_id:
            type: string
            format: uuid
            required: true
            description: References treasury.transfer.transfer_id
          execution_plan_id:
            type: string
            format: uuid
            required: false
            description: Populated after routing
          rail_type:
            type: enum
            values: [ACH, FEDNOW, WIRE, RTP, CARD, BLOCKCHAIN, INTERNAL_TRANSFER, STABLECOIN, SWIFT, SEPA, CASH_SETTLEMENT, FUTURE_ADAPTER]
            required: false
            description: Populated after routing
          amount:
            type: object
            required: true
            description: Polymorphic value matching vault value model
          sender:
            type: object
            required: true
            description: Sender identity and account reference
          recipient:
            type: object
            required: true
            description: Recipient identity and rail account reference
          urgency:
            type: enum
            values: [IMMEDIATE, STANDARD, BATCH]
            required: true
          retry_policy:
            type: object
            required: true
            description: Retry configuration
          state:
            type: enum
            values: [RECEIVED, PLANNING, ROUTING, PREPARING, EXECUTING, CONFIRMING, RECONCILING, SETTLED, FAILED, COMPENSATING, REVERSED, CANCELLED]
            required: true
          constitutional_gates_passed:
            type: object
            required: true
            description: Record of which constitutional gates were passed
          created_at:
            type: timestamp
            required: true
          updated_at:
            type: timestamp
            required: true
          completed_at:
            type: timestamp
            required: false
        reference: domains/payment.yaml

      execution_plan:
        description: A routing and execution plan for a payment request
        attributes:
          execution_plan_id:
            type: string
            format: uuid
            required: true
            unique: true
          payment_request_id:
            type: string
            format: uuid
            required: true
          selected_rail:
            type: enum
            values: [ACH, FEDNOW, WIRE, RTP, CARD, BLOCKCHAIN, INTERNAL_TRANSFER, STABLECOIN, SWIFT, SEPA, CASH_SETTLEMENT, FUTURE_ADAPTER]
            required: true
          routing_decision:
            type: object
            required: true
            description: Full routing evaluation with scores and criteria
          step_sequence:
            type: array
            required: true
            description: Ordered adapter execution steps
          estimated_settlement_time_ms:
            type: integer
            required: true
          compensation_strategy:
            type: enum
            values: [SEQUENTIAL_REVERSE, PARALLEL_ROLLBACK, MANUAL_ESCALATION]
            required: true
          state:
            type: enum
            values: [DRAFT, APPROVED, EXECUTING, COMPLETED, FAILED]
            required: true
          created_at:
            type: timestamp
            required: true
        reference: domains/payment.yaml

