# ============================================================
# SOVR Financial OS — Domain Model
# File: 02_domain-model.yaml
# Status: FROZEN — Phase J (Protocol Closure) complete
# ============================================================
# Defines the universe of entities that exist in SOVR.
# This file is populated domain-by-domain.
# Current domains: Vault, Ledger, Treasury, Identity, Policy, Intent, Agent, Payment
# ============================================================

meta:
  schema_version: "1.0.0"
  file_id: "02_domain-model"
  status: "FROZEN"
  version: "1.0.0"
  domain: "system"
  owner: "governance"
  introduced: "2025-07-07"
  modified: "2026-07-18"
  constitutional_reference: "L1"
  dependencies: ["00_protocol-manifest.yaml", "01_constitution.yaml"]
domains:

  # ========================================================
  # VAULT DOMAIN ENTITIES
  # ========================================================

  vault:
    name: Vault
    description: Value Authority Domain — defines what SOVR recognizes as value

    entities:

      asset:
        description: A unit of value recognized by SOVR
        attributes:
          asset_id:
            type: string
            format: uuid
            required: true
            unique: true
            description: Globally unique asset identifier
          asset_type:
            type: enum
            values: [cash, stablecoin, tokenized_asset, collateral_position, liquidity_position, external_claim]
            required: true
            description: Category of value
          issuer_id:
            type: string
            format: uuid
            required: true
            description: Identity that introduced the asset into SOVR
          ownership_id:
            type: string
            format: uuid
            required: true
            description: Current economic owner of the asset
          beneficial_owner_id:
            type: string
            format: uuid
            required: false
            description: Beneficial owner if different from legal owner
          custody_provider:
            type: enum
            values: [sovr_internal, on_chain, external_bank, third_party]
            required: true
            description: Who is physically/logically holding the asset
          custody_location:
            type: string
            required: true
            description: Specific location or address where asset is held
          quantity:
            type: decimal
            precision: 18
            required: false
            description: Number of units (for tokenized/liquidity assets)
          face_value:
            type: decimal
            precision: 2
            required: false
            description: Face value in native currency (for cash/stablecoin)
          native_unit:
            type: string
            required: true
            description: The unit in which this asset is denominated (e.g., USD, wei, shares)
          precision:
            type: integer
            required: true
            description: Decimal precision for this asset
          risk_classification:
            type: enum
            values: [minimal, low, medium, medium_to_high, high]
            required: true
          valuation_source:
            type: string
            required: true
            description: Source identifier for asset valuation
          current_valuation:
            type: decimal
            precision: 18
            required: false
            description: Current trusted valuation in reference currency
          valuation_updated_at:
            type: timestamp
            required: false
          reserve_ratio:
            type: decimal
            precision: 4
            required: true
            description: Required reserve ratio for this asset type
          state:
            type: enum
            values: [REGISTERED, VERIFIED, AVAILABLE, RESERVED, LOCKED, CONSUMED, RELEASED, RECONCILIATION_REQUIRED, REJECTED, IMPAIRED]
            required: true
            description: Current lifecycle state of the asset
          registered_at:
            type: timestamp
            required: true
          verified_at:
            type: timestamp
            required: false
          last_reconciled_at:
            type: timestamp
            required: false
        reference: domains/vault.yaml

      reservation:
        description: A soft or hard lock on a portion of an asset's value
        attributes:
          reservation_id:
            type: string
            format: uuid
            required: true
            unique: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          actor_id:
            type: string
            format: uuid
            required: true
            description: Who requested the reservation
          amount:
            type: decimal
            precision: 18
            required: true
          state:
            type: enum
            values: [PENDING, ACTIVE, CONSUMED, EXPIRED, RELEASED, FAILED]
            required: true
          expiration:
            type: timestamp
            required: true
          purpose:
            type: string
            required: true
            description: Free-text reason for the reservation (audit)
          initiating_command_id:
            type: string
            format: uuid
            required: true
          consuming_transaction_id:
            type: string
            format: uuid
            required: false
            description: Populated when reservation is consumed
          lock_id:
            type: string
            format: uuid
            required: false
            description: Populated when reservation transitions to LOCKED
          created_at:
            type: timestamp
            required: true
          locked_at:
            type: timestamp
            required: false
          consumed_at:
            type: timestamp
            required: false
          released_at:
            type: timestamp
            required: false
        reference: domains/vault.yaml

      collateral_position:
        description: An asset pledged as security for an obligation
        attributes:
          collateral_id:
            type: string
            format: uuid
            required: true
            unique: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          owner_id:
            type: string
            format: uuid
            required: true
          obligation_id:
            type: string
            format: uuid
            required: true
            description: The obligation this collateral secures
          gross_value:
            type: decimal
            precision: 18
            required: true
            description: Market value before haircut
          effective_value:
            type: decimal
            precision: 18
            required: true
            description: Recognized value after haircut
          haircut_rate:
            type: decimal
            precision: 6
            required: true
            description: Haircut applied (e.g., 0.15 = 15%)
          quality_score:
            type: decimal
            precision: 4
            required: true
            description: Collateral quality score (0.0 to 1.0)
          state:
            type: enum
            values: [PROPOSED, ACTIVE, MARGIN_CALL, LIQUIDATING, RELEASED, LIQUIDATED]
            required: true
          margin_ratio:
            type: decimal
            precision: 6
            required: false
            description: Current collateral / obligation ratio
          created_at:
            type: timestamp
            required: true
          last_valued_at:
            type: timestamp
            required: false
        reference: domains/vault.yaml

      custody_attestation:
        description: Proof that an asset exists at a custody location
        attributes:
          attestation_id:
            type: string
            format: uuid
            required: true
            unique: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          custody_provider:
            type: string
            required: true
          proof_type:
            type: enum
            values: [on_chain_balance_proof, off_chain_custodian_statement, internal_ledger_confirmation]
            required: true
          proof_hash:
            type: string
            required: true
            description: Cryptographic hash of the attestation proof
          attester_id:
            type: string
            format: uuid
            required: true
          attested_at:
            type: timestamp
            required: true
          valid_until:
            type: timestamp
            required: true
          block_height:
            type: integer
            required: false
            description: Blockchain block height at time of attestation (if on-chain)
        reference: domains/vault.yaml

      valuation:
        description: A trusted price assessment for an asset
        attributes:
          valuation_id:
            type: string
            format: uuid
            required: true
            unique: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          source_type:
            type: enum
            values: [oracle, internal_pricing, market_feed, manual]
            required: true
          source_id:
            type: string
            required: true
            description: Identifier of the specific valuation source
          price:
            type: decimal
            precision: 18
            required: true
          reference_currency:
            type: string
            required: true
            description: Currency in which the price is denominated
          confidence:
            type: enum
            values: [high, medium, low]
            required: false
          is_stale:
            type: boolean
            required: true
          governance_approved:
            type: boolean
            required: false
            description: Required for manual valuations
          valued_at:
            type: timestamp
            required: true
        reference: domains/vault.yaml

      balance:
        description: Computed view of an actor's holdings for a specific asset
        attributes:
          balance_id:
            type: string
            format: uuid
            required: true
            unique: true
          actor_id:
            type: string
            format: uuid
            required: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          total_balance:
            type: decimal
            precision: 18
            required: true
          available_balance:
            type: decimal
            precision: 18
            required: true
          reserved_balance:
            type: decimal
            precision: 18
            required: true
          locked_balance:
            type: decimal
            precision: 18
            required: true
          encumbered_balance:
            type: decimal
            precision: 18
            required: true
          computed_at:
            type: timestamp
            required: true
        reference: domains/vault.yaml

      reconciliation_record:
        description: Record of a vault reconciliation operation
        attributes:
          reconciliation_id:
            type: string
            format: uuid
            required: true
            unique: true
          asset_id:
            type: string
            format: uuid
            required: true
          initiated_by:
            type: string
            format: uuid
            required: true
          scope:
            type: enum
            values: [single_asset, actor_holdings, full_vault]
            required: true
          state:
            type: enum
            values: [STARTED, IN_PROGRESS, COMPLETED, DISCREPANCY_FOUND, FAILED]
            required: true
          expected_value:
            type: decimal
            precision: 18
            required: false
          actual_value:
            type: decimal
            precision: 18
            required: false
          discrepancy_amount:
            type: decimal
            precision: 18
            required: false
          severity:
            type: enum
            values: [none, low, medium, high, critical]
            required: false
          started_at:
            type: timestamp
            required: true
          completed_at:
            type: timestamp
            required: false
        reference: domains/vault.yaml

  # ========================================================
  # LEDGER DOMAIN ENTITIES
  # ========================================================

  ledger:
    name: Ledger
    description: Immutable Financial History Domain — the financial truth domain
    entities:

      ledger:
        description: Top-level financial record container
        attributes:
          ledger_id:
            type: string
            format: uuid
            required: true
            unique: true
          name:
            type: string
            required: true
          entity_id:
            type: string
            format: uuid
            required: true
          base_currency:
            type: string
            required: true
          status:
            type: enum
            values: [ACTIVE, FROZEN, ARCHIVED]
            required: true
          created_at:
            type: timestamp
            required: true
        reference: domains/ledger.yaml

      journal:
        description: A named collection of journal entries for a domain or subsystem
        attributes:
          journal_id:
            type: string
            format: uuid
            required: true
            unique: true
          ledger_id:
            type: string
            format: uuid
            required: true
            references: ledger.ledger.ledger_id
          name:
            type: string
            required: true
          domain:
            type: string
            required: true
          description:
            type: string
            required: false
          status:
            type: enum
            values: [OPEN, CLOSING, CLOSED]
            required: true
          period_start:
            type: timestamp
            required: true
          period_end:
            type: timestamp
            required: false
        reference: domains/ledger.yaml

      journal_entry:
        description: A balanced double-entry record of a financial event
        attributes:
          entry_id:
            type: string
            format: uuid
            required: true
            unique: true
          journal_id:
            type: string
            format: uuid
            required: true
            references: ledger.journal.journal_id
          transaction_id:
            type: string
            format: uuid
            required: true
          event_reference:
            type: string
            format: uuid
            required: true
            description: The event that caused this entry
          correlation_id:
            type: string
            format: uuid
            required: true
          causation_id:
            type: string
            format: uuid
            required: true
          description:
            type: string
            required: true
          entry_type:
            type: enum
            values: [STANDARD, REVERSAL, CORRECTION, CLOSING, ADJUSTMENT]
            required: true
          status:
            type: enum
            values: [CREATED, VALIDATING, POSTED, SETTLED, RECONCILED]
            required: true
          posting_count:
            type: integer
            required: true
          total_debits:
            type: decimal
            precision: 18
            required: true
          total_credits:
            type: decimal
            precision: 18
            required: true
          balanced:
            type: boolean
            required: true
          created_at:
            type: timestamp
            required: true
          posted_at:
            type: timestamp
            required: false
          settled_at:
            type: timestamp
            required: false
          reconciled_at:
            type: timestamp
            required: false
          original_entry_id:
            type: string
            format: uuid
            required: false
            description: For REVERSAL and CORRECTION types
          reversal_reason:
            type: string
            required: false
          correction_description:
            type: string
            required: false
          approved_by:
            type: string
            format: uuid
            required: false
          actor_context:
            type: object
            required: true
            fields:
              actor_id:
                type: string
                format: uuid
              actor_type:
                type: enum
                values: [human, organization, ai_agent, service_account, governance, external_system, system]
              identity_id:
                type: string
                format: uuid
                required: false
              agent_id:
                type: string
                format: uuid
                required: false
          authorization_context:
            type: object
            required: true
            fields:
              capability:
                type: string
              scope:
                type: string
              policy_result:
                type: enum
                values: [APPROVE, DENY, REQUIRE_APPROVAL]
        reference: domains/ledger.yaml

      posting:
        description: A single debit or credit line within a journal entry
        attributes:
          posting_id:
            type: string
            format: uuid
            required: true
            unique: true
          entry_id:
            type: string
            format: uuid
            required: true
            references: ledger.journal_entry.entry_id
          account_id:
            type: string
            format: uuid
            required: true
            references: ledger.account.account_id
          amount:
            type: decimal
            precision: 18
            required: true
          direction:
            type: enum
            values: [DEBIT, CREDIT]
            required: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          currency:
            type: string
            required: true
          precision:
            type: integer
            required: true
          description:
            type: string
            required: false
          reference_type:
            type: string
            required: false
          reference_id:
            type: string
            format: uuid
            required: false
        reference: domains/ledger.yaml

      account:
        description: A named container for tracking a category of financial activity
        attributes:
          account_id:
            type: string
            format: uuid
            required: true
            unique: true
          account_code:
            type: string
            required: true
          account_name:
            type: string
            required: true
          account_type:
            type: enum
            values: [ASSET, LIABILITY, EQUITY, REVENUE, EXPENSE, MEMORANDUM, RESERVE, COLLATERAL]
            required: true
          normal_balance:
            type: enum
            values: [DEBIT, CREDIT, NONE]
            required: true
          owner_id:
            type: string
            format: uuid
            required: true
          domain_ownership:
            type: string
            required: true
          parent_account_id:
            type: string
            format: uuid
            required: false
          status:
            type: enum
            values: [ACTIVE, FROZEN, CLOSED]
            required: true
          debit_allowed:
            type: boolean
            required: true
          credit_allowed:
            type: boolean
            required: true
          max_balance:
            type: decimal
            precision: 18
            required: false
          min_balance:
            type: decimal
            precision: 18
            required: false
          requires_approval:
            type: boolean
            required: true
          created_at:
            type: timestamp
            required: true
        reference: domains/ledger.yaml

      accounting_period:
        description: A time-bounded interval for financial reporting
        attributes:
          period_id:
            type: string
            format: uuid
            required: true
            unique: true
          ledger_id:
            type: string
            format: uuid
            required: true
            references: ledger.ledger.ledger_id
          name:
            type: string
            required: true
          start_date:
            type: date
            required: true
          end_date:
            type: date
            required: true
          status:
            type: enum
            values: [OPEN, CLOSING, CLOSED]
            required: true
          opening_balances_recorded:
            type: boolean
            required: true
          closing_entries_recorded:
            type: boolean
            required: true
        reference: domains/ledger.yaml

      ledger_reconciliation:
        description: A reconciliation process comparing ledger records against external sources
        attributes:
          reconciliation_id:
            type: string
            format: uuid
            required: true
            unique: true
          type:
            type: enum
            values: [internal, vault_reconciliation, treasury_reconciliation, external_reconciliation]
            required: true
          state:
            type: enum
            values: [MATCHED, MISMATCH_DETECTED, INVESTIGATION, ADJUSTMENT_REQUIRED, ADJUSTMENT_POSTED, RESOLVED, ESCALATED, COMPLETE]
            required: true
          severity:
            type: enum
            values: [none, low, medium, high, critical]
            required: false
          source_ledger_values:
            type: object
            required: false
          external_values:
            type: object
            required: false
          discrepancy_amount:
            type: decimal
            precision: 18
            required: false
          resolution_method:
            type: enum
            values: [auto_tolerance, adjustment, escalation, no_action_needed]
            required: false
          initiated_by:
            type: string
            format: uuid
            required: true
          started_at:
            type: timestamp
            required: true
          resolved_at:
            type: timestamp
            required: false
        reference: domains/ledger.yaml

  # ========================================================
  # TREASURY DOMAIN ENTITIES
  # ========================================================

  treasury:
    name: Treasury
    description: Controlled Movement Authority Domain
    entities:

      transfer_request:
        description: The initial request to move value
        attributes:
          request_id:
            type: string
            format: uuid
            required: true
            unique: true
          intent_id:
            type: string
            format: uuid
            required: true
          source_actor_id:
            type: string
            format: uuid
            required: true
          destination_actor_id:
            type: string
            format: uuid
            required: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          amount:
            type: decimal
            precision: 18
            required: true
          purpose:
            type: string
            required: true
          urgency:
            type: enum
            values: [STANDARD, URGENT, SCHEDULED]
            required: true
          settlement_type:
            type: enum
            values: [INTERNAL, EXTERNAL]
            required: true
          requested_at:
            type: timestamp
            required: true
          requested_by_actor_id:
            type: string
            format: uuid
            required: true
          requested_by_actor_type:
            type: enum
            values: [human, organization, ai_agent, service_account, governance, external_system]
            required: true
          requested_by_identity_id:
            type: string
            format: uuid
            required: true
          requested_by_agent_id:
            type: string
            format: uuid
            required: false
          status:
            type: enum
            values: [PENDING, ACCEPTED, REJECTED, EXPIRED]
            required: true
          policy_result:
            type: enum
            values: [APPROVE, DENY, REQUIRE_APPROVAL]
            required: false
          policy_evaluated_at:
            type: timestamp
            required: false
          expiration:
            type: timestamp
            required: true
        reference: domains/treasury.yaml

      transfer_order:
        description: The authorized, executable transfer instruction with full audit lineage
        attributes:
          order_id:
            type: string
            format: uuid
            required: true
            unique: true
          request_id:
            type: string
            format: uuid
            required: true
            references: treasury.transfer_request.request_id
          correlation_id:
            type: string
            format: uuid
            required: true
          source_actor_id:
            type: string
            format: uuid
            required: true
          destination_actor_id:
            type: string
            format: uuid
            required: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          amount:
            type: decimal
            precision: 18
            required: true
          vault_reservation_id:
            type: string
            format: uuid
            required: false
            references: vault.reservation.reservation_id
          vault_lock_id:
            type: string
            format: uuid
            required: false
            references: vault.reservation.lock_id
          ledger_entry_id:
            type: string
            format: uuid
            required: false
            references: ledger.journal_entry.entry_id
          settlement_type:
            type: enum
            values: [INTERNAL, EXTERNAL]
            required: true
          state:
            type: enum
            values: [REQUESTED, AUTHORIZED, RESERVED, EXECUTING, PENDING_SETTLEMENT, SETTLED, REJECTED, EXPIRED, FAILED, COMPENSATION_REQUIRED, UNKNOWN_EXTERNAL_STATE]
            required: true
          authorized_by:
            type: string
            format: uuid
            required: false
          authorized_at:
            type: timestamp
            required: false
          executed_at:
            type: timestamp
            required: false
          settled_at:
            type: timestamp
            required: false
          failure_reason:
            type: string
            required: false
          audit_lineage:
            type: object
            required: false
            fields:
              identity_verification:
                type: string
                format: uuid
              capability_check:
                type: string
                format: uuid
              policy_evaluation:
                type: string
                format: uuid
              vault_reservation:
                type: string
                format: uuid
              ledger_posting:
                type: string
                format: uuid
        reference: domains/treasury.yaml

      liquidity_position:
        description: System-wide liquidity state for an asset
        attributes:
          position_id:
            type: string
            format: uuid
            required: true
            unique: true
          asset_id:
            type: string
            format: uuid
            required: true
            references: vault.asset.asset_id
          total_verified_value:
            type: decimal
            precision: 18
            required: true
          total_available:
            type: decimal
            precision: 18
            required: true
          total_reserved:
            type: decimal
            precision: 18
            required: true
          total_encumbered:
            type: decimal
            precision: 18
            required: true
          total_in_transit:
            type: decimal
            precision: 18
            required: true
          net_liquidity_ratio:
            type: decimal
            precision: 6
            required: true
          state:
            type: enum
            values: [NORMAL, WARNING, RESTRICTED, EMERGENCY_LOCK]
            required: true
          warning_threshold:
            type: decimal
            precision: 6
            required: true
          restricted_threshold:
            type: decimal
            precision: 6
            required: true
          emergency_threshold:
            type: decimal
            precision: 6
            required: true
          last_evaluated_at:
            type: timestamp
            required: true
        reference: domains/treasury.yaml

      settlement_instruction:
        description: The instruction sent to Payment domain for external settlement
        attributes:
          instruction_id:
            type: string
            format: uuid
            required: true
            unique: true
          order_id:
            type: string
            format: uuid
            required: true
            references: treasury.transfer_order.order_id
          asset_id:
            type: string
            format: uuid
            required: true
          amount:
            type: decimal
            precision: 18
            required: true
          destination_type:
            type: string
            required: true
          destination_address:
            type: string
            required: true
          rail:
            type: string
            required: true
          reference:
            type: string
            required: false
          vault_lock_id:
            type: string
            format: uuid
            required: true
          vault_reservation_id:
            type: string
            format: uuid
            required: true
          max_attempts:
            type: integer
            required: true
          timeout:
            type: integer
            required: true
          state:
            type: enum
            values: [PENDING, SUBMITTED, CONFIRMING, CONFIRMED, FAILED, UNKNOWN]
            required: true
